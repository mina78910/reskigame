<!DOCTYPE html>
<html lang="ja">
  
  <!-- PR preview test -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Office Walk - Ultra Realistic V12 (Handles Restored)</title>
  <style>
    /* ==========================================
           UI & Base Styles
           ========================================== */
    body {
      margin: 0;
      overflow: hidden;
      background-color: #eef1f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: rgba(15, 20, 25, 0.85);
      color: #ffffff;
      cursor: pointer;
      z-index: 10;
      backdrop-filter: blur(4px);
      transition: opacity 0.3s ease;
      text-align: center;
    }

    #ui-layer h1 {
      margin: 0 0 10px 0;
      font-size: 3rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    #ui-layer p {
      margin: 5px 0;
      color: #cbd5e1;
      font-size: 1.1rem;
    }

    .highlight {
      color: #60a5fa;
      font-weight: bold;
      padding: 0 4px;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 5;
      display: none;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
    }

    #coordinate-hud {
      position: absolute;
      top: 15px;
      left: 15px;
      background-color: rgba(0, 0, 0, 0.7);
      color: #00ffcc;
      padding: 10px 15px;
      border-radius: 6px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      font-weight: bold;
      pointer-events: none;
      z-index: 20;
      display: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      border: 1px solid #00ffcc;
    }

    #joystick-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      z-index: 15;
      display: none;
    }

    #mobile-exit {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border-radius: 50%;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      z-index: 20;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
    }

    @media (max-width: 768px) {
      #ui-layer h1 {
        font-size: 2rem;
      }
      #ui-layer p {
        font-size: 0.9rem;
      }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>

<body>
  <div id="crosshair"></div>
  <div id="coordinate-hud"></div>

  <div id="joystick-zone"></div>
  <div id="mobile-exit">?</div>

  <div id="ui-layer">
    <h1>OFFICE WALK Ultra Real V12</h1>
    <p id="start-text">画面をクリックして空間に没入する</p>
    <p id="controls-text"
      style="margin-top: 40px; font-size: 1rem; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 8px;">
      <span class="highlight">W A S D</span> : 移動 &nbsp;|&nbsp;
      <span class="highlight">Mouse</span> : 視点移動 &nbsp;|&nbsp;
      <span class="highlight">ESC</span> : ロック解除
    </p>
  </div>

  <script>
    // ==========================================
        // デバイス判定 & 開発・デバッグ用設定
        // ==========================================
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const SHOW_COORDINATES = true; 
        
        let isPlaying = false; 

        const hudElement = document.getElementById('coordinate-hud');
        if (SHOW_COORDINATES) {
            hudElement.style.display = 'block';
        }

        if (isTouchDevice) {
            document.getElementById('start-text').innerHTML = "タップして空間に没入する<br><span style='font-size:0.8rem; color:#aaa;'>(横画面推奨)</span>";
            document.getElementById('controls-text').innerHTML = "<span class='highlight'>左画面ドラッグ</span> : 移動 &nbsp;|&nbsp; <span class='highlight'>右画面スワイプ</span> : 視点移動";
        }

        // ==========================================
        // 1. シーン・カメラ・レンダラーの初期化
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf4f6f9);
        // 日光表現の白みが強くなりすぎないよう、フォグは控えめにする
        scene.fog = new THREE.FogExp2(0xf4f6f9, 0.0035);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 1.6, 0); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding; 
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        // 全体の露出を少し下げ、室内が白飛びしにくいバランスにする
        renderer.toneMappingExposure = 0.86;
        document.body.appendChild(renderer.domElement);

        // ==========================================
        // 2. 照明の設定 
        // ==========================================
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0xaaaaaa, 0.72);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.55);
        dirLight.position.set(-20, 25, -10); 
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 4096; 
        dirLight.shadow.mapSize.height = 4096;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.camera.left = -40;
        dirLight.shadow.camera.right = 40;
        dirLight.shadow.camera.top = 40;
        dirLight.shadow.camera.bottom = -40;
        dirLight.shadow.bias = -0.0005; 
        scene.add(dirLight);

        // ==========================================
        // 3. 空間のベース構築
        // ==========================================
        const roomWidth = 50; 
        const roomDepth = 14; 
        const ceilingLowerAmount = 0.5;
        const roomHeight = 5 - ceilingLowerAmount;
        const wallFixtureHeightBoost = 0.6;
        const baseMeetingDoorHeight = 2.35;

        function createCarpetTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#5a6370';
            ctx.fillRect(0, 0, size, size);
            const imgData = ctx.getImageData(0, 0, size, size);
            const data = imgData.data;
            const tileSize = 64; 
            for (let i = 0; i < data.length; i += 4) {
                const x = (i / 4) % size;
                const y = Math.floor((i / 4) / size);
                const noise = (Math.random() - 0.5) * 20;
                const isAltTile = (Math.floor(x / tileSize) % 2 === 0) ^ (Math.floor(y / tileSize) % 2 === 0);
                const weave = isAltTile ? Math.sin(x * 0.8) * 6 : Math.sin(y * 0.8) * 6;
                const borderX = x % tileSize;
                const borderY = y % tileSize;
                let borderDarken = 0;
                if (borderX < 2 || borderY < 2) borderDarken = -12;
                const finalAdjust = noise + weave + borderDarken;
                data[i] = Math.max(0, Math.min(255, data[i] + finalAdjust));    
                data[i+1] = Math.max(0, Math.min(255, data[i+1] + finalAdjust)); 
                data[i+2] = Math.max(0, Math.min(255, data[i+2] + finalAdjust)); 
            }
            ctx.putImageData(imgData, 0, 0);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(roomWidth / 4, roomDepth / 4); 
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createWoodTexture() {
            const size = 1024;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#d4b595'; 
            ctx.fillRect(0, 0, size, size);
            
            ctx.fillStyle = 'rgba(100, 70, 40, 0.06)';
            for(let i = 0; i < 3000; i++) {
                let x = Math.random() * size;
                let y = Math.random() * size;
                let w = Math.random() * 40 + 10;
                let h = Math.random() * 3 + 1;
                ctx.fillRect(x, y, w, h);
            }
            
            ctx.strokeStyle = 'rgba(90, 60, 30, 0.4)';
            ctx.lineWidth = 2;
            const plankHeight = 64; 
            for(let y = 0; y <= size; y += plankHeight) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(size, y);
                ctx.stroke();
                
                let offsetX = (y / plankHeight) % 2 === 0 ? 0 : size / 2;
                ctx.beginPath();
                ctx.moveTo(offsetX, y);
                ctx.lineTo(offsetX, y + plankHeight);
                ctx.stroke();
                
                if(offsetX === 0) {
                    ctx.beginPath();
                    ctx.moveTo(size / 2, y);
                    ctx.lineTo(size / 2, y + plankHeight);
                    ctx.stroke();
                }
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createMountainMuralTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#e8edf0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            function drawLayer(points, color) {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                points.forEach(([x, y], index) => {
                    if (index === 0) {
                        ctx.lineTo(x * canvas.width, y * canvas.height);
                    } else {
                        ctx.lineTo(x * canvas.width, y * canvas.height);
                    }
                });
                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();
            }

            drawLayer([
                [0.00, 0.18], [0.09, 0.23], [0.18, 0.31], [0.25, 0.33],
                [0.34, 0.45], [0.45, 0.49], [0.55, 0.53], [0.64, 0.54],
                [0.75, 0.61], [0.88, 0.61], [1.00, 0.66]
            ], '#dce8e3');

            drawLayer([
                [0.00, 0.32], [0.07, 0.36], [0.15, 0.43], [0.27, 0.45],
                [0.38, 0.49], [0.50, 0.51], [0.60, 0.58], [0.72, 0.59],
                [0.85, 0.65], [1.00, 0.66]
            ], '#cfe4d1');

            drawLayer([
                [0.00, 0.60], [0.08, 0.57], [0.18, 0.61], [0.28, 0.58],
                [0.40, 0.62], [0.51, 0.63], [0.63, 0.59], [0.74, 0.62],
                [0.86, 0.60], [1.00, 0.64]
            ], '#efe4d1');

            drawLayer([
                [0.00, 0.78], [0.11, 0.76], [0.23, 0.79], [0.35, 0.75],
                [0.49, 0.77], [0.60, 0.72], [0.73, 0.75], [0.86, 0.73],
                [1.00, 0.77]
            ], '#b8d8df');

            ctx.fillStyle = '#23564f';
            for (const tree of [
                [0.56, 0.78, 0.14], [0.60, 0.80, 0.20], [0.65, 0.77, 0.16],
                [0.71, 0.76, 0.24], [0.77, 0.78, 0.18], [0.83, 0.75, 0.22]
            ]) {
                const [x, baseY, h] = tree;
                const cx = x * canvas.width;
                const base = baseY * canvas.height;
                const height = h * canvas.height;
                const width = height * 0.34;
                ctx.beginPath();
                ctx.moveTo(cx, base - height);
                ctx.lineTo(cx - width, base);
                ctx.lineTo(cx + width, base);
                ctx.closePath();
                ctx.fill();
                ctx.fillRect(cx - width * 0.08, base - height * 0.1, width * 0.16, height * 0.2);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createCityWindowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, '#f7fbff');
            sky.addColorStop(1, '#dcecf7');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const buildings = [
                [40, 170, 210, 760], [255, 90, 170, 840], [455, 130, 210, 790],
                [700, 60, 180, 860], [875, 190, 120, 740]
            ];
            buildings.forEach(([x, y, w, h], index) => {
                ctx.fillStyle = index % 2 === 0 ? 'rgba(135, 170, 200, 0.72)' : 'rgba(115, 155, 190, 0.64)';
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.86)';
                ctx.lineWidth = 5;
                for (let gx = x + 24; gx < x + w; gx += 42) {
                    ctx.beginPath();
                    ctx.moveTo(gx, y);
                    ctx.lineTo(gx, y + h);
                    ctx.stroke();
                }
                for (let gy = y + 34; gy < y + h; gy += 58) {
                    ctx.beginPath();
                    ctx.moveTo(x, gy);
                    ctx.lineTo(x + w, gy);
                    ctx.stroke();
                }
            });

            ctx.strokeStyle = 'rgba(70, 105, 135, 0.26)';
            ctx.lineWidth = 6;
            for (let x = 170; x < canvas.width; x += 260) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }


        function createEntranceFloorTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            const imgData = ctx.createImageData(size, size);
            const data = imgData.data;
            const palette = [
                [118, 142, 95],
                [151, 170, 114],
                [199, 172, 132],
                [224, 195, 151],
                [132, 154, 103]
            ];

            function hashNoise(x, y, seed) {
                const n = Math.sin(x * 12.9898 + y * 78.233 + seed * 37.719) * 43758.5453;
                return n - Math.floor(n);
            }

            for (let y = 0; y < size; y++) {
                for (let x = 0; x < size; x++) {
                    const nx = x / size;
                    const ny = y / size;
                    const blendedNoise =
                        hashNoise(Math.floor(nx * 9), Math.floor(ny * 9), 1) * 0.48 +
                        hashNoise(Math.floor(nx * 19), Math.floor(ny * 19), 2) * 0.32 +
                        hashNoise(Math.floor(nx * 37), Math.floor(ny * 37), 3) * 0.2;
                    const color = palette[Math.floor(blendedNoise * palette.length) % palette.length];
                    const fleck = (hashNoise(x, y, 4) - 0.5) * 24;
                    const i = (y * size + x) * 4;
                    data[i] = Math.max(0, Math.min(255, color[0] + fleck));
                    data[i + 1] = Math.max(0, Math.min(255, color[1] + fleck));
                    data[i + 2] = Math.max(0, Math.min(255, color[2] + fleck));
                    data[i + 3] = 255;
                }
            }

            ctx.putImageData(imgData, 0, 0);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(1.2, 3.6);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createReceptionPhone() {
            const phoneGroup = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.36, metalness: 0.08 });
            const buttonMat = new THREE.MeshStandardMaterial({ color: 0x303030, roughness: 0.5 });
            const cordMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.42 });

            const base = new THREE.Mesh(new THREE.BoxGeometry(0.34, 0.09, 0.24), bodyMat);
            base.position.set(0, 0.045, 0);
            base.castShadow = true;
            phoneGroup.add(base);

            const cradle = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.055, 0.07), bodyMat);
            cradle.position.set(0, 0.125, -0.035);
            cradle.rotation.z = 0.08;
            cradle.castShadow = true;
            phoneGroup.add(cradle);

            for (let row = 0; row < 3; row++) {
                for (let col = 0; col < 3; col++) {
                    const key = new THREE.Mesh(new THREE.BoxGeometry(0.035, 0.012, 0.025), buttonMat);
                    key.position.set((col - 1) * 0.055, 0.098, 0.045 + row * 0.04);
                    key.castShadow = true;
                    phoneGroup.add(key);
                }
            }

            const cord = new THREE.Mesh(new THREE.TorusGeometry(0.08, 0.006, 8, 32, Math.PI * 1.35), cordMat);
            cord.rotation.x = Math.PI / 2;
            cord.position.set(-0.2, 0.07, -0.02);
            phoneGroup.add(cord);

            return phoneGroup;
        }

        function createEntranceFixtures(hallStartX, hallEndX, hallDepth) {
            const hallRightWallX = hallEndX + 0.105;
            const hallCenterZ = roomDepth / 2 + hallDepth / 2;
            const wallFacingPlusXRotation = Math.PI / 2;

            const benchMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.48, metalness: 0.08 });
            const legMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.42, metalness: 0.22 });
            const cushionMat = new THREE.MeshStandardMaterial({ color: 0xd9b88f, roughness: 0.82 });
            const bench = new THREE.Group();
            bench.position.set(hallRightWallX - 0.28, 0, hallCenterZ - 0.45);

            const seat = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.12, 2.55), benchMat);
            seat.position.set(0, 0.45, 0);
            seat.castShadow = true;
            seat.receiveShadow = true;
            bench.add(seat);

            [-1.05, -0.35, 0.35, 1.05].forEach((z) => {
                const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.45, 12), legMat);
                leg.position.set(-0.14, 0.225, z);
                leg.castShadow = true;
                bench.add(leg);
                const wallLeg = leg.clone();
                wallLeg.position.x = 0.14;
                bench.add(wallLeg);
            });

            [-0.78, 0, 0.78].forEach((z) => {
                const cushion = new THREE.Mesh(new THREE.CylinderGeometry(0.23, 0.23, 0.055, 40), cushionMat);
                cushion.rotation.x = Math.PI / 2;
                cushion.position.set(0, 0.54, z);
                cushion.scale.set(1.08, 1.0, 0.28);
                cushion.castShadow = true;
                cushion.receiveShadow = true;
                bench.add(cushion);
            });
            scene.add(bench);

            const fixtureZ = roomDepth / 2 + hallDepth - 1.05;
            const signCanvas = document.createElement('canvas');
            signCanvas.width = 512;
            signCanvas.height = 256;
            const signCtx = signCanvas.getContext('2d');
            signCtx.fillStyle = '#f6f2e9';
            signCtx.fillRect(0, 0, signCanvas.width, signCanvas.height);
            signCtx.strokeStyle = '#6a5138';
            signCtx.lineWidth = 18;
            signCtx.strokeRect(12, 12, signCanvas.width - 24, signCanvas.height - 24);
            signCtx.fillStyle = '#3f3326';
            signCtx.font = 'bold 84px sans-serif';
            signCtx.textAlign = 'center';
            signCtx.textBaseline = 'middle';
            signCtx.fillText('受付', signCanvas.width / 2, signCanvas.height / 2 - 10);
            signCtx.font = 'bold 32px sans-serif';
            signCtx.fillText('RECEPTION', signCanvas.width / 2, signCanvas.height / 2 + 66);
            const receptionSign = new THREE.Mesh(
                new THREE.PlaneGeometry(0.95, 0.48),
                new THREE.MeshStandardMaterial({ map: new THREE.CanvasTexture(signCanvas), roughness: 0.62, side: THREE.DoubleSide })
            );
            receptionSign.position.set(hallRightWallX - 0.012, 1.58, fixtureZ);
            receptionSign.rotation.y = wallFacingPlusXRotation;
            scene.add(receptionSign);

            const boardMat = new THREE.MeshStandardMaterial({ color: 0x7a4a24, roughness: 0.56 });
            const receptionBoard = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.12, 0.8), boardMat);
            receptionBoard.position.set(hallRightWallX - 0.18, 1.12, fixtureZ);
            receptionBoard.castShadow = true;
            receptionBoard.receiveShadow = true;
            scene.add(receptionBoard);

            const bracketMat = new THREE.MeshStandardMaterial({ color: 0x4a2f18, roughness: 0.5 });
            [-0.28, 0.28].forEach((zOffset) => {
                const bracket = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.36, 0.035), bracketMat);
                bracket.position.set(hallRightWallX - 0.09, 0.92, fixtureZ + zOffset);
                bracket.castShadow = true;
                scene.add(bracket);
            });

            const phone = createReceptionPhone();
            phone.position.set(hallRightWallX - 0.27, 1.21, fixtureZ);
            phone.rotation.y = wallFacingPlusXRotation;
            phone.scale.set(0.75, 0.75, 0.75);
            scene.add(phone);
        }

        const carpetTex = createCarpetTexture();
        const floorGeo = new THREE.PlaneGeometry(roomWidth, roomDepth);
        const floorMat = new THREE.MeshStandardMaterial({ map: carpetTex, roughness: 1.0, metalness: 0.0 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        function createWall(w, h, d, x, y, z, color = 0xd0d8e8) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 1.0 });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.set(x, y, z);
            wall.receiveShadow = true;
            wall.castShadow = true;
            scene.add(wall);
        }

        const backWallZ = -roomDepth / 2;
        const windowBottomHeight = 3.6 - ceilingLowerAmount;
        const windowTopHeight = 4.6 - ceilingLowerAmount;
        const windowHeight = windowTopHeight - windowBottomHeight;

        function addProceduralFoliage(pillarGroup) {
            const foliageGroup = new THREE.Group();
            const leafColors = [0x2e5a1c, 0x3a7023, 0x478c2b, 0x5cb338, 0x76c449, 0x8edb5a];
            const flowerColors = [0xffffff, 0xfffdf0, 0xffeb3b]; 
            const leafGeo = new THREE.IcosahedronGeometry(0.14, 0);
            const flowerGeo = new THREE.IcosahedronGeometry(0.06, 0);
            const pillarHalfSize = 0.75; 
            const topY = roomHeight; 

            for (let i = 0; i < 150; i++) {
                const mat = new THREE.MeshStandardMaterial({ color: leafColors[Math.floor(Math.random() * leafColors.length)], roughness: 0.8, flatShading: true });
                const leaf = new THREE.Mesh(leafGeo, mat);
                const angle = Math.random() * Math.PI * 2;
                const radius = pillarHalfSize + (Math.random() * 0.1 - 0.05); 
                
                let px = Math.cos(angle) * radius;
                let pz = Math.sin(angle) * radius;
                if (Math.abs(px) > Math.abs(pz)) {
                    px = Math.sign(px) * pillarHalfSize;
                    pz = pz / Math.abs(Math.cos(angle)) * pillarHalfSize;
                } else {
                    pz = Math.sign(pz) * pillarHalfSize;
                    px = px / Math.abs(Math.sin(angle)) * pillarHalfSize;
                }
                
                leaf.position.set(px + (Math.random()*0.2 - 0.1), topY - 0.1 - (Math.random()*0.3), pz + (Math.random()*0.2 - 0.1));
                const scale = 0.8 + Math.random() * 1.5;
                leaf.scale.set(scale, scale, scale);
                leaf.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                leaf.castShadow = true;
                foliageGroup.add(leaf);
            }

            for (let v = 0; v < 40; v++) {
                const vineLength = Math.floor(Math.random() * 6) + 2; 
                const isXEdge = Math.random() > 0.5;
                const signX = Math.random() > 0.5 ? 1 : -1;
                const signZ = Math.random() > 0.5 ? 1 : -1;
                let basePathX, basePathZ;
                
                if(isXEdge) {
                    basePathX = signX * (pillarHalfSize + 0.02); 
                    basePathZ = (Math.random() - 0.5) * (pillarHalfSize * 2 - 0.2);
                } else {
                    basePathX = (Math.random() - 0.5) * (pillarHalfSize * 2 - 0.2);
                    basePathZ = signZ * (pillarHalfSize + 0.02);
                }

                for (let l = 0; l < vineLength; l++) {
                    const mat = new THREE.MeshStandardMaterial({ color: leafColors[Math.floor(Math.random() * leafColors.length)], roughness: 0.9, flatShading: true });
                    const leaf = new THREE.Mesh(leafGeo, mat);
                    const dropY = topY - 0.2 - (l * 0.18) - (Math.random() * 0.1);
                    leaf.position.set(basePathX + (Math.random()*0.08 - 0.04), dropY, basePathZ + (Math.random()*0.08 - 0.04));
                    
                    const scale = 1.2 - (l * 0.15) + (Math.random() * 0.3);
                    if (scale > 0.2) {
                        leaf.scale.set(scale, scale, scale);
                        leaf.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                        leaf.castShadow = true;
                        foliageGroup.add(leaf);

                        if (Math.random() > 0.85) {
                            const fMat = new THREE.MeshStandardMaterial({ color: flowerColors[Math.floor(Math.random() * flowerColors.length)], roughness: 0.4, flatShading: true });
                            const flower = new THREE.Mesh(flowerGeo, fMat);
                            flower.position.copy(leaf.position);
                            flower.position.x += (Math.random() * 0.1 - 0.05);
                            flower.position.y -= (Math.random() * 0.05);
                            flower.position.z += (Math.random() * 0.1 - 0.05);
                            foliageGroup.add(flower);
                        }
                    }
                }
            }
            pillarGroup.add(foliageGroup);
        }

        function createDeskRow(desk_x, centerZ, units) {
            const rowGroup = new THREE.Group();
            const unitLength = 1.4; 
            const totalLength = units * unitLength;
            const deskDepth = 1.4;  
            const topGeo = new THREE.BoxGeometry(deskDepth, 0.04, totalLength);
            const topMat = new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.4 });
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.y = 0.72;
            top.castShadow = true;
            top.receiveShadow = true;
            rowGroup.add(top);
            
            const legGeo = new THREE.BoxGeometry(deskDepth - 0.05, 0.72, 0.05);
            const legMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, metalness: 0.1 });
            for (let i = 0; i <= units; i++) {
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(0, 0.36, (i * unitLength) - (totalLength / 2));
                leg.castShadow = true;
                rowGroup.add(leg);
            }
            for (let i = 0; i < units; i++) {
                const zOffset = (i * unitLength) - (totalLength / 2) + (unitLength / 2);
                const monitor = createMonitorModel();
                monitor.position.set(0, 0.72, zOffset);
                rowGroup.add(monitor);
                
                const chairR = createDeskChairModel(getNextChairColor());
                chairR.position.set(0.8, 0, zOffset);
                chairR.rotation.y = -Math.PI / 2;
                rowGroup.add(chairR);
                
                const laptopR = createLaptopModel();
                laptopR.position.set(0.35, 0.73, zOffset);
                rowGroup.add(laptopR);
                
                const chairL = createDeskChairModel(getNextChairColor());
                chairL.position.set(-0.8, 0, zOffset);
                chairL.rotation.y = Math.PI / 2;
                rowGroup.add(chairL);
                
                const laptopL = createLaptopModel();
                laptopL.position.set(-0.35, 0.73, zOffset);
                rowGroup.add(laptopL);
            }
            rowGroup.position.set(desk_x, 0, centerZ);
            scene.add(rowGroup);

       // 7. ロッカーの配置
        // ==========================================
        function createLockerBank(startX, endX, zPos) {
            const lockerGroup = new THREE.Group();
            const depth = 1.0;
            const height = 2.0 + wallFixtureHeightBoost;
            const rows = 4;
            const doorHeight = height / rows;
            const colWidth = doorHeight;
            const originalColWidth = 0.4;
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe5e7eb, roughness: 0.7 });
            const handleMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 }); 
            const labelMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 }); 
            // x=3付近からアルコーブ右側までを一続きで空け、端に1列だけ残らないようにする
            const leftAlcoveLockerRemovalStart = alcoveStart - originalColWidth * 5;
            const rightAlcoveLockerRemovalEnd = alcoveEnd + originalColWidth * 3.2;
            const lockerHalfWidth = colWidth / 2;
            // x=-12付近側からロッカー1列分を削る
            const trimmedStartX = startX + colWidth;
            for(let x = trimmedStartX; x <= endX; x += colWidth) {
                const overlapsAlcoveClearance =
                    x + lockerHalfWidth > leftAlcoveLockerRemovalStart &&
                    x - lockerHalfWidth < rightAlcoveLockerRemovalEnd;
                if (overlapsAlcoveClearance) continue;
                const bodyGeo = new THREE.BoxGeometry(colWidth, height, depth);
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.set(x, height / 2, zPos - depth / 2);
                body.castShadow = true;
                body.receiveShadow = true;
                lockerGroup.add(body);
                for(let r = 0; r < rows; r++) {
                    const doorY = (r * doorHeight) + (doorHeight / 2);
                    const handleGeo = new THREE.BoxGeometry(colWidth * 0.3, 0.03, 0.02);
                    const handle = new THREE.Mesh(handleGeo, handleMat);
                    handle.position.set(x + colWidth * 0.2, doorY + (doorHeight * 0.3), zPos - depth);
                    lockerGroup.add(handle);
                    const labelGeo = new THREE.PlaneGeometry(colWidth * 0.12, doorHeight * 0.12);
                    const label = new THREE.Mesh(labelGeo, labelMat);
                    label.position.set(x - colWidth * 0.2, doorY + (doorHeight * 0.1), zPos - depth - 0.005);
                    label.rotation.y = Math.PI; 
                    lockerGroup.add(label);
                    if (r > 0) {
                        const lineGeo = new THREE.BoxGeometry(colWidth, 0.005, 0.01);
                        const lineMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
                        const line = new THREE.Mesh(lineGeo, lineMat);
                        line.position.set(x, r * doorHeight, zPos - depth);
                        lockerGroup.add(line);
                    }
                }
            }
            scene.add(lockerGroup);
        }
        createLockerBank(newDoorEnd + 0.3, 15, roomDepth / 2 - 0.1);

                    ctx.arc(x + 11, y + 96, 8, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            ctx.strokeStyle = 'rgba(255,255,255,0.9)';
            ctx.lineWidth = 5;
            ctx.strokeRect(38, 78, 300, 440);

            ctx.fillStyle = '#111827';
            ctx.fillRect(365, 150, 92, 38);
            ctx.fillStyle = '#f43f5e';
            ctx.fillRect(383, 166, 26, 8);
            ctx.fillStyle = '#e5e7eb';
            ctx.fillRect(368, 230, 84, 80);

            ctx.fillStyle = '#101010';
            ctx.fillRect(356, 390, 110, 78);
            ctx.fillStyle = '#f5a623';
            ctx.beginPath();
            ctx.ellipse(393, 429, 32, 16, -0.28, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#d9dde3';
            ctx.beginPath();
            ctx.arc(438, 426, 19, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 4;
            ctx.stroke();

            ctx.fillStyle = '#ffdf4d';
            ctx.fillRect(46, 545, 278, 95);
            ctx.fillStyle = '#1d4ed8';
            ctx.font = 'bold 25px Arial, sans-serif';
            ctx.fillText('DRINKS', 185, 582);
            ctx.fillStyle = '#ef4444';
            ctx.font = 'bold 18px Arial, sans-serif';
            ctx.fillText('HOT & COLD', 185, 612);

            ctx.fillStyle = '#111827';
            ctx.fillRect(58, 665, 275, 74);
            ctx.fillStyle = 'rgba(255,255,255,0.28)';
            ctx.fillRect(78, 680, 235, 36);

            ctx.fillStyle = '#c62828';
            ctx.font = 'bold 64px Arial, sans-serif';
            ctx.fillText('KIRIN', 200, 825);

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createVendingSideTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 220;
            canvas.height = 900;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#f7f7f3';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.translate(110, 455);
            ctx.rotate(Math.PI / 2);
            ctx.fillStyle = '#c62828';
            ctx.font = 'bold 96px Arial, sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('KIRIN', 0, 34);
            ctx.restore();
            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createVendingMachine(x, z) {
            const group = new THREE.Group();
            const width = 1.15;
            const height = 2.25;
            const depth = 0.62;

            const whiteMat = new THREE.MeshStandardMaterial({ color: 0xf7f7f3, roughness: 0.42, metalness: 0.08 });
            const frontMat = new THREE.MeshStandardMaterial({ map: createVendingFrontTexture(), roughness: 0.32, metalness: 0.04 });
            const sideMat = new THREE.MeshStandardMaterial({ map: createVendingSideTexture(), roughness: 0.38, metalness: 0.06 });
            const darkMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.55, metalness: 0.25 });
            const metalMat = new THREE.MeshStandardMaterial({ color: 0xbfc4c8, roughness: 0.26, metalness: 0.8 });

            const body = new THREE.Mesh(new THREE.BoxGeometry(width, height, depth), [
                sideMat, whiteMat, whiteMat, whiteMat, frontMat, whiteMat
            ]);
            body.position.y = height / 2;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);

            const glass = new THREE.Mesh(
                new THREE.BoxGeometry(0.68, 1.1, 0.018),
                new THREE.MeshStandardMaterial({ color: 0xdff6ff, transparent: true, opacity: 0.25, roughness: 0.03, metalness: 0.25 })
            );
            glass.position.set(-0.18, 1.52, depth / 2 + 0.014);
            group.add(glass);

            const buttonGeo = new THREE.CylinderGeometry(0.045, 0.045, 0.014, 24);
            for (let row = 0; row < 3; row++) {

                    const button = new THREE.Mesh(buttonGeo, metalMat);

                    group.add(button);
                }

            const coinSlot = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.05, 0.02), metalMat);
            coinSlot.position.set(0.37, 1.0, depth / 2 + 0.035);

            const pickupLip = new THREE.Mesh(new THREE.BoxGeometry(0.78, 0.035, 0.04), darkMat);
            pickupLip.position.set(-0.14, 0.42, depth / 2 + 0.045);

            const woodBase = new THREE.Mesh(
                new THREE.BoxGeometry(1.65, 0.035, 1.08),

            woodBase.castShadow = true;
            woodBase.receiveShadow = true;
            group.add(woodBase);

            const footGeo = new THREE.BoxGeometry(0.46, 0.035, 0.18);
            [[-0.35, -0.4], [0.35, -0.4], [-0.35, 0.29], [0.35, 0.29]].forEach(([fx, fz]) => {
                const foot = new THREE.Mesh(footGeo, darkMat);
                foot.position.set(fx, 0.055, fz);
                foot.castShadow = true;
                group.add(foot);
            });

            const glow = new THREE.PointLight(0xffffff, 0.16, 3);
            glow.position.set(-0.18, 1.45, 0.48);
            group.add(glow);

            group.position.set(x, 0, z);
            scene.add(group);
        }

        function createCoffeeStation(x, z) {
            const group = new THREE.Group();
            const tableGeo = new THREE.BoxGeometry(0.8, 0.04, 2.4);
            const tableMat = new THREE.MeshStandardMaterial({ color: 0xe8dcc7, roughness: 0.4 });
            const table = new THREE.Mesh(tableGeo, tableMat);
            table.position.set(-0.4, 0.9, 0); 
            table.castShadow = true;
            table.receiveShadow = true;
            group.add(table);
            const legGeo = new THREE.BoxGeometry(0.7, 0.9, 0.05);
            const legMat = new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.1 });
            const leg1 = new THREE.Mesh(legGeo, legMat);
            leg1.position.set(-0.4, 0.45, 1.1);
            leg1.castShadow = true;
            group.add(leg1);
            const leg2 = new THREE.Mesh(legGeo, legMat);
            leg2.position.set(-0.4, 0.45, -1.1);
            leg2.castShadow = true;
            group.add(leg2);
            const cmGeo = new THREE.BoxGeometry(0.3, 0.4, 0.25);
            const cmMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.3 });
            const cm = new THREE.Mesh(cmGeo, cmMat);
            cm.position.set(-0.4, 1.12, -0.6);
            cm.castShadow = true;
            group.add(cm);
            const cmFrontGeo = new THREE.BoxGeometry(0.32, 0.3, 0.1);
            const cmFrontMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.8, roughness: 0.2 });
            const cmFront = new THREE.Mesh(cmFrontGeo, cmFrontMat);

            group.add(cmFront);
            const trayGeo = new THREE.BoxGeometry(0.4, 0.02, 0.6);

            tray.position.set(-0.4, 0.93, 0.4);

        function createSofa(colorHex) {
            const sofaGroup = new THREE.Group();

            base.castShadow = true;
            base.receiveShadow = true;
            sofaGroup.add(base);
            const seatGeo = new THREE.BoxGeometry(1.4, 0.15, 0.6);
            const cushionMat = new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.8 });
            const seat = new THREE.Mesh(seatGeo, cushionMat);
            seat.position.set(0, 0.475, 0);
            seat.castShadow = true;
            sofaGroup.add(seat);
            const backGeo = new THREE.BoxGeometry(1.4, 0.65, 0.15);
            const back = new THREE.Mesh(backGeo, cushionMat);

        function createBoxSeatStation(x, z, color1, color2) {
            const group = new THREE.Group();
            const tableGeo = new THREE.BoxGeometry(1.4, 0.04, 0.8);
            const tableMat = new THREE.MeshStandardMaterial({ color: 0xfdfbf7, roughness: 0.2 });
            const table = new THREE.Mesh(tableGeo, tableMat);
            table.position.set(-0.7, 0.72, 0); 
            table.castShadow = true;
            table.receiveShadow = true;
            group.add(table);
            const legGeo = new THREE.BoxGeometry(0.8, 0.7, 0.4);
            const legMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
            const leg = new THREE.Mesh(legGeo, legMat);
            leg.position.set(-0.7, 0.35, 0);
            leg.castShadow = true;
            group.add(leg);
            const sofa1 = createSofa(color1); 
            sofa1.position.set(-0.7, 0, 0.7);
            sofa1.rotation.y = Math.PI; 
            group.add(sofa1);
            const sofa2 = createSofa(color2); 
            sofa2.position.set(-0.7, 0, -0.7);
            group.add(sofa2);
            const shadeGeo = new THREE.CylinderGeometry(0.25, 0.25, 0.15, 32);
            const shadeMat = new THREE.MeshStandardMaterial({ color: 0xe6c229, roughness: 0.4, side: THREE.DoubleSide });
            const shade = new THREE.Mesh(shadeGeo, shadeMat);
            shade.position.set(-0.7, 1.8, 0);
            group.add(shade);
            const bulbGeo = new THREE.SphereGeometry(0.08);
            const bulbMat = new THREE.MeshStandardMaterial({ emissive: 0xfff5b6, emissiveIntensity: 2.0, color: 0xffffff });
            const bulb = new THREE.Mesh(bulbGeo, bulbMat);
            bulb.position.set(-0.7, 1.75, 0);
            group.add(bulb);
            const pointLight = new THREE.PointLight(0xfff5b6, 0.4, 5);
            pointLight.position.set(-0.7, 1.7, 0);
            group.add(pointLight);
            const cordGeo = new THREE.CylinderGeometry(0.01, 0.01, 3.2);
            const cordMat = new THREE.MeshStandardMaterial({ color: 0x333333 });
            const cord = new THREE.Mesh(cordGeo, cordMat);
            cord.position.set(-0.7, 3.4, 0);
            group.add(cord);
            group.position.set(x, 0, z);
            scene.add(group);
        }

        createOfficeGlicoRack(alcoveEnd + 0.68, roomDepth / 2 - 0.36);
        createVendingMachine(-25.4, -6.34);
        createCoffeeStation(24.9, -3.5);
        createBoxSeatStation(24.9, 1.5, 0x459a85, 0x608ab6);
        createBoxSeatStation(24.9, 5.0, 0x608ab6, 0x459a85);


        // ==========================================
        // 9. コントローラー (PC & モバイル対応)
        // ==========================================
        const uiLayer = document.getElementById('ui-layer');
        const crosshair = document.getElementById('crosshair');
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        
        let joyMoveX = 0;
        let joyMoveZ = 0;
        let lookTouchId = null;
        let lastTouchX = 0;
        let lastTouchY = 0;
        let isMouseLooking = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        function rotateView(deltaX, deltaY, sensitivity) {
            euler.setFromQuaternion(camera.quaternion);
            euler.y -= deltaX * sensitivity;
            euler.x -= deltaY * sensitivity;
            euler.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, euler.x));
            camera.quaternion.setFromEuler(euler);
        }

        uiLayer.addEventListener('click', () => {
            if (isTouchDevice) {
                isPlaying = true;
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 300);
                document.getElementById('joystick-zone').style.display = 'block';
                document.getElementById('mobile-exit').style.display = 'flex';
                
                if (!window.joystickManager) {
                    window.joystickManager = nipplejs.create({
                        zone: document.getElementById('joystick-zone'),
                        mode: 'dynamic',
                        color: 'white',
                        catchDistance: 150
                    });

                    window.joystickManager.on('move', (evt, data) => {
                        joyMoveX = data.vector.x;
                        joyMoveZ = data.vector.y;
                    });

                    window.joystickManager.on('end', () => {
                        joyMoveX = 0;
                        joyMoveZ = 0;
                    });
                }
            } else {
                isPlaying = true;
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 300);
                crosshair.style.display = 'block';
                const lockRequest = document.body.requestPointerLock && document.body.requestPointerLock();
                if (lockRequest && typeof lockRequest.catch === 'function') {
                    lockRequest.catch(() => {});
                }
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isPlaying = document.pointerLockElement === document.body;
            if (isPlaying) {
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 300);
                crosshair.style.display = 'block';
            } else {
                uiLayer.style.display = 'flex';
                setTimeout(() => uiLayer.style.opacity = '1', 10);
                crosshair.style.display = 'none';
            }
        });

        document.getElementById('mobile-exit').addEventListener('click', () => {
            isPlaying = false;
            uiLayer.style.display = 'flex';
            setTimeout(() => uiLayer.style.opacity = '1', 10);
            document.getElementById('joystick-zone').style.display = 'none';
            document.getElementById('mobile-exit').style.display = 'none';
        });

        document.addEventListener('pointerdown', (event) => {
            if (!isPlaying || event.pointerType !== 'mouse' || document.pointerLockElement === document.body) return;
            if (event.clientX > window.innerWidth / 2) {
                isMouseLooking = true;
                lastMouseX = event.clientX;
                lastMouseY = event.clientY;
            }
        });

        document.addEventListener('pointermove', (event) => {
            if (!isPlaying || event.pointerType !== 'mouse') return;
            if (document.pointerLockElement === document.body) {
                rotateView(event.movementX, event.movementY, 0.002);
                return;
            }
            if (!isMouseLooking) return;

            const deltaX = event.clientX - lastMouseX;
            const deltaY = event.clientY - lastMouseY;
            rotateView(deltaX, deltaY, 0.004);

            lastMouseX = event.clientX;
            lastMouseY = event.clientY;
        });

        document.addEventListener('pointerup', (event) => {
            if (event.pointerType !== 'mouse') return;
            isMouseLooking = false;
        });

        document.addEventListener('touchstart', (e) => {
            if (!isPlaying || !isTouchDevice) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.clientX > window.innerWidth / 2) {
                    lookTouchId = t.identifier;
                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                    break;
                }
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (!isPlaying || !isTouchDevice) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.identifier === lookTouchId) {
                    let deltaX = t.clientX - lastTouchX;
                    let deltaY = t.clientY - lastTouchY;
                    rotateView(deltaX, deltaY, 0.004);

                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === lookTouchId) {
                    lookTouchId = null;
                }
            }
        });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = true;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = true;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = true;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = false;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = false;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = false;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = false;
        });

        // ==========================================
        // 10. アニメーションループ & 衝突判定
        // ==========================================
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const moveVector = new THREE.Vector3();
        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1); 
            
            if (isPlaying) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                if (isTouchDevice) {
                    direction.x = joyMoveX;
                    direction.z = joyMoveZ;
                } else {
                    direction.z = Number(keys.w) - Number(keys.s);
                    direction.x = Number(keys.d) - Number(keys.a);
                    direction.normalize(); 
                }

                const speed = 45.0; 
                if (!isTouchDevice) {
                    if (keys.w || keys.s) velocity.z -= direction.z * speed * delta;
                    if (keys.a || keys.d) velocity.x -= direction.x * speed * delta;
                } else {
                    if (Math.abs(direction.z) > 0.05) velocity.z -= direction.z * speed * delta;
                    if (Math.abs(direction.x) > 0.05) velocity.x -= direction.x * speed * delta;
                }

                moveVector.setFromMatrixColumn(camera.matrix, 0); 
                camera.position.addScaledVector(moveVector, -velocity.x * delta);
                
                moveVector.crossVectors(camera.up, moveVector); 
                camera.position.addScaledVector(moveVector, -velocity.z * delta);
                
                camera.position.y = 1.6;
                
                // --- 衝突判定 ---
                const wallOffset = 1.5; 
                let boundXMin = -roomWidth / 2 + wallOffset; 
                const boundXMax = roomWidth / 2 - 2.0;
                const boundZMin = -roomDepth / 2 + 1.8; 
                
                if (camera.position.x < -23.5) {
                    if (camera.position.z > -0.5) camera.position.z = -0.5;
                    if (camera.position.z < -6.5) camera.position.z = -6.5;
                    
                    boundXMin = -34.0;
                }

                if(camera.position.x < boundXMin) camera.position.x = boundXMin;
                if(camera.position.x > boundXMax) camera.position.x = boundXMax; 
                if(camera.position.z < boundZMin) camera.position.z = boundZMin; 
                
                const zLockerBound = roomDepth / 2 - 2.0; 
                const zAlcoveBound = roomDepth / 2 + alcoveDepth - 1.0; 
                const zLeftNicheBound = roomDepth / 2 + leftNicheDepth - 0.4;
                const zNewHallBound = roomDepth / 2 + newHallDepth - 0.45;
                const alcoveAllowedLeft = alcoveStart + 0.6; 
                const alcoveAllowedRight = alcoveEnd - 0.6;  
                const leftNicheAllowedLeft = leftNicheStart + 0.4;
                const leftNicheAllowedRight = leftNicheEnd - 0.4;
                const newHallAllowedLeft = newHallStart + 0.25;
                const newHallAllowedRight = newHallEnd - 0.25;
                const inAlcoveMouth = camera.position.x > alcoveAllowedLeft && camera.position.x < alcoveAllowedRight;
                const inLeftNicheMouth = camera.position.x > leftNicheAllowedLeft && camera.position.x < leftNicheAllowedRight;
                const inNewHallMouth = camera.position.x > newHallAllowedLeft && camera.position.x < newHallAllowedRight;

                if (inAlcoveMouth) {
                    if (camera.position.z > zAlcoveBound) camera.position.z = zAlcoveBound;
                } else if (inLeftNicheMouth) {
                    if (camera.position.z > zLeftNicheBound) camera.position.z = zLeftNicheBound;
                } else if (inNewHallMouth) {
                    if (camera.position.z > zNewHallBound) camera.position.z = zNewHallBound;
                } else if (camera.position.z > zLockerBound) {
                    camera.position.z = zLockerBound;
                }
            }

            if (SHOW_COORDINATES && hudElement) {
                hudElement.innerHTML = `X: ${camera.position.x.toFixed(2)}<br>Y: ${camera.position.y.toFixed(2)}<br>Z: ${camera.position.z.toFixed(2)}`;
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
  </script>
