<!DOCTYPE html>
<html lang="ja">
  
  <!-- PR preview test -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>リスキリングセンター3</title>
  <style>
    /* ==========================================
           UI & Base Styles
           ========================================== */
    html, body {
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: #eef1f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas, #ui-layer, #joystick-zone, #mobile-exit {
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      padding: 7vh 24px max(120px, calc(18px + env(safe-area-inset-bottom)));
      background-color: rgba(15, 20, 25, 0.85);
      color: #ffffff;
      cursor: pointer;
      z-index: 10;
      backdrop-filter: blur(4px);
      transition: opacity 0.3s ease;
      text-align: center;
    }

    #ui-layer h1 {
      margin: 0 0 8px 0;
      font-size: clamp(2rem, 4.8vw, 2.85rem);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    #ui-layer p {
      margin: 5px 0;
      color: #cbd5e1;
      font-size: 1.1rem;
    }

    .opening-tutorial {
      width: min(700px, 88vw);
      margin: 20px 0 4px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      opacity: 0.72;
      pointer-events: none;
    }

    .tutorial-card {
      min-height: 158px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 35%, rgba(96, 165, 250, 0.18), transparent 44%),
        rgba(255, 255, 255, 0.075);
      box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.035);
    }

    .tutorial-label {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: 90%;
      color: rgba(226, 232, 240, 0.92);
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
    }

    .tutorial-device {
      position: absolute;
      left: 50%;
      top: 16px;
      width: 180px;
      height: 96px;
      transform: translateX(-50%) scale(0.92);
      border: 2px solid rgba(226, 232, 240, 0.42);
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.18);
    }

    .tutorial-zone {
      position: absolute;
      top: 9px;
      bottom: 9px;
      width: 50%;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.055);
    }

    .tutorial-zone.left { left: 9px; }
    .tutorial-zone.right { right: 9px; }

    .tutorial-joystick {
      position: absolute;
      left: 38px;
      top: 26px;
      width: 54px;
      height: 54px;
      border: 2px solid rgba(147, 197, 253, 0.74);
      border-radius: 50%;
      box-shadow: 0 0 22px rgba(96, 165, 250, 0.36);
    }

    .tutorial-joystick::after {
      content: '';
      position: absolute;
      left: 17px;
      top: 13px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(191, 219, 254, 0.72);
      box-shadow: 0 0 14px rgba(147, 197, 253, 0.58);
    }

    .tutorial-thumb {
      position: absolute;
      width: 34px;
      height: 48px;
      border-radius: 22px 22px 18px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(203,213,225,0.34));
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.35));
    }

    .tutorial-thumb.left {
      left: 72px;
      top: 52px;
      transform: rotate(-20deg);
    }

    .tutorial-thumb.right {
      right: 58px;
      top: 46px;
      transform: rotate(20deg);
    }

    .tutorial-arrows {
      position: absolute;
      inset: 0;
      color: rgba(147, 197, 253, 0.78);
      font-size: 1.65rem;
      line-height: 1;
      text-shadow: 0 0 12px rgba(96, 165, 250, 0.55);
    }

    .tutorial-arrows span {
      position: absolute;
    }

    .tutorial-arrows .up { left: 61px; top: 12px; }
    .tutorial-arrows .down { left: 62px; top: 74px; }
    .tutorial-arrows .left { left: 30px; top: 43px; }
    .tutorial-arrows .right { left: 92px; top: 43px; }

    .tutorial-swipe {
      position: absolute;
      left: 105px;
      top: 38px;
      width: 48px;
      height: 26px;
      border-top: 2px solid rgba(147, 197, 253, 0.86);
      border-radius: 50%;
      transform: rotate(-8deg);
    }

    .tutorial-swipe::before,
    .tutorial-swipe::after {
      content: '';
      position: absolute;
      top: -6px;
      width: 10px;
      height: 10px;
      border-top: 2px solid rgba(147, 197, 253, 0.86);
      border-right: 2px solid rgba(147, 197, 253, 0.86);
    }

    .tutorial-swipe::before {
      left: 0;
      transform: rotate(-140deg);
    }

    .tutorial-swipe::after {
      right: 0;
      transform: rotate(40deg);
    }

    .opening-notes {
      position: absolute;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(760px, 88vw);
      color: rgba(226, 232, 240, 0.82);
      font-size: 0.92rem;
      line-height: 1.7;
      letter-spacing: 0.02em;
      pointer-events: none;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .opening-notes p {
      margin: 2px 0;
      font-size: inherit;
      color: inherit;
    }

    .highlight {
      color: #60a5fa;
      font-weight: bold;
      padding: 0 4px;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 5;
      display: none;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
    }

    #coordinate-hud {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: rgba(255, 255, 255, 0.72);
      color: rgba(0, 0, 0, 0.72);
      padding: 6px 8px;
      border-radius: 6px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.35;
      pointer-events: auto;
      z-index: 20;
      display: none;
      cursor: copy;
      user-select: none;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(0, 0, 0, 0.18);
    }

    #coordinate-copy-toast {
      position: absolute;
      top: 10px;
      left: 185px;
      background: rgba(15, 23, 42, 0.82);
      color: #fff;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      pointer-events: none;
      z-index: 21;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    #coordinate-copy-toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #joystick-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      z-index: 15;
      display: none;
    }

    #mobile-exit {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border-radius: 50%;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      z-index: 20;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
    }

    @media (max-width: 768px) {
      #ui-layer h1 {
        font-size: 2rem;
      }
      #ui-layer p {
        font-size: 0.9rem;
      }
      #ui-layer {
        padding-top: 5vh;
        padding-bottom: max(104px, calc(14px + env(safe-area-inset-bottom)));
      }
      .opening-tutorial {
        width: min(620px, 92vw);
        margin-top: 16px;
        gap: 12px;
      }
      .tutorial-card {
        min-height: 142px;
      }
      .tutorial-device {
        top: 12px;
        transform: translateX(-50%) scale(0.76);
      }
      .tutorial-label {
        bottom: 12px;
        font-size: 0.78rem;
      }

      .opening-notes {
        width: min(620px, 92vw);
        font-size: 0.78rem;
        line-height: 1.55;
      }
    }

    @media (max-width: 560px) {
      #ui-layer {
        padding-top: 4vh;
        padding-bottom: max(92px, calc(10px + env(safe-area-inset-bottom)));
      }
      .opening-tutorial {
        grid-template-columns: 1fr;
        width: min(320px, 90vw);
        margin-top: 12px;
        gap: 8px;
      }
      .tutorial-card {
        min-height: 112px;
      }
      .tutorial-device {
        top: -2px;
        transform: translateX(-50%) scale(0.58);
      }
      .tutorial-thumb.left {
        top: 36px;
      }
      .tutorial-thumb.right {
        top: 32px;
      }
      .tutorial-label {
        bottom: 8px;
      }

      .opening-notes {
        bottom: max(10px, env(safe-area-inset-bottom));
        font-size: 0.72rem;
      }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<body>
  <div id="crosshair"></div>
  <div id="coordinate-hud" title="クリックまたはCキーで現在地の座標をコピー"></div>
  <div id="coordinate-copy-toast" role="status" aria-live="polite"></div>

  <div id="joystick-zone"></div>
  <div id="mobile-exit">?</div>

  <div id="ui-layer">
    <h1>リスキリングセンター3</h1>
    <p id="start-text">タップ（クリック）してゲーム開始</p>
    <div class="opening-tutorial" aria-hidden="true">
      <div class="tutorial-card">
        <div class="tutorial-device">
          <div class="tutorial-zone left"></div>
          <div class="tutorial-joystick"></div>
          <div class="tutorial-arrows">
            <span class="up">↑</span>
            <span class="down">↓</span>
            <span class="left">←</span>
            <span class="right">→</span>
          </div>
        </div>
        <div class="tutorial-thumb left"></div>
        <div class="tutorial-label">左手親指でスティック操作</div>
      </div>
      <div class="tutorial-card">
        <div class="tutorial-device">
          <div class="tutorial-zone right"></div>
          <div class="tutorial-swipe"></div>
        </div>
        <div class="tutorial-thumb right"></div>
        <div class="tutorial-label">右手親指で視点調整</div>
      </div>
    </div>
    <div class="opening-notes" aria-label="補足案内">
      <p>※ ゲーム中にフリーズする場合はリロードしてください</p>
      <p>※ PCの場合はマウス操作可</p>
    </div>
  </div>

  <script src="./editable-config.js"></script>
  <script>
    // ==========================================
        // デバイス判定 & 開発・デバッグ用設定
        // ==========================================
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const SHOW_COORDINATES = true;
        const SHOW_COORDINATE_GUIDES = true;
        const EDITABLE_CONFIG = window.RESKI_EDITABLE_CONFIG || {};
        const ROOM_LAYOUT = EDITABLE_CONFIG.roomLayout;
        const SHOWCASE_CLEARANCE = EDITABLE_CONFIG.showcaseClearance;
        const COORDINATE_GUIDE_MIN_X = EDITABLE_CONFIG.coordinateGuides.minX;
        const COORDINATE_GUIDE_MAX_X = EDITABLE_CONFIG.coordinateGuides.maxX;
        const COORDINATE_GUIDE_MIN_Z = EDITABLE_CONFIG.coordinateGuides.minZ;
        const COORDINATE_GUIDE_MAX_Z = EDITABLE_CONFIG.coordinateGuides.maxZ;
        
        let isPlaying = false;
        let copyToastTimer = null;

        const hudElement = document.getElementById('coordinate-hud');
        const copyToastElement = document.getElementById('coordinate-copy-toast');
        if (SHOW_COORDINATES) {
            hudElement.style.display = 'block';
        }

        if (isTouchDevice) {
            document.getElementById('start-text').innerHTML = "タップ（クリック）してゲーム開始<br><span style='font-size:0.8rem; color:#aaa;'>(横画面推奨)</span>";
        }

        // ==========================================
        // 1. シーン・カメラ・レンダラーの初期化
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf4f6f9);
        // 日光表現の白みが強くなりすぎないよう、フォグは控えめにする
        scene.fog = new THREE.FogExp2(0xf4f6f9, 0.0035);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 1.6, 0); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding; 
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        // 全体の露出を少し下げ、室内が白飛びしにくいバランスにする
        renderer.toneMappingExposure = 0.86;
        document.body.appendChild(renderer.domElement);

        // ==========================================
        // 2. 照明の設定 
        // ==========================================
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0xaaaaaa, 0.72);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.55);
        dirLight.position.set(-20, 25, -10); 
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 4096; 
        dirLight.shadow.mapSize.height = 4096;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.camera.left = -40;
        dirLight.shadow.camera.right = 40;
        dirLight.shadow.camera.top = 40;
        dirLight.shadow.camera.bottom = -40;
        dirLight.shadow.bias = -0.0005; 
        scene.add(dirLight);

        // ==========================================
        // 3. 空間のベース構築
        // ==========================================
        // X方向は左右を7ポイントずつ縮小し、Z方向はマイナス側だけ10ポイント拡張する。
        const roomWidth = ROOM_LAYOUT.outerMaxX - ROOM_LAYOUT.outerMinX;
        const roomDepth = ROOM_LAYOUT.baseDepth;
        const roomBackExtension = ROOM_LAYOUT.backExtension;
        const roomFrontZ = roomDepth / 2;
        const roomBackZ = -roomDepth / 2 - roomBackExtension;
        const roomFullDepth = roomFrontZ - roomBackZ;
        const roomCenterZ = (roomFrontZ + roomBackZ) / 2;
        const ceilingLowerAmount = 0.5;
        const roomHeight = 5 - ceilingLowerAmount;
        const wallFixtureHeightBoost = 0.6;

        function createCoordinateLabelSprite(text, color = '#0f172a') {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 96;
            const ctx = canvas.getContext('2d');
            ctx.font = '700 28px Courier New, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.76)';
            ctx.strokeStyle = 'rgba(15, 23, 42, 0.18)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            if (ctx.roundRect) {
                ctx.roundRect(20, 22, 216, 52, 12);
            } else {
                ctx.rect(20, 22, 216, 52);
            }
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 1);

            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            const material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: false,
                depthWrite: false
            });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(5.4, 2.0, 1);
            sprite.renderOrder = 999;
            return sprite;
        }

        function createCoordinateGuides() {
            const group = new THREE.Group();
            group.name = 'debug-coordinate-direction-markers';
            const y = 1.95;
            const minX = COORDINATE_GUIDE_MIN_X;
            const maxX = COORDINATE_GUIDE_MAX_X;
            const minZ = COORDINATE_GUIDE_MIN_Z;
            const maxZ = COORDINATE_GUIDE_MAX_Z;

            const markers = [
                { text: `X MIN ${minX}`, color: '#dc2626', position: [minX, y, 0] },
                { text: 'X 0', color: '#dc2626', position: [0, y, 0] },
                { text: `X MAX ${maxX}`, color: '#dc2626', position: [maxX, y, 0] },
                { text: `Z MIN ${minZ}`, color: '#1d4ed8', position: [0, y + 0.95, minZ] },
                { text: 'Z 0', color: '#1d4ed8', position: [0, y + 0.95, 0] },
                { text: `Z MAX ${maxZ}`, color: '#1d4ed8', position: [0, y + 0.95, maxZ] }
            ];

            markers.forEach(({ text, color, position }) => {
                const label = createCoordinateLabelSprite(text, color);
                label.position.set(...position);
                group.add(label);
            });

            const originLabel = createCoordinateLabelSprite('ORIGIN X0 / Z0', '#111827');
            originLabel.position.set(0, y + 1.9, 0);
            originLabel.scale.set(6.6, 2.4, 1);
            group.add(originLabel);
            return group;
        }

        if (SHOW_COORDINATE_GUIDES) {
            scene.add(createCoordinateGuides());
        }

        function createCarpetTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#5a6370';
            ctx.fillRect(0, 0, size, size);
            const imgData = ctx.getImageData(0, 0, size, size);
            const data = imgData.data;
            const tileSize = 64; 
            for (let i = 0; i < data.length; i += 4) {
                const x = (i / 4) % size;
                const y = Math.floor((i / 4) / size);
                const noise = (Math.random() - 0.5) * 20;
                const isAltTile = (Math.floor(x / tileSize) % 2 === 0) ^ (Math.floor(y / tileSize) % 2 === 0);
                const weave = isAltTile ? Math.sin(x * 0.8) * 6 : Math.sin(y * 0.8) * 6;
                const borderX = x % tileSize;
                const borderY = y % tileSize;
                let borderDarken = 0;
                if (borderX < 2 || borderY < 2) borderDarken = -12;
                const finalAdjust = noise + weave + borderDarken;
                data[i] = Math.max(0, Math.min(255, data[i] + finalAdjust));    
                data[i+1] = Math.max(0, Math.min(255, data[i+1] + finalAdjust)); 
                data[i+2] = Math.max(0, Math.min(255, data[i+2] + finalAdjust)); 
            }
            ctx.putImageData(imgData, 0, 0);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(roomWidth / 4, roomDepth / 4); 
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createWoodTexture() {
            const size = 1024;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#d4b595'; 
            ctx.fillRect(0, 0, size, size);
            
            ctx.fillStyle = 'rgba(100, 70, 40, 0.06)';
            for(let i = 0; i < 3000; i++) {
                let x = Math.random() * size;
                let y = Math.random() * size;
                let w = Math.random() * 40 + 10;
                let h = Math.random() * 3 + 1;
                ctx.fillRect(x, y, w, h);
            }
            
            ctx.strokeStyle = 'rgba(90, 60, 30, 0.4)';
            ctx.lineWidth = 2;
            const plankHeight = 64; 
            for(let y = 0; y <= size; y += plankHeight) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(size, y);
                ctx.stroke();
                
                let offsetX = (y / plankHeight) % 2 === 0 ? 0 : size / 2;
                ctx.beginPath();
                ctx.moveTo(offsetX, y);
                ctx.lineTo(offsetX, y + plankHeight);
                ctx.stroke();
                
                if(offsetX === 0) {
                    ctx.beginPath();
                    ctx.moveTo(size / 2, y);
                    ctx.lineTo(size / 2, y + plankHeight);
                    ctx.stroke();
                }
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createBlackMarbleTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, size, size);

            for (let i = 0; i < 120; i++) {
                const startX = Math.random() * size;
                const startY = Math.random() * size;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                for (let j = 0; j < 5; j++) {
                    ctx.lineTo(
                        startX + (Math.random() - 0.5) * 260,
                        startY + j * 34 + (Math.random() - 0.5) * 70
                    );
                }
                const alpha = Math.random() * 0.22 + 0.08;
                ctx.strokeStyle = `rgba(210, 210, 205, ${alpha})`;
                ctx.lineWidth = Math.random() * 2.1 + 0.35;
                ctx.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createMountainMuralTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#e8edf0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            function drawLayer(points, color) {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                points.forEach(([x, y], index) => {
                    if (index === 0) {
                        ctx.lineTo(x * canvas.width, y * canvas.height);
                    } else {
                        ctx.lineTo(x * canvas.width, y * canvas.height);
                    }
                });
                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();
            }

            drawLayer([
                [0.00, 0.18], [0.09, 0.23], [0.18, 0.31], [0.25, 0.33],
                [0.34, 0.45], [0.45, 0.49], [0.55, 0.53], [0.64, 0.54],
                [0.75, 0.61], [0.88, 0.61], [1.00, 0.66]
            ], '#dce8e3');

            drawLayer([
                [0.00, 0.32], [0.07, 0.36], [0.15, 0.43], [0.27, 0.45],
                [0.38, 0.49], [0.50, 0.51], [0.60, 0.58], [0.72, 0.59],
                [0.85, 0.65], [1.00, 0.66]
            ], '#cfe4d1');

            drawLayer([
                [0.00, 0.60], [0.08, 0.57], [0.18, 0.61], [0.28, 0.58],
                [0.40, 0.62], [0.51, 0.63], [0.63, 0.59], [0.74, 0.62],
                [0.86, 0.60], [1.00, 0.64]
            ], '#efe4d1');

            drawLayer([
                [0.00, 0.78], [0.11, 0.76], [0.23, 0.79], [0.35, 0.75],
                [0.49, 0.77], [0.60, 0.72], [0.73, 0.75], [0.86, 0.73],
                [1.00, 0.77]
            ], '#b8d8df');

            ctx.fillStyle = '#23564f';
            for (const tree of [
                [0.56, 0.78, 0.14], [0.60, 0.80, 0.20], [0.65, 0.77, 0.16],
                [0.71, 0.76, 0.24], [0.77, 0.78, 0.18], [0.83, 0.75, 0.22]
            ]) {
                const [x, baseY, h] = tree;
                const cx = x * canvas.width;
                const base = baseY * canvas.height;
                const height = h * canvas.height;
                const width = height * 0.34;
                ctx.beginPath();
                ctx.moveTo(cx, base - height);
                ctx.lineTo(cx - width, base);
                ctx.lineTo(cx + width, base);
                ctx.closePath();
                ctx.fill();
                ctx.fillRect(cx - width * 0.08, base - height * 0.1, width * 0.16, height * 0.2);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createCityWindowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            // 17階の窓越しに見える都内の眺望。地上階の道路ではなく、
            // 遠景の空と中高層ビル群が見える高さにして開放感を出す。
            const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, '#cfe3f5');
            sky.addColorStop(0.45, '#dcecf7');
            sky.addColorStop(0.72, '#eef4f8');
            sky.addColorStop(1, '#cbd7df');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.72)';
            for (const cloud of [
                [210, 170, 155, 34], [520, 120, 210, 42], [1120, 190, 250, 48], [1600, 135, 190, 38]
            ]) {
                const [x, y, w, h] = cloud;
                ctx.beginPath();
                ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawBuilding({ x, y, w, h, body, side, frame, glass, floors, cols, inset = 26 }) {
                const facade = ctx.createLinearGradient(x, y, x + w, y + h);
                facade.addColorStop(0, side);
                facade.addColorStop(0.42, body);
                facade.addColorStop(1, '#708294');
                ctx.fillStyle = facade;
                ctx.fillRect(x, y, w, h);

                ctx.fillStyle = 'rgba(32, 44, 56, 0.18)';
                ctx.fillRect(x, y, Math.max(12, w * 0.045), h);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.10)';
                ctx.fillRect(x + w - Math.max(10, w * 0.035), y, Math.max(10, w * 0.035), h);

                ctx.strokeStyle = 'rgba(44, 54, 64, 0.52)';
                ctx.lineWidth = 8;
                ctx.strokeRect(x, y, w, h);

                const topBandHeight = 34;
                ctx.fillStyle = 'rgba(43, 53, 63, 0.42)';
                ctx.fillRect(x, y, w, topBandHeight);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
                ctx.fillRect(x + 10, y + 7, w - 20, 4);

                const gapX = 28;
                const gapY = 30;
                const bayW = (w - inset * 2 - gapX * (cols - 1)) / cols;
                const bayH = (h - 92 - gapY * (floors - 1)) / floors;

                for (let row = 0; row < floors; row++) {
                    for (let col = 0; col < cols; col++) {
                        const wx = x + inset + col * (bayW + gapX);
                        const wy = y + 58 + row * (bayH + gapY);
                        const windowGrad = ctx.createLinearGradient(wx, wy, wx + bayW, wy + bayH);
                        windowGrad.addColorStop(0, '#647f92');
                        windowGrad.addColorStop(0.48, glass);
                        windowGrad.addColorStop(1, '#314656');
                        ctx.fillStyle = frame;
                        ctx.fillRect(wx - 7, wy - 7, bayW + 14, bayH + 14);
                        ctx.fillStyle = windowGrad;
                        ctx.fillRect(wx, wy, bayW, bayH);

                        ctx.strokeStyle = 'rgba(232, 241, 247, 0.35)';
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.moveTo(wx + bayW * 0.52, wy + 8);
                        ctx.lineTo(wx + bayW * 0.52, wy + bayH - 8);
                        ctx.stroke();

                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.30)';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(wx + bayW * 0.12, wy + bayH * 0.22);
                        ctx.lineTo(wx + bayW * 0.58, wy + bayH * 0.08);
                        ctx.stroke();
                    }
                }

                for (let row = 1; row < floors; row++) {
                    const slabY = y + 40 + row * ((h - 70) / floors);
                    ctx.fillStyle = 'rgba(28, 39, 49, 0.24)';
                    ctx.fillRect(x, slabY, w, 7);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.10)';
                    ctx.fillRect(x + 8, slabY + 7, w - 16, 3);
                }
            }

            function drawDistantTower(x, y, w, h, color, windowColor) {
                const towerGrad = ctx.createLinearGradient(x, y, x + w, y + h);
                towerGrad.addColorStop(0, color);
                towerGrad.addColorStop(1, '#8da0ac');
                ctx.fillStyle = towerGrad;
                ctx.fillRect(x, y, w, h);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.16)';
                ctx.fillRect(x + w * 0.08, y, w * 0.08, h);
                ctx.fillStyle = windowColor;
                const rows = Math.max(4, Math.floor(h / 62));
                for (let row = 0; row < rows; row++) {
                    const wy = y + 24 + row * 48;
                    if (wy > y + h - 28) break;
                    for (let wx = x + 20; wx < x + w - 28; wx += 36) {
                        ctx.fillRect(wx, wy, 16, 13);
                    }
                }
            }

            for (let i = 0; i < 18; i++) {
                const x = i * 126 - 60;
                const h = 210 + ((i * 73) % 190);
                drawDistantTower(x, canvas.height - h + 30, 96 + (i % 3) * 22, h, i % 2 ? '#9aa9b2' : '#aab4ba', 'rgba(232, 242, 248, 0.28)');
            }

            drawBuilding({
                x: -80, y: 165, w: 470, h: 900, body: '#8ea0aa', side: '#748793',
                frame: '#d0d8dd', glass: '#8eaec0', floors: 4, cols: 2, inset: 42
            });
            drawBuilding({
                x: 335, y: 70, w: 560, h: 990, body: '#8799a4', side: '#6d7e8c',
                frame: '#cbd3d9', glass: '#7898ad', floors: 5, cols: 2, inset: 48
            });
            drawBuilding({
                x: 860, y: 125, w: 430, h: 940, body: '#9aa097', side: '#7d867e',
                frame: '#d8d2c8', glass: '#7f9aaa', floors: 4, cols: 2, inset: 38
            });
            drawBuilding({
                x: 1240, y: 35, w: 570, h: 1035, body: '#7f929e', side: '#637884',
                frame: '#c6d0d6', glass: '#88a8b8', floors: 5, cols: 2, inset: 50
            });
            drawBuilding({
                x: 1760, y: 155, w: 370, h: 910, body: '#96908b', side: '#7a7774',
                frame: '#d2cbc3', glass: '#7892a2', floors: 4, cols: 1, inset: 44
            });

            // 窓ガラスそのものの薄い反射。外景を隠さない程度に控えめに光らせる。
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.26)';
            ctx.lineWidth = 14;
            for (let x = -120; x < canvas.width; x += 420) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x + 310, canvas.height);
                ctx.stroke();
            }
            ctx.strokeStyle = 'rgba(76, 103, 122, 0.18)';
            ctx.lineWidth = 10;
            for (let x = 290; x < canvas.width; x += 520) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        const floorWoodTex = createWoodTexture();
        floorWoodTex.repeat.set(roomWidth / 2, roomFullDepth / 2);
        const wallWoodTex = createWoodTexture();
        wallWoodTex.repeat.set(3, 2);
        const floorGeo = new THREE.PlaneGeometry(roomWidth, roomFullDepth);
        const floorMat = new THREE.MeshStandardMaterial({ map: floorWoodTex, roughness: 0.55, metalness: 0.0 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.position.z = roomCenterZ;
        floor.receiveShadow = true;
        scene.add(floor);

        function createWall(w, h, d, x, y, z, color = 0xd0d8e8) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ map: wallWoodTex, color: 0xf4d7aa, roughness: 0.58 });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.set(x, y, z);
            wall.receiveShadow = true;
            wall.castShadow = true;
            scene.add(wall);
        }

        function createXWallSegment(centerX, startZ, endZ, color = 0xd0d8e8, height = roomHeight) {
            const depth = endZ - startZ;
            if (depth <= 0.01) return;
            createWall(0.2, height, depth, centerX, height / 2, startZ + depth / 2, color);
        }

        const backWallZ = roomBackZ;
        // モスグリーンの壁は撤去し、床から天井まで全面ガラス張りにする。
        const windowTopHeight = roomHeight;
        const windowBottomHeight = 0;
        const windowHeight = windowTopHeight - windowBottomHeight;

        const backCityView = new THREE.Mesh(
            new THREE.PlaneGeometry(roomWidth, roomHeight),
            new THREE.MeshBasicMaterial({ map: createCityWindowTexture(), side: THREE.DoubleSide })
        );
        backCityView.position.set(0, roomHeight / 2, backWallZ - 0.08);
        scene.add(backCityView);

        const glassGeo = new THREE.BoxGeometry(roomWidth, windowHeight, 0.05);
        const glassMat = new THREE.MeshStandardMaterial({
            color: 0xd8f0ff, transparent: true, opacity: 0.24,
            emissive: 0x9fd3ff, emissiveIntensity: 0.05, roughness: 0.04, metalness: 0.18
        });
        const glass = new THREE.Mesh(glassGeo, glassMat);
        glass.position.set(0, windowBottomHeight + windowHeight / 2, backWallZ);
        scene.add(glass);

        const frameMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        const windowFrameThickness = 0.05;
        const topFrame = new THREE.Mesh(new THREE.BoxGeometry(roomWidth, windowFrameThickness, 0.24), frameMat);
        // 上側の黒い縁は天井に埋まらないよう、縁の上端だけを天井高に揃える
        topFrame.position.set(0, windowTopHeight - windowFrameThickness / 2, backWallZ);

        const bottomFrame = new THREE.Mesh(new THREE.BoxGeometry(roomWidth, windowFrameThickness, 0.24), frameMat);
        bottomFrame.position.set(0, windowBottomHeight, backWallZ);
        scene.add(bottomFrame);
        
        // ガラス面側の柱・縦桟は除去し、全面をそのままガラス張りにする。

        createWall(0.2, roomHeight, roomFullDepth, roomWidth / 2, roomHeight / 2, roomCenterZ);
        
        // 会議室を除去し、x=-25側は木目調の壁でふさぐ。
        createWall(0.2, roomHeight, roomFullDepth, -roomWidth / 2, roomHeight / 2, roomCenterZ);

        const breakWidth = 10; 
        const breakDepth = -roomBackZ;
        const breakX = -roomWidth / 2 - breakWidth / 2;

        const breakGlassMat = new THREE.MeshStandardMaterial({

        const breakGlass = new THREE.Mesh(new THREE.PlaneGeometry(breakDepth, roomHeight), breakGlassMat);

        const breakGlassGlintMat = new THREE.MeshBasicMaterial({

        });
        [
            { z: -5.95, y: roomHeight * 0.72, h: 1.35, ry: Math.PI / 2 - 0.18 },
            { z: -2.85, y: roomHeight * 0.42, h: 1.05, ry: Math.PI / 2 - 0.18 }
        ].forEach(({ z, y, h, ry }) => {

            glint.rotation.y = ry;

            scene.add(glint);
        });

        const windowFrameMat = new THREE.MeshStandardMaterial({ color: 0xe5ebef, roughness: 0.35 });
        for (let z = roomBackZ; z <= 0.01; z += breakDepth / 3) {
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.12, roomHeight, 0.06), windowFrameMat);
            frame.position.set(-roomWidth / 2 - breakWidth + 0.02, roomHeight / 2, z);
            scene.add(frame);
        }
        for (let y = 0; y <= roomHeight + 0.01; y += roomHeight / 2) {

            frame.position.set(-roomWidth / 2 - breakWidth + 0.02, y, breakZ);
            scene.add(frame);
        }
        createWall(breakWidth, roomHeight, 0.2, breakX, roomHeight/2, 0);

        const breakBackCityView = new THREE.Mesh(

        const breakBackGlass = new THREE.Mesh(new THREE.BoxGeometry(breakWidth, roomHeight, 0.05), breakGlassMat);
        breakBackGlass.position.set(breakX, roomHeight / 2, roomBackZ);
        scene.add(breakBackGlass);

        const alcoveCeilingTex = createWoodTexture();
        alcoveCeilingTex.repeat.set(breakWidth / 2, breakDepth / 2);
        const alcoveCeiling = new THREE.Mesh(new THREE.PlaneGeometry(breakWidth, breakDepth), new THREE.MeshStandardMaterial({ map: alcoveCeilingTex, roughness: 0.55, emissive: 0x080604 }));
        alcoveCeiling.rotation.x = Math.PI / 2;
        alcoveCeiling.position.set(breakX, roomHeight - 0.05, breakZ);
        alcoveCeiling.receiveShadow = true;
        scene.add(alcoveCeiling);
        
        const woodTex = createWoodTexture();
        woodTex.repeat.set(breakWidth / 2, breakDepth / 2);
        const woodFloor = new THREE.Mesh(new THREE.PlaneGeometry(breakWidth, breakDepth), new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.5 }));
        woodFloor.rotation.x = -Math.PI / 2;
        woodFloor.position.set(breakX, 0.005, breakZ);

        const alcoveLight1 = new THREE.PointLight(0xffeedd, 0.5, 12);

        const alcoveLight2 = new THREE.PointLight(0xffeedd, 0.5, 12);

        function createSharedWoodPatch(width, depth, centerX, centerZ, yOffset = 0.007) {
            const patchTex = floorWoodTex.clone();
            patchTex.needsUpdate = true;
            patchTex.repeat.set(width / 4, depth / 4);
            const patch = new THREE.Mesh(
                new THREE.PlaneGeometry(width, depth),
                new THREE.MeshStandardMaterial({ map: patchTex, roughness: 0.55 })
            );
            patch.rotation.x = -Math.PI / 2;
            patch.position.set(centerX, yOffset, centerZ);
            patch.receiveShadow = true;
            scene.add(patch);
            return patch;
        }

        function removeFrontInteriorWalls(minX, maxX, minZ, maxZ) {
            const removable = [];
            const worldPosition = new THREE.Vector3();

            scene.traverse((object) => {
                if (!object.parent || object === floor) return;
                if (!(object.isMesh || object.isLight)) return;
                object.getWorldPosition(worldPosition);
                const insideTargetRange = worldPosition.x >= minX
                    && worldPosition.x <= maxX
                    && worldPosition.z >= minZ
                    && worldPosition.z <= maxZ;
                if (insideTargetRange) removable.push(object);
            });

            removable.forEach((object) => {
                if (object.parent) object.parent.remove(object);
            });

            const targetWidth = maxX - minX;
            const targetDepth = maxZ - minZ;
            const targetCenterX = (minX + maxX) / 2;
            const targetCenterZ = (minZ + maxZ) / 2;

            // メイン床を指定範囲の奥まで延長し、撤去後も一続きの木目床にする。
            createSharedWoodPatch(targetWidth, targetDepth, targetCenterX, targetCenterZ, 0.012);

            // X方向は右側の大外壁だけを足し直し、Z方向の一番奥も外周壁として塞ぐ。
            const shellWallColor = 0xd8d5ca;
            createWall(0.2, roomHeight, targetDepth, maxX + 0.1, roomHeight / 2, targetCenterZ, shellWallColor);
            createWall(targetWidth + 0.4, roomHeight, 0.2, targetCenterX, roomHeight / 2, maxZ + 0.1, shellWallColor);
        }

        removeFrontInteriorWalls(
            ROOM_LAYOUT.outerMinX + SHOWCASE_CLEARANCE,
            ROOM_LAYOUT.outerMaxX - SHOWCASE_CLEARANCE,
            4.23,
            ROOM_LAYOUT.frontMaxZ
        );
        createWall(
            ROOM_LAYOUT.wallThickness,
            roomHeight,
            ROOM_LAYOUT.frontMaxZ - roomDepth / 2,
            ROOM_LAYOUT.outerMinX,
            roomHeight / 2,
            (roomDepth / 2 + ROOM_LAYOUT.frontMaxZ) / 2,
            0xd8d5ca
        );

        // ==========================================
        // メイン天井

        const ceilingGroup = new THREE.Group();
        ceilingGroup.position.y = roomHeight - 0.05; 
        scene.add(ceilingGroup);

        const mainCeilingMinZ = backWallZ;
        const mainCeilingMaxZ = ROOM_LAYOUT.frontMaxZ;
        const mainCeilingDepth = mainCeilingMaxZ - mainCeilingMinZ;
        const mainCeilingCenterZ = (mainCeilingMinZ + mainCeilingMaxZ) / 2;
        const ceilingPlaneGeo = new THREE.PlaneGeometry(roomWidth, mainCeilingDepth);
        const ceilingWoodTex = createWoodTexture();
        ceilingWoodTex.repeat.set(roomWidth / 2, mainCeilingDepth / 2);
        const ceilingPlaneMat = new THREE.MeshStandardMaterial({ map: ceilingWoodTex, roughness: 0.55, emissive: 0x080604 });
        const ceilingPlane = new THREE.Mesh(ceilingPlaneGeo, ceilingPlaneMat);
        ceilingPlane.rotation.x = Math.PI / 2;
        ceilingPlane.position.z = mainCeilingCenterZ;
        ceilingPlane.receiveShadow = true;
        ceilingGroup.add(ceilingPlane);

        // 天井面は木目をそのまま見せるため、白いグリッドは重ねない。

        function createCeilingLight(x, z) {
            const lightGroup = new THREE.Group();
            lightGroup.position.set(x, -0.02, z); 
            ceilingGroup.add(lightGroup);

            const lightCoverGeo = new THREE.BoxGeometry(1.2, 0.03, 0.25);
            const lightCoverMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.8 });
            const lightCover = new THREE.Mesh(lightCoverGeo, lightCoverMat);
            lightCover.castShadow = true;
            lightGroup.add(lightCover);

            const pointLight = new THREE.PointLight(0xfff5e6, 0.15, 12, 2);
            pointLight.position.set(0, -0.1, 0);
            lightGroup.add(pointLight);
        }

        // 蛍光灯は壁へ食い込まないよう、メイン室内だけに配置する。
        // 4本のスイムレーンが x 軸と平行に走るイメージで、Z 方向に4列だけを固定配置。
        const lightSpacingX = 6;
        const lightMarginX = 3.0;
        const lightMarginZ = 1.4;
        const lightLaneCount = 4;
        const lightMinX = -roomWidth / 2 + lightMarginX;
        const lightMaxX = roomWidth / 2 - lightMarginX;
        const lightMinZ = backWallZ + lightMarginZ;
        const lightMaxZ = roomDepth / 2 - lightMarginZ;
        const lightLaneStepZ = (lightMaxZ - lightMinZ) / (lightLaneCount - 1);
        for (let laneIndex = 0; laneIndex < lightLaneCount; laneIndex++) {
            const z = lightMinZ + lightLaneStepZ * laneIndex;
            for (let x = lightMinX; x <= lightMaxX + 0.01; x += lightSpacingX) {
                createCeilingLight(x, z);
            }
        }

        // ==========================================

        const INTERIOR_OBJECTS = EDITABLE_CONFIG.interiorObjects;

        function setMeshShadow(mesh, receive = false) {

            if (receive) mesh.receiveShadow = true;
        }

        function createWoodMarbleCounter(config) {
            const group = new THREE.Group();
            group.name = config.id;
            const counterMinX = config.minX;
            const counterMaxX = config.maxX;
            const counterWidth = counterMaxX - counterMinX;
            const counterDepth = config.depth;
            const counterHeight = config.height;
            const counterTopThickness = config.topThickness;
            const counterCenterX = (counterMinX + counterMaxX) / 2;
            const counterCenterZ = config.centerZ;

            const woodTex = createWoodTexture();
            woodTex.repeat.set(3.5, 1.35);
            const woodMat = new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.58, metalness: 0.03 });
            const marbleTex = createBlackMarbleTexture();
            marbleTex.repeat.set(4.8, 0.8);
            const marbleMat = new THREE.MeshStandardMaterial({
                map: marbleTex,
                color: 0x111111,
                roughness: 0.22,
                metalness: 0.08
            });

            const baseHeight = counterHeight - counterTopThickness;
            const base = new THREE.Mesh(new THREE.BoxGeometry(counterWidth, baseHeight, counterDepth), woodMat);
            base.position.y = baseHeight / 2;
            setMeshShadow(base, true);
            group.add(base);

            const top = new THREE.Mesh(new THREE.BoxGeometry(counterWidth + 0.18, counterTopThickness, counterDepth + 0.14), marbleMat);
            top.position.y = baseHeight + counterTopThickness / 2;
            setMeshShadow(top, true);
            group.add(top);

            const toeKick = new THREE.Mesh(
                new THREE.BoxGeometry(counterWidth - 0.28, 0.18, counterDepth + 0.03),
                new THREE.MeshStandardMaterial({ color: 0x2d1c12, roughness: 0.74 })
            );
            toeKick.position.set(0, 0.09, 0.02);
            setMeshShadow(toeKick);
            group.add(toeKick);

            const panelLineMat = new THREE.MeshStandardMaterial({ color: 0x5b3924, roughness: 0.68 });
            [-counterWidth / 4, 0, counterWidth / 4].forEach((x) => {
                const divider = new THREE.Mesh(new THREE.BoxGeometry(0.035, baseHeight - 0.18, 0.025), panelLineMat);
                divider.position.set(x, baseHeight / 2 + 0.08, counterDepth / 2 + 0.016);
                setMeshShadow(divider);
                group.add(divider);
            });

            group.position.set(counterCenterX, 0, counterCenterZ);
            scene.add(group);
        }

        function createRaisedLatticePlatform() {
            const group = new THREE.Group();
            const platformMinX = 9.0;
            const platformMaxX = 14.0;
            const platformMinZ = -10.0;
            const platformMaxZ = 0.0;
            const platformWidth = platformMaxX - platformMinX;
            const platformHeight = 0.45;
            const platformCenterX = (platformMinX + platformMaxX) / 2;
            const platformCenterZ = (platformMinZ + platformMaxZ) / 2;
            const stepCount = 3;
            const stepDepth = 0.55;
            const stepHeight = platformHeight / stepCount;
            const deckStartZ = platformMaxZ - stepDepth * stepCount;

            const deckTex = createWoodTexture();
            deckTex.repeat.set(platformWidth / 1.2, (deckStartZ - platformMinZ) / 1.2);
            const deckMat = new THREE.MeshStandardMaterial({ map: deckTex, roughness: 0.58, metalness: 0.02 });
            const riserMat = new THREE.MeshStandardMaterial({ color: 0x4a2d1a, roughness: 0.72 });
            const latticeMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.42, metalness: 0.35 });

            const deckDepth = deckStartZ - platformMinZ;
            const deck = new THREE.Mesh(new THREE.BoxGeometry(platformWidth, platformHeight, deckDepth), deckMat);
            deck.position.set(platformCenterX, platformHeight / 2, platformMinZ + deckDepth / 2);
            setMeshShadow(deck, true);
            group.add(deck);

            for (let i = 0; i < stepCount; i++) {
                const currentHeight = stepHeight * (i + 1);
                const stepZ = platformMaxZ - stepDepth * (i + 0.5);
                const step = new THREE.Mesh(new THREE.BoxGeometry(platformWidth, currentHeight, stepDepth), i === stepCount - 1 ? deckMat : riserMat);
                step.position.set(platformCenterX, currentHeight / 2, stepZ);
                setMeshShadow(step, true);
                group.add(step);
            }

            const postSize = 0.08;
            const fenceHeight = 1.15;
            const fenceBaseY = platformHeight;
            const postGeo = new THREE.BoxGeometry(postSize, fenceHeight, postSize);
            const railXGeo = new THREE.BoxGeometry(platformWidth + postSize, 0.045, 0.045);
            const railZGeo = new THREE.BoxGeometry(0.045, 0.045, platformMaxZ - platformMinZ + postSize);
            const railYs = [fenceBaseY + 0.28, fenceBaseY + 0.62, fenceBaseY + 0.96];

            function addPost(x, z) {
                const post = new THREE.Mesh(postGeo, latticeMat);
                post.position.set(x, fenceBaseY + fenceHeight / 2, z);
                setMeshShadow(post);
                group.add(post);
            }

            for (let x = platformMinX; x <= platformMaxX + 0.001; x += 1.0) {
                addPost(x, platformMinZ);
                addPost(x, platformMaxZ);
            }
            for (let z = platformMinZ + 1.0; z < platformMaxZ - 0.001; z += 1.0) {
                addPost(platformMinX, z);
                addPost(platformMaxX, z);
            }

            railYs.forEach((y) => {
                [platformMinZ, platformMaxZ].forEach((z) => {
                    const rail = new THREE.Mesh(railXGeo, latticeMat);
                    rail.position.set(platformCenterX, y, z);
                    setMeshShadow(rail);
                    group.add(rail);
                });
                [platformMinX, platformMaxX].forEach((x) => {
                    const rail = new THREE.Mesh(railZGeo, latticeMat);
                    rail.position.set(x, y, platformCenterZ);
                    setMeshShadow(rail);
                    group.add(rail);
                });
            });

            scene.add(group);
        }


        function createAlignedStudyTableChairs(config) {
            const group = new THREE.Group();
            group.name = config.id;

            const minX = config.minX;
            const maxX = config.maxX;
            const centerZ = config.centerZ;
            const count = config.count || 5;
            const tableWidth = config.tableWidth || 0.82;
            const tableDepth = config.tableDepth || 0.58;
            const tableHeight = config.tableHeight || 0.72;
            const chairOffsetZ = config.chairOffsetZ || 0.58;
            const sideInset = config.sideInset || 0.5;
            const rowMinX = minX + sideInset;
            const rowMaxX = maxX - sideInset;
            const spacing = count > 1 ? (rowMaxX - rowMinX) / (count - 1) : 0;

            const tableMat = new THREE.MeshStandardMaterial({ color: 0xe7ded2, roughness: 0.42, metalness: 0.02 });
            const tableEdgeMat = new THREE.MeshStandardMaterial({ color: 0xb9aa98, roughness: 0.58, metalness: 0.02 });
            const metalMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.38, metalness: 0.62 });
            const seatMat = new THREE.MeshStandardMaterial({ color: 0xf1e7d5, roughness: 0.58, metalness: 0.02 });
            const backWoodTex = createWoodTexture();
            backWoodTex.repeat.set(0.7, 0.35);
            const backMat = new THREE.MeshStandardMaterial({
                map: backWoodTex,
                color: 0xb06f33,
                roughness: 0.62,
                metalness: 0.01
            });

            function addCylinder(parent, radius, height, material, position, rotation = [0, 0, 0], segments = 12) {
                const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radius, radius, height, segments), material);
                mesh.position.set(...position);
                mesh.rotation.set(...rotation);
                setMeshShadow(mesh);
                parent.add(mesh);
                return mesh;
            }

            function createStudyChair(z, rotationY) {
                const chair = new THREE.Group();
                chair.position.z = z;
                chair.rotation.y = rotationY;

                const seat = new THREE.Mesh(new THREE.BoxGeometry(0.42, 0.055, 0.38), seatMat);
                seat.position.y = 0.44;
                setMeshShadow(seat, true);
                chair.add(seat);

                const back = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.34, 0.055), backMat);
                back.position.set(0, 0.76, 0.24);
                setMeshShadow(back);
                chair.add(back);

                const legPositions = [
                    [-0.17, 0.22, -0.14],
                    [0.17, 0.22, -0.14],
                    [-0.17, 0.22, 0.14],
                    [0.17, 0.22, 0.14]
                ];
                legPositions.forEach((position) => addCylinder(chair, 0.014, 0.44, metalMat, position));
                addCylinder(chair, 0.012, 0.52, metalMat, [-0.19, 0.66, 0.18]);
                addCylinder(chair, 0.012, 0.52, metalMat, [0.19, 0.66, 0.18]);
                addCylinder(chair, 0.012, 0.38, metalMat, [0, 0.27, -0.18], [0, 0, Math.PI / 2]);
                addCylinder(chair, 0.012, 0.38, metalMat, [0, 0.56, 0.2], [0, 0, Math.PI / 2]);

                return chair;
            }

            function createTableChairSet(x) {
                const set = new THREE.Group();
                set.position.set(x, 0, centerZ);

                const tableTop = new THREE.Mesh(new THREE.BoxGeometry(tableWidth, 0.055, tableDepth), tableMat);
                tableTop.position.y = tableHeight;
                setMeshShadow(tableTop, true);
                set.add(tableTop);

                const edge = new THREE.Mesh(new THREE.BoxGeometry(tableWidth + 0.04, 0.035, tableDepth + 0.04), tableEdgeMat);
                edge.position.y = tableHeight - 0.04;
                setMeshShadow(edge);
                set.add(edge);

                [
                    [-tableWidth / 2 + 0.08, tableHeight / 2, -tableDepth / 2 + 0.08],
                    [tableWidth / 2 - 0.08, tableHeight / 2, -tableDepth / 2 + 0.08],
                    [-tableWidth / 2 + 0.08, tableHeight / 2, tableDepth / 2 - 0.08],
                    [tableWidth / 2 - 0.08, tableHeight / 2, tableDepth / 2 - 0.08]
                ].forEach((position) => addCylinder(set, 0.017, tableHeight, metalMat, position));

                const lowerBarZ = tableDepth / 2 + 0.04;
                addCylinder(set, 0.012, tableWidth - 0.16, metalMat, [0, 0.32, lowerBarZ], [0, 0, Math.PI / 2]);

                set.add(createStudyChair(chairOffsetZ, 0));
                set.add(createStudyChair(-chairOffsetZ, Math.PI));
                group.add(set);
            }

            for (let i = 0; i < count; i++) {
                createTableChairSet(rowMinX + spacing * i);
            }

            scene.add(group);
        }

        function createCafeTableChairZone(config) {
            const group = new THREE.Group();
            group.name = config.id;

            const tableSize = config.tableSize || 0.82;
            const tableHeight = config.tableHeight || 0.72;
            const tableTopThickness = config.tableTopThickness || 0.075;
            const chairDistance = config.chairDistance || 0.78;

            const lightWoodTex = createWoodTexture();
            lightWoodTex.repeat.set(0.9, 0.9);
            const lightWoodMat = new THREE.MeshStandardMaterial({
                map: lightWoodTex,
                color: 0xf2c98f,
                roughness: 0.56,
                metalness: 0.02
            });
            const edgeWoodMat = new THREE.MeshStandardMaterial({ color: 0xb8793a, roughness: 0.62, metalness: 0.02 });
            const chairWoodTex = createWoodTexture();
            chairWoodTex.repeat.set(0.55, 0.45);
            const chairWoodMat = new THREE.MeshStandardMaterial({
                map: chairWoodTex,
                color: 0xc9853d,
                roughness: 0.64,
                metalness: 0.01
            });
            const metalMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.36, metalness: 0.64 });

            function addBox(parent, size, material, position, rotation = [0, 0, 0]) {
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(...size), material);
                mesh.position.set(...position);
                mesh.rotation.set(...rotation);
                setMeshShadow(mesh, true);
                parent.add(mesh);
                return mesh;
            }

            function addCylinder(parent, radiusTop, radiusBottom, height, material, position, rotation = [0, 0, 0], segments = 24) {
                const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radiusTop, radiusBottom, height, segments), material);
                mesh.position.set(...position);
                mesh.rotation.set(...rotation);
                setMeshShadow(mesh, true);
                parent.add(mesh);
                return mesh;
            }

            function addChairSpindle(parent, x, y, z, height) {
                addCylinder(parent, 0.015, 0.018, height, chairWoodMat, [x, y, z], [0.12 * Math.sign(x || 1), 0, 0], 12);
            }

            function createRoundedWoodChair(angle) {
                const chair = new THREE.Group();
                chair.position.set(Math.sin(angle) * chairDistance, 0, Math.cos(angle) * chairDistance);
                chair.rotation.y = angle + Math.PI;

                addCylinder(chair, 0.24, 0.27, 0.07, chairWoodMat, [0, 0.43, 0], [0, 0, 0], 32);
                addBox(chair, [0.42, 0.05, 0.10], chairWoodMat, [0, 0.42, -0.12]);

                const legPositions = [
                    [-0.18, 0.22, -0.13, -0.16],
                    [0.18, 0.22, -0.13, 0.16],
                    [-0.18, 0.22, 0.14, 0.13],
                    [0.18, 0.22, 0.14, -0.13]
                ];
                legPositions.forEach(([x, y, z, tilt]) => {
                    addCylinder(chair, 0.019, 0.024, 0.43, chairWoodMat, [x, y, z], [tilt, 0, 0.08 * Math.sign(x)], 12);
                });

                addCylinder(chair, 0.018, 0.018, 0.42, chairWoodMat, [-0.24, 0.68, 0.16], [-0.08, 0, -0.03], 12);
                addCylinder(chair, 0.018, 0.018, 0.42, chairWoodMat, [0.24, 0.68, 0.16], [-0.08, 0, 0.03], 12);
                [-0.14, -0.07, 0, 0.07, 0.14].forEach((x) => addChairSpindle(chair, x, 0.67, 0.20, 0.36));

                const topRail = new THREE.Mesh(new THREE.TorusGeometry(0.25, 0.022, 10, 36, Math.PI), chairWoodMat);
                topRail.position.set(0, 0.89, 0.19);
                topRail.rotation.z = Math.PI;
                setMeshShadow(topRail);
                chair.add(topRail);

                const lowerRail = new THREE.Mesh(new THREE.TorusGeometry(0.23, 0.015, 8, 28, Math.PI), chairWoodMat);
                lowerRail.position.set(0, 0.72, 0.18);
                lowerRail.rotation.z = Math.PI;
                setMeshShadow(lowerRail);
                chair.add(lowerRail);

                addCylinder(chair, 0.012, 0.012, 0.46, chairWoodMat, [0, 0.30, -0.18], [0, 0, Math.PI / 2], 12);
                return chair;
            }

            function createCafeSet(placement) {
                const set = new THREE.Group();
                set.position.set(placement.x, 0, placement.z);
                set.rotation.y = placement.rotation || 0;

                const tableTop = addBox(set, [tableSize, tableTopThickness, tableSize], lightWoodMat, [0, tableHeight, 0]);
                tableTop.name = `${config.id}-light-wood-tabletop`;
                addBox(set, [tableSize + 0.05, 0.045, tableSize + 0.05], edgeWoodMat, [0, tableHeight - 0.055, 0]);
                addCylinder(set, 0.065, 0.085, tableHeight - 0.08, metalMat, [0, (tableHeight - 0.08) / 2, 0], [0, 0, 0], 20);
                addCylinder(set, 0.22, 0.28, 0.045, metalMat, [0, 0.035, 0], [0, 0, 0], 32);
                addBox(set, [0.56, 0.035, 0.075], metalMat, [0, 0.055, 0]);
                addBox(set, [0.075, 0.035, 0.56], metalMat, [0, 0.055, 0]);

                set.add(createRoundedWoodChair(placement.chairAngle || Math.PI));
                group.add(set);
            }

            (config.placements || []).forEach(createCafeSet);
            scene.add(group);
        }


        function buildInteriorObject(config) {
            switch (config.type) {
                case 'woodMarbleCounter':
                    createWoodMarbleCounter(config);
                    break;
                case 'raisedLatticePlatform':
                    createRaisedLatticePlatform(config);
                    break;
                case 'alignedStudyTableChairs':
                    createAlignedStudyTableChairs(config);
                    break;
                case 'cafeTableChairZone':
                    createCafeTableChairZone(config);
                    break;
                default:
                    console.warn(`Unknown interior object type: ${config.type}`);
            }
        }

        INTERIOR_OBJECTS.forEach(buildInteriorObject);

        // ==========================================
        // 10. コントローラー (PC & モバイル対応)
        // ==========================================
        const uiLayer = document.getElementById('ui-layer');
        const crosshair = document.getElementById('crosshair');
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        
        let joyMoveX = 0;
        let joyMoveZ = 0;
        let lookTouchId = null;
        let lastTouchX = 0;
        let lastTouchY = 0;
        let isMouseLooking = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        function rotateView(deltaX, deltaY, sensitivity) {
            euler.setFromQuaternion(camera.quaternion);
            euler.y -= deltaX * sensitivity;
            euler.x -= deltaY * sensitivity;
            euler.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, euler.x));
            camera.quaternion.setFromEuler(euler);
        }

        function startGame() {
            if (isPlaying) return;

            if (isTouchDevice) {
                isPlaying = true;
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 300);
                document.getElementById('joystick-zone').style.display = 'block';
                document.getElementById('mobile-exit').style.display = 'flex';

                if (!window.joystickManager) {
                    window.joystickManager = nipplejs.create({
                        zone: document.getElementById('joystick-zone'),
                        mode: 'dynamic',
                        color: 'white',
                        catchDistance: 150
                    });

                    window.joystickManager.on('move', (evt, data) => {
                        joyMoveX = data.vector.x;
                        joyMoveZ = data.vector.y;
                    });

                    window.joystickManager.on('end', () => {
                        joyMoveX = 0;
                        joyMoveZ = 0;
                    });
                }
            } else {
                isPlaying = true;
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 300);
                crosshair.style.display = 'block';
                const lockRequest = document.body.requestPointerLock && document.body.requestPointerLock();
                if (lockRequest && typeof lockRequest.catch === 'function') {
                    lockRequest.catch(() => {});
                }
            }
        }

        uiLayer.addEventListener('click', startGame);
        uiLayer.addEventListener('touchend', (e) => {
            e.preventDefault();
            startGame();
        }, { passive: false });

        document.addEventListener('pointerlockchange', () => {
            isPlaying = document.pointerLockElement === document.body;
            if (isPlaying) {
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 300);
                crosshair.style.display = 'block';
            } else {
                uiLayer.style.display = 'flex';
                setTimeout(() => uiLayer.style.opacity = '1', 10);
                crosshair.style.display = 'none';
            }
        });

        const mobileExit = document.getElementById('mobile-exit');

        function exitMobileGame() {
            isPlaying = false;
            uiLayer.style.display = 'flex';
            setTimeout(() => uiLayer.style.opacity = '1', 10);
            document.getElementById('joystick-zone').style.display = 'none';
            mobileExit.style.display = 'none';
            lookTouchId = null;
            joyMoveX = 0;
            joyMoveZ = 0;
        }

        mobileExit.addEventListener('click', exitMobileGame);
        mobileExit.addEventListener('touchend', (e) => {
            e.preventDefault();
            exitMobileGame();
        }, { passive: false });

        function formatCurrentCoordinates() {
            return `X: ${camera.position.x.toFixed(2)}, Y: ${camera.position.y.toFixed(2)}, Z: ${camera.position.z.toFixed(2)}`;
        }

        function showCopyToast(message) {
            if (!copyToastElement) return;
            copyToastElement.textContent = message;
            copyToastElement.classList.add('visible');
            if (copyToastTimer) clearTimeout(copyToastTimer);
            copyToastTimer = setTimeout(() => {
                copyToastElement.classList.remove('visible');
            }, 1400);
        }

        function copyCurrentCoordinates() {
            const text = formatCurrentCoordinates();
            const fallbackCopy = () => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.setAttribute('readonly', '');
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();
                const copied = document.execCommand('copy');
                document.body.removeChild(textarea);
                return copied;
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => showCopyToast(`座標をコピー: ${text}`))
                    .catch(() => {
                        showCopyToast(fallbackCopy() ? `座標をコピー: ${text}` : '座標コピーに失敗しました');
                    });
                return;
            }

            showCopyToast(fallbackCopy() ? `座標をコピー: ${text}` : '座標コピーに失敗しました');
        }

        if (hudElement) {
            hudElement.addEventListener('click', copyCurrentCoordinates);
            hudElement.addEventListener('touchend', (e) => {
                e.preventDefault();
                copyCurrentCoordinates();
            }, { passive: false });
        }

        document.addEventListener('pointerdown', (event) => {
            if (!isPlaying || event.pointerType !== 'mouse' || document.pointerLockElement === document.body) return;
            if (event.clientX > window.innerWidth / 2) {
                isMouseLooking = true;
                lastMouseX = event.clientX;
                lastMouseY = event.clientY;
            }
        });

        document.addEventListener('pointermove', (event) => {
            if (!isPlaying || event.pointerType !== 'mouse') return;
            if (document.pointerLockElement === document.body) {
                rotateView(event.movementX, event.movementY, 0.002);
                return;
            }
            if (!isMouseLooking) return;

            const deltaX = event.clientX - lastMouseX;
            const deltaY = event.clientY - lastMouseY;
            rotateView(deltaX, deltaY, 0.004);

            lastMouseX = event.clientX;
            lastMouseY = event.clientY;
        });

        document.addEventListener('pointerup', (event) => {
            if (event.pointerType !== 'mouse') return;
            isMouseLooking = false;
        });

        function preventBrowserTouchZoom(e) {
            if (!isTouchDevice) return;
            // iOS Safari can ignore the viewport's user-scalable setting and still
            // enter page zoom/smart-zoom if game gestures are not cancelled.
            // The app implements all touch interactions itself, so while playing we
            // always cancel the browser's default touch handling.
            if (isPlaying) e.preventDefault();
        }

        ['gesturestart', 'gesturechange', 'gestureend'].forEach((eventName) => {
            document.addEventListener(eventName, (e) => e.preventDefault(), { passive: false });
        });

        document.addEventListener('dblclick', (e) => {
            if (isTouchDevice) e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchstart', (e) => {
            preventBrowserTouchZoom(e);
            if (!isPlaying || !isTouchDevice) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.clientX > window.innerWidth / 2) {
                    lookTouchId = t.identifier;
                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                    break;
                }
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            preventBrowserTouchZoom(e);
            if (!isPlaying || !isTouchDevice) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.identifier === lookTouchId) {
                    let deltaX = t.clientX - lastTouchX;
                    let deltaY = t.clientY - lastTouchY;
                    rotateView(deltaX, deltaY, 0.004);

                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                }
            }
        }, { passive: false });

        function clearEndedLookTouch(e) {
            preventBrowserTouchZoom(e);
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === lookTouchId) {
                    lookTouchId = null;
                }
            }
        }

        document.addEventListener('touchend', clearEndedLookTouch, { passive: false });
        document.addEventListener('touchcancel', clearEndedLookTouch, { passive: false });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = true;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = true;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = true;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = true;
            if(e.code === 'KeyC' && !e.repeat) copyCurrentCoordinates();
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = false;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = false;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = false;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = false;
        });

        // ==========================================
        // 11. アニメーションループ & 衝突判定
        // ==========================================
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const moveVector = new THREE.Vector3();
        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1); 
            
            if (isPlaying) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                if (isTouchDevice) {
                    direction.x = joyMoveX;
                    direction.z = joyMoveZ;
                } else {
                    direction.z = Number(keys.w) - Number(keys.s);
                    direction.x = Number(keys.d) - Number(keys.a);
                    direction.normalize(); 
                }

                const speed = 45.0; 
                if (!isTouchDevice) {
                    if (keys.w || keys.s) velocity.z -= direction.z * speed * delta;
                    if (keys.a || keys.d) velocity.x -= direction.x * speed * delta;
                } else {
                    if (Math.abs(direction.z) > 0.05) velocity.z -= direction.z * speed * delta;
                    if (Math.abs(direction.x) > 0.05) velocity.x -= direction.x * speed * delta;
                }

                const previousPosition = camera.position.clone();

                moveVector.setFromMatrixColumn(camera.matrix, 0); 
                camera.position.addScaledVector(moveVector, -velocity.x * delta);
                
                moveVector.crossVectors(camera.up, moveVector); 
                camera.position.addScaledVector(moveVector, -velocity.z * delta);
                
                camera.position.y = 1.6;
                
                // --- 衝突判定 ---
                const wallOffset = 1.5; 
                let boundXMin = -roomWidth / 2 + wallOffset; 
                const boundXMax = roomWidth / 2 - 2.0;
                const boundZMin = roomBackZ + 1.8;
                
                if (camera.position.x < -23.5) {
                    if (camera.position.z > -0.5) camera.position.z = -0.5;
                    if (camera.position.z < -6.5) camera.position.z = -6.5;
                    boundXMin = -34.0;
                }

                if(camera.position.x < boundXMin) camera.position.x = boundXMin;
                if(camera.position.x > boundXMax) camera.position.x = boundXMax; 
                if(camera.position.z < boundZMin) camera.position.z = boundZMin; 
                
                const walkableFrontMaxZ = ROOM_LAYOUT.frontMaxZ - ROOM_LAYOUT.playerWallPadding;

                if (camera.position.z > walkableFrontMaxZ) camera.position.z = walkableFrontMaxZ;
            }

            if (SHOW_COORDINATES && hudElement) {
                hudElement.innerHTML = `POS&nbsp; X:${camera.position.x.toFixed(2)} &nbsp; Z:${camera.position.z.toFixed(2)}<br>Y:${camera.position.y.toFixed(2)} / 5ptメモリ表示中<br><span>クリック or Cキーで座標コピー</span>`;
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
  </script>
</body>
