<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>東西線ラッシュ乗車シミュレーター</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #0b1220;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas {
      display: block;
      touch-action: none;
    }

    #ui-layer {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      padding: 24px;
      color: #f8fafc;
      text-align: center;
      background:
        radial-gradient(circle at 50% 24%, rgba(56, 189, 248, 0.22), transparent 34%),
        linear-gradient(180deg, rgba(2, 6, 23, 0.72), rgba(2, 6, 23, 0.94));
      backdrop-filter: blur(6px);
      cursor: pointer;
      transition: opacity 0.35s ease;
      box-sizing: border-box;
    }

    #ui-layer.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #ui-layer h1 {
      margin: 0;
      font-size: clamp(2rem, 5vw, 4.2rem);
      letter-spacing: 0.12em;
      text-shadow: 0 12px 42px rgba(14, 165, 233, 0.38);
    }

    #ui-layer p {
      margin: 0;
      max-width: 720px;
      color: #cbd5e1;
      line-height: 1.8;
      font-size: clamp(0.95rem, 2.2vw, 1.1rem);
    }

    .start-button {
      margin-top: 12px;
      padding: 14px 28px;
      border: 1px solid rgba(125, 211, 252, 0.62);
      border-radius: 999px;
      color: #082f49;
      background: linear-gradient(135deg, #e0f2fe, #38bdf8);
      box-shadow: 0 16px 42px rgba(56, 189, 248, 0.28);
      font-weight: 800;
      letter-spacing: 0.06em;
    }

    .tips {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      width: min(760px, 92vw);
      margin-top: 6px;
    }

    .tip {
      padding: 14px 12px;
      border: 1px solid rgba(148, 163, 184, 0.24);
      border-radius: 18px;
      background: rgba(15, 23, 42, 0.62);
      color: #dbeafe;
      font-size: 0.92rem;
      line-height: 1.45;
    }

    #hud {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 10;
      width: min(420px, calc(100vw - 32px));
      color: #f8fafc;
      pointer-events: none;
    }

    #mission {
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.72);
      box-shadow: 0 10px 30px rgba(2, 6, 23, 0.28);
      backdrop-filter: blur(8px);
      font-weight: 700;
      line-height: 1.55;
    }

    #subtext {
      margin-top: 8px;
      color: #bae6fd;
      font-size: 0.88rem;
      line-height: 1.45;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.7);
    }

    #status-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(2, 132, 199, 0.76);
      border: 1px solid rgba(186, 230, 253, 0.24);
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    #joystick-zone {
      position: fixed;
      left: 0;
      top: 0;
      bottom: 0;
      width: 52vw;
      display: none;
      z-index: 12;
      touch-action: none;
    }

    #look-zone {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 48vw;
      display: none;
      z-index: 11;
      touch-action: none;
    }

    #mobile-note {
      position: fixed;
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      z-index: 9;
      display: none;
      padding: 8px 12px;
      border-radius: 999px;
      color: rgba(255, 255, 255, 0.78);
      background: rgba(2, 6, 23, 0.52);
      font-size: 0.76rem;
      pointer-events: none;
    }

    @media (max-width: 720px) {
      .tips { grid-template-columns: 1fr; }
      #ui-layer { justify-content: flex-start; padding-top: 8vh; }
      #mission { font-size: 0.92rem; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>
<body>
  <div id="hud">
    <div id="mission">東西線の行列、最後尾です。電車を待っています。</div>
    <div id="subtext">WASD/矢印で移動・マウスドラッグで視点。プレイヤー（青いコート）が表示されたまま動きます。</div>
    <div id="status-row">
      <div class="badge" id="timer-badge">到着まで 5.0 秒</div>
      <div class="badge" id="crowd-badge">混雑度 すでに限界</div>
    </div>
  </div>

  <div id="joystick-zone"></div>
  <div id="look-zone"></div>
  <div id="mobile-note">左半分: 移動 / 右半分: 視点</div>

  <div id="ui-layer">
    <h1>東西線 最後尾</h1>
    <p>ゲーム開始時、あなたはホームの東西線待機列の最後尾にいます。約5秒後、すでにとんでもなく窮屈な電車が入線。前の人たちに続いて、車両へ乗り込んでください。</p>
    <div class="tips" aria-hidden="true">
      <div class="tip">🚶 プレイヤー表示<br>自分の体を見ながら操作</div>
      <div class="tip">🚃 5秒後に入線<br>混みすぎ電車が到着</div>
      <div class="tip">➡️ 最後尾から乗車<br>列が動いたら続く</div>
    </div>
    <div class="start-button">クリック / タップで開始</div>
  </div>

  <script>
    const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

    const uiLayer = document.getElementById('ui-layer');
    const missionEl = document.getElementById('mission');
    const subtextEl = document.getElementById('subtext');
    const timerBadge = document.getElementById('timer-badge');
    const crowdBadge = document.getElementById('crowd-badge');
    const joystickZone = document.getElementById('joystick-zone');
    const lookZone = document.getElementById('look-zone');
    const mobileNote = document.getElementById('mobile-note');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111827);
    scene.fog = new THREE.FogExp2(0x111827, 0.018);

    const camera = new THREE.PerspectiveCamera(66, window.innerWidth / window.innerHeight, 0.1, 220);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputEncoding = THREE.sRGBEncoding;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.92;
    document.body.appendChild(renderer.domElement);

    const clock = new THREE.Clock();
    const keys = new Set();
    const pointer = { dragging: false, lastX: 0, yaw: Math.PI, pitch: -0.12 };
    const mobileMove = new THREE.Vector2();
    const tmpVec = new THREE.Vector3();

    let isPlaying = false;
    let elapsed = 0;
    let trainState = 'waiting';
    let boardingProgress = 0;
    let finalMessageShown = false;

    const colors = {
      platform: 0xc8ccd3,
      yellow: 0xfacc15,
      rail: 0x475569,
      trainBody: 0xd9e5ef,
      trainBlue: 0x12a2db,
      trainDoor: 0x1e293b,
      player: 0x2563eb,
      skin: 0xf2c6a0,
      npcDark: 0x334155,
      npcCoat: 0x64748b
    };

    function mat(color, roughness = 0.72, metalness = 0.02) {
      return new THREE.MeshStandardMaterial({ color, roughness, metalness });
    }

    function addBox(name, size, position, material, cast = true, receive = true) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(size.x, size.y, size.z), material);
      mesh.name = name;
      mesh.position.copy(position);
      mesh.castShadow = cast;
      mesh.receiveShadow = receive;
      scene.add(mesh);
      return mesh;
    }

    function addTextSprite(text, position, options = {}) {
      const canvas = document.createElement('canvas');
      canvas.width = options.width || 512;
      canvas.height = options.height || 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = options.background || 'rgba(2, 6, 23, 0.78)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.strokeStyle = options.border || 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 8;
      ctx.strokeRect(4, 4, canvas.width - 8, canvas.height - 8);
      ctx.fillStyle = options.color || '#f8fafc';
      ctx.font = `bold ${options.fontSize || 42}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);
      const texture = new THREE.CanvasTexture(canvas);
      texture.encoding = THREE.sRGBEncoding;
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
      sprite.position.copy(position);
      sprite.scale.set(options.scaleX || 5, options.scaleY || 1.25, 1);
      scene.add(sprite);
      return sprite;
    }

    const hemi = new THREE.HemisphereLight(0xdbeafe, 0x1e293b, 0.84);
    scene.add(hemi);

    const dir = new THREE.DirectionalLight(0xffffff, 0.92);
    dir.position.set(-12, 16, 10);
    dir.castShadow = true;
    dir.shadow.mapSize.set(2048, 2048);
    dir.shadow.camera.left = -38;
    dir.shadow.camera.right = 38;
    dir.shadow.camera.top = 38;
    dir.shadow.camera.bottom = -38;
    scene.add(dir);

    const platform = addBox('platform', new THREE.Vector3(34, 0.42, 12), new THREE.Vector3(0, -0.22, 0), mat(colors.platform), false, true);
    addBox('platform-edge', new THREE.Vector3(34, 0.08, 0.18), new THREE.Vector3(0, 0.04, -3.04), mat(colors.yellow, 0.45), false, true);
    addBox('track-bed', new THREE.Vector3(34, 0.18, 5.4), new THREE.Vector3(0, -0.34, -6.4), mat(0x1f2937), false, true);
    addBox('rail-left', new THREE.Vector3(34, 0.08, 0.08), new THREE.Vector3(0, -0.16, -5.2), mat(colors.rail, 0.3, 0.5), false, true);
    addBox('rail-right', new THREE.Vector3(34, 0.08, 0.08), new THREE.Vector3(0, -0.16, -7.5), mat(colors.rail, 0.3, 0.5), false, true);

    for (let x = -15; x <= 15; x += 3) {
      addBox('platform-tile-line', new THREE.Vector3(0.025, 0.01, 12), new THREE.Vector3(x, 0.006, 0), mat(0xaeb5bf), false, true);
    }
    for (let z = -2; z <= 5; z += 1.5) {
      addBox('platform-tile-line', new THREE.Vector3(34, 0.01, 0.025), new THREE.Vector3(0, 0.008, z), mat(0xaeb5bf), false, true);
    }

    addBox('back-wall', new THREE.Vector3(34, 4.6, 0.34), new THREE.Vector3(0, 2.15, 5.9), mat(0xe5e7eb), false, true);
    addBox('ceiling-strip', new THREE.Vector3(34, 0.18, 2.2), new THREE.Vector3(0, 4.3, 4.8), mat(0xf8fafc), false, true);
    for (let x = -14; x <= 14; x += 7) {
      addBox('pillar', new THREE.Vector3(0.55, 4.2, 0.55), new THREE.Vector3(x, 1.85, 2.9), mat(0xd1d5db), true, true);
    }
    addTextSprite('東西線  Tōzai Line', new THREE.Vector3(-10, 3.2, 5.68), { scaleX: 5.8, scaleY: 1.0, background: 'rgba(0, 112, 184, 0.95)' });
    addTextSprite('整列乗車', new THREE.Vector3(6.2, 2.7, 5.68), { scaleX: 3.6, scaleY: 0.9, background: 'rgba(15, 23, 42, 0.88)' });

    const train = new THREE.Group();
    train.position.set(-44, 0, -5.45);
    scene.add(train);

    function createTrain() {
      addBoxTo(train, 'train-body', new THREE.Vector3(27, 3.1, 2.7), new THREE.Vector3(0, 1.65, 0), mat(colors.trainBody, 0.52, 0.06));
      addBoxTo(train, 'train-blue-stripe', new THREE.Vector3(27.08, 0.22, 2.74), new THREE.Vector3(0, 1.65, 0.02), mat(colors.trainBlue, 0.45), false, true);
      addBoxTo(train, 'open-door-left', new THREE.Vector3(0.72, 2.18, 0.08), new THREE.Vector3(-1.38, 1.35, 1.38), mat(0x94a3b8, 0.38, 0.2));
      addBoxTo(train, 'open-door-right', new THREE.Vector3(0.72, 2.18, 0.08), new THREE.Vector3(1.38, 1.35, 1.38), mat(0x94a3b8, 0.38, 0.2));
      addBoxTo(train, 'door-gap-dark', new THREE.Vector3(2.12, 2.26, 0.1), new THREE.Vector3(0, 1.36, 1.43), mat(0x020617), false, false);
      addBoxTo(train, 'train-floor', new THREE.Vector3(2.4, 0.12, 2.7), new THREE.Vector3(0, 0.08, 0.25), mat(0x334155), false, true);

      for (let x = -11; x <= 11; x += 4.4) {
        addBoxTo(train, 'window', new THREE.Vector3(2.3, 0.9, 0.08), new THREE.Vector3(x, 2.16, 1.39), mat(0x0f172a, 0.22, 0.12), false, false);
      }
      for (let x = -12.6; x <= 12.6; x += 3.6) {
        addBoxTo(train, 'wheel-shadow', new THREE.Vector3(1.45, 0.42, 0.35), new THREE.Vector3(x, 0.15, -1.15), mat(0x020617), false, false);
      }
    }

    function addBoxTo(parent, name, size, position, material, cast = true, receive = true) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(size.x, size.y, size.z), material);
      mesh.name = name;
      mesh.position.copy(position);
      mesh.castShadow = cast;
      mesh.receiveShadow = receive;
      parent.add(mesh);
      return mesh;
    }

    createTrain();

    function createHuman(options = {}) {
      const group = new THREE.Group();
      const coat = mat(options.coat || colors.npcCoat, 0.62);
      const pants = mat(options.pants || colors.npcDark, 0.66);
      const skin = mat(options.skin || colors.skin, 0.7);
      const hair = mat(options.hair || 0x111827, 0.74);

      const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.27, 0.72, 6, 12), coat);
      body.position.y = 1.1;
      body.castShadow = true;
      group.add(body);

      const head = new THREE.Mesh(new THREE.SphereGeometry(0.23, 16, 12), skin);
      head.position.y = 1.74;
      head.castShadow = true;
      group.add(head);

      const hairCap = new THREE.Mesh(new THREE.SphereGeometry(0.235, 16, 8, 0, Math.PI * 2, 0, Math.PI * 0.52), hair);
      hairCap.position.y = 1.82;
      hairCap.castShadow = true;
      group.add(hairCap);

      const legGeo = new THREE.CapsuleGeometry(0.09, 0.58, 4, 8);
      const leftLeg = new THREE.Mesh(legGeo, pants);
      leftLeg.position.set(-0.11, 0.43, 0);
      leftLeg.castShadow = true;
      group.add(leftLeg);
      const rightLeg = leftLeg.clone();
      rightLeg.position.x = 0.11;
      group.add(rightLeg);

      const armGeo = new THREE.CapsuleGeometry(0.075, 0.62, 4, 8);
      const leftArm = new THREE.Mesh(armGeo, coat);
      leftArm.position.set(-0.34, 1.11, 0.02);
      leftArm.rotation.z = 0.14;
      leftArm.castShadow = true;
      group.add(leftArm);
      const rightArm = leftArm.clone();
      rightArm.position.x = 0.34;
      rightArm.rotation.z = -0.14;
      group.add(rightArm);

      const bag = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.46, 0.32), mat(options.bag || 0x0f172a, 0.58));
      bag.position.set(0.38, 0.92, -0.05);
      bag.castShadow = true;
      group.add(bag);

      group.userData.walkParts = { leftLeg, rightLeg, leftArm, rightArm, body };
      return group;
    }

    const queue = [];
    const crowdInside = [];
    const queueStartZ = 2.8;
    const queueDoorX = 0;
    const queueX = 0;

    for (let i = 0; i < 10; i++) {
      const npc = createHuman({
        coat: [0x475569, 0x6b7280, 0x7c2d12, 0x365314, 0x4338ca][i % 5],
        pants: [0x111827, 0x1f2937, 0x334155][i % 3],
        bag: [0x020617, 0x78350f, 0x172554][i % 3]
      });
      npc.position.set(queueX + (i % 2 ? 0.18 : -0.18), 0, queueStartZ - i * 0.62);
      npc.rotation.y = Math.PI;
      npc.userData.baseIndex = i;
      queue.push(npc);
      scene.add(npc);
    }

    for (let row = 0; row < 5; row++) {
      for (let col = 0; col < 8; col++) {
        const passenger = createHuman({
          coat: [0x0f172a, 0x334155, 0x52525b, 0x1e3a8a, 0x713f12][(row + col) % 5],
          pants: 0x111827,
          bag: 0x020617
        });
        const x = -6.5 + col * 1.85 + (row % 2) * 0.25;
        const z = -5.2 + row * 0.34;
        passenger.position.set(x, 0.08, z);
        passenger.rotation.y = Math.PI + (Math.random() - 0.5) * 0.55;
        passenger.scale.setScalar(0.95 + Math.random() * 0.08);
        crowdInside.push(passenger);
        train.add(passenger);
      }
    }

    const player = createHuman({ coat: colors.player, pants: 0x172554, bag: 0x0f172a });
    player.position.set(queueX, 0, queueStartZ - 10 * 0.62);
    player.rotation.y = Math.PI;
    scene.add(player);

    const playerState = {
      velocity: new THREE.Vector3(),
      target: new THREE.Vector3(player.position.x, player.position.y, player.position.z),
      speed: 2.25,
      radius: 0.32,
      boarded: false
    };

    const pathPoints = [
      new THREE.Vector3(0, 0, -0.3),
      new THREE.Vector3(0, 0, -1.45),
      new THREE.Vector3(0, 0, -2.55),
      new THREE.Vector3(0, 0.05, -4.45),
      new THREE.Vector3(0, 0.08, -5.25)
    ];

    function updateMission() {
      if (elapsed < 5) {
        const rest = Math.max(0, 5 - elapsed);
        missionEl.textContent = '東西線の行列、最後尾です。前の人との距離を保って待ちます。';
        subtextEl.textContent = '約5秒後に電車が入ってきます。ホーム黄色線の内側で待機。';
        timerBadge.textContent = `到着まで ${rest.toFixed(1)} 秒`;
        crowdBadge.textContent = '混雑度 すでに限界';
      } else if (boardingProgress < 0.92) {
        missionEl.textContent = '電車が到着。すでに車内はぎゅうぎゅうです。列の最後として前へ進んでください。';
        subtextEl.textContent = '青いプレイヤーを扉へ。人の流れが詰まるので、少しずつ押し込まれます。';
        timerBadge.textContent = '電車 到着済み';
        crowdBadge.textContent = `乗車列 ${Math.round(boardingProgress * 100)}% 進行`;
      } else {
        missionEl.textContent = '乗車完了。最後尾のあなたも、東西線の朝ラッシュに吸い込まれました。';
        subtextEl.textContent = 'ドア付近まで入れました。息をするスペースは、ほぼありません。';
        timerBadge.textContent = '乗車完了';
        crowdBadge.textContent = '混雑度 200%';
      }
    }

    function lerpPath(points, t) {
      const clamped = Math.max(0, Math.min(1, t));
      const scaled = clamped * (points.length - 1);
      const index = Math.min(points.length - 2, Math.floor(scaled));
      const localT = scaled - index;
      return new THREE.Vector3().lerpVectors(points[index], points[index + 1], localT);
    }

    function updateQueue(delta) {
      if (elapsed >= 5) {
        trainState = 'arrived';
        boardingProgress = Math.min(1, boardingProgress + delta * 0.135);
      }

      queue.forEach((npc, index) => {
        const spacingDelay = index * 0.052;
        const t = Math.max(0, Math.min(1, boardingProgress - spacingDelay));
        const start = new THREE.Vector3(queueX + (index % 2 ? 0.18 : -0.18), 0, queueStartZ - index * 0.62);
        const path = lerpPath(pathPoints, t);
        const target = new THREE.Vector3().lerpVectors(start, path, t);
        const bob = Math.sin((elapsed * 6) + index) * 0.018 * (t > 0 && t < 1 ? 1 : 0);
        npc.position.lerp(target, 1 - Math.pow(0.04, delta));
        npc.position.y = target.y + bob;
        const dx = path.x - start.x;
        const dz = path.z - start.z;
        if (Math.abs(dx) + Math.abs(dz) > 0.001) npc.rotation.y = Math.atan2(dx, dz);
        animateHuman(npc, elapsed + index, t > 0 && t < 1 ? 1 : 0.12);
      });

      if (boardingProgress > 0.87 && !finalMessageShown) {
        finalMessageShown = true;
        crowdBadge.textContent = '混雑度 200%';
      }
    }

    function updateTrain(delta) {
      if (elapsed < 5) {
        const t = elapsed / 5;
        train.position.x = THREE.MathUtils.lerp(-44, -18, t * t);
      } else {
        const t = Math.min(1, (elapsed - 5) / 2.2);
        train.position.x = THREE.MathUtils.lerp(-18, 0, 1 - Math.pow(1 - t, 3));
      }

      train.children.forEach((child, i) => {
        if (child.userData && child.userData.walkParts) return;
        if (child.name === 'train-body') {
          child.position.y = 1.65 + Math.sin(elapsed * 8) * 0.006;
        }
      });

      crowdInside.forEach((passenger, i) => {
        passenger.position.x += Math.sin(elapsed * 2.2 + i) * 0.0009;
        passenger.position.z += Math.cos(elapsed * 2.4 + i) * 0.0007;
        animateHuman(passenger, elapsed + i * 0.1, 0.2);
      });
    }

    function updatePlayer(delta) {
      const input = new THREE.Vector2();
      if (keys.has('KeyW') || keys.has('ArrowUp')) input.y += 1;
      if (keys.has('KeyS') || keys.has('ArrowDown')) input.y -= 1;
      if (keys.has('KeyA') || keys.has('ArrowLeft')) input.x -= 1;
      if (keys.has('KeyD') || keys.has('ArrowRight')) input.x += 1;
      input.add(mobileMove);
      if (input.lengthSq() > 1) input.normalize();

      const forward = new THREE.Vector3(Math.sin(pointer.yaw), 0, Math.cos(pointer.yaw));
      const right = new THREE.Vector3(Math.cos(pointer.yaw), 0, -Math.sin(pointer.yaw));
      const desired = new THREE.Vector3()
        .addScaledVector(forward, input.y)
        .addScaledVector(right, input.x);

      let canMoveFreely = elapsed < 5;
      const flowTarget = lerpPath(pathPoints, Math.max(0, boardingProgress - 0.48));
      if (elapsed >= 5) {
        const pull = flowTarget.clone().sub(player.position);
        pull.y = 0;
        if (pull.length() > 0.05) {
          pull.normalize();
          desired.addScaledVector(pull, 0.72);
        }
      }

      if (desired.lengthSq() > 0.001) {
        desired.normalize();
        playerState.velocity.lerp(desired.multiplyScalar(playerState.speed), 1 - Math.pow(0.02, delta));
      } else {
        playerState.velocity.multiplyScalar(Math.pow(0.08, delta));
      }

      player.position.addScaledVector(playerState.velocity, delta);

      if (canMoveFreely) {
        player.position.x = THREE.MathUtils.clamp(player.position.x, -1.7, 1.7);
        player.position.z = THREE.MathUtils.clamp(player.position.z, -2.2, 3.8);
      } else {
        const targetZ = THREE.MathUtils.clamp(flowTarget.z + 0.2, -5.25, 3.0);
        player.position.z = Math.min(player.position.z, 3.2);
        player.position.z = Math.max(player.position.z, -5.35);
        player.position.x = THREE.MathUtils.clamp(player.position.x, -1.1, 1.1);
        if (boardingProgress > 0.74) {
          player.position.z = THREE.MathUtils.lerp(player.position.z, targetZ, 1 - Math.pow(0.2, delta));
          player.position.x = THREE.MathUtils.lerp(player.position.x, 0, 1 - Math.pow(0.28, delta));
          player.position.y = THREE.MathUtils.lerp(player.position.y, 0.08, 1 - Math.pow(0.12, delta));
          playerState.boarded = true;
        }
      }

      const moveLen = playerState.velocity.length();
      if (moveLen > 0.08) {
        player.rotation.y = Math.atan2(playerState.velocity.x, playerState.velocity.z);
      }
      animateHuman(player, elapsed, Math.min(1, moveLen / playerState.speed));
    }

    function animateHuman(human, time, intensity) {
      const parts = human.userData.walkParts;
      if (!parts) return;
      const swing = Math.sin(time * 8.5) * 0.34 * intensity;
      parts.leftLeg.rotation.x = swing;
      parts.rightLeg.rotation.x = -swing;
      parts.leftArm.rotation.x = -swing * 0.58;
      parts.rightArm.rotation.x = swing * 0.58;
      parts.body.position.y = 1.1 + Math.abs(Math.sin(time * 8.5)) * 0.025 * intensity;
    }

    function updateCamera(delta) {
      const offset = new THREE.Vector3(
        Math.sin(pointer.yaw) * -2.4,
        1.55 + pointer.pitch * 0.55,
        Math.cos(pointer.yaw) * -2.4
      );
      const desiredPos = player.position.clone().add(offset);
      desiredPos.y = Math.max(1.0, desiredPos.y);
      if (player.position.z > -3) desiredPos.z = Math.min(4.9, desiredPos.z);
      camera.position.lerp(desiredPos, 1 - Math.pow(0.02, delta));

      const lookAt = player.position.clone().add(new THREE.Vector3(0, 1.2, 0));
      lookAt.x += Math.sin(pointer.yaw) * 0.65;
      lookAt.z += Math.cos(pointer.yaw) * 0.65;
      camera.lookAt(lookAt);
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = Math.min(0.05, clock.getDelta());
      if (isPlaying) {
        elapsed += delta;
        updateTrain(delta);
        updateQueue(delta);
        updatePlayer(delta);
        updateCamera(delta);
        updateMission();
      } else {
        train.position.x = -44 + Math.sin(performance.now() * 0.001) * 0.6;
        camera.position.set(0, 3.1, 9.2);
        camera.lookAt(0, 1.2, -0.8);
      }
      renderer.render(scene, camera);
    }

    function startGame() {
      if (isPlaying) return;
      isPlaying = true;
      elapsed = 0;
      boardingProgress = 0;
      uiLayer.classList.add('hidden');
      if (isTouchDevice) {
        joystickZone.style.display = 'block';
        lookZone.style.display = 'block';
        mobileNote.style.display = 'block';
      }
    }

    uiLayer.addEventListener('click', startGame);
    uiLayer.addEventListener('touchstart', (event) => {
      event.preventDefault();
      startGame();
    }, { passive: false });

    window.addEventListener('keydown', (event) => {
      keys.add(event.code);
      if (!isPlaying && (event.code === 'Space' || event.code === 'Enter')) startGame();
    });
    window.addEventListener('keyup', (event) => keys.delete(event.code));

    renderer.domElement.addEventListener('pointerdown', (event) => {
      if (!isPlaying || isTouchDevice) return;
      pointer.dragging = true;
      pointer.lastX = event.clientX;
      renderer.domElement.setPointerCapture(event.pointerId);
    });
    renderer.domElement.addEventListener('pointermove', (event) => {
      if (!pointer.dragging || isTouchDevice) return;
      const dx = event.clientX - pointer.lastX;
      pointer.lastX = event.clientX;
      pointer.yaw -= dx * 0.006;
    });
    renderer.domElement.addEventListener('pointerup', (event) => {
      pointer.dragging = false;
      try { renderer.domElement.releasePointerCapture(event.pointerId); } catch (e) {}
    });

    if (isTouchDevice && window.nipplejs) {
      nipplejs.create({
        zone: joystickZone,
        mode: 'static',
        position: { left: '28%', bottom: '24%' },
        color: 'deepskyblue',
        size: 118,
        restOpacity: 0.42
      }).on('move', (event, data) => {
        const force = Math.min(1, data.force || 0);
        const rad = data.angle ? data.angle.radian : 0;
        mobileMove.set(Math.cos(rad) * force, Math.sin(rad) * force);
      }).on('end', () => mobileMove.set(0, 0));

      let lookPointerId = null;
      let lastLookX = 0;
      lookZone.addEventListener('touchstart', (event) => {
        const touch = event.changedTouches[0];
        lookPointerId = touch.identifier;
        lastLookX = touch.clientX;
      }, { passive: false });
      lookZone.addEventListener('touchmove', (event) => {
        for (const touch of event.changedTouches) {
          if (touch.identifier === lookPointerId) {
            pointer.yaw -= (touch.clientX - lastLookX) * 0.008;
            lastLookX = touch.clientX;
          }
        }
        event.preventDefault();
      }, { passive: false });
      lookZone.addEventListener('touchend', () => { lookPointerId = null; }, { passive: false });
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
