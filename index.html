<!DOCTYPE html>
<html lang="ja">
  
  <!-- PR preview test -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>リスキリングセンター3</title>
  <style>
    /* ==========================================
           UI & Base Styles
           ========================================== */
    html, body {
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      margin: 0;
      overflow: hidden;
      background-color: #eef1f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    canvas, #ui-layer, #joystick-zone, #mobile-exit {
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      box-sizing: border-box;
      padding: 7vh 24px max(120px, calc(18px + env(safe-area-inset-bottom)));
      background-color: rgba(15, 20, 25, 0.85);
      color: #ffffff;
      cursor: pointer;
      z-index: 10;
      backdrop-filter: blur(4px);
      transition: opacity 0.3s ease;
      text-align: center;
    }

    #ui-layer h1 {
      margin: 0 0 8px 0;
      font-size: clamp(2rem, 4.8vw, 2.85rem);
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    #ui-layer p {
      margin: 5px 0;
      color: #cbd5e1;
      font-size: 1.1rem;
    }

    .opening-tutorial {
      width: min(700px, 88vw);
      margin: 20px 0 4px;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      opacity: 0.72;
      pointer-events: none;
    }

    .tutorial-card {
      min-height: 158px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 22px;
      background:
        radial-gradient(circle at 50% 35%, rgba(96, 165, 250, 0.18), transparent 44%),
        rgba(255, 255, 255, 0.075);
      box-shadow: inset 0 0 40px rgba(255, 255, 255, 0.035);
    }

    .tutorial-label {
      position: absolute;
      left: 50%;
      bottom: 12px;
      transform: translateX(-50%);
      width: 90%;
      color: rgba(226, 232, 240, 0.92);
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.55);
    }

    .tutorial-device {
      position: absolute;
      left: 50%;
      top: 16px;
      width: 180px;
      height: 96px;
      transform: translateX(-50%) scale(0.92);
      border: 2px solid rgba(226, 232, 240, 0.42);
      border-radius: 22px;
      background: rgba(15, 23, 42, 0.18);
    }

    .tutorial-zone {
      position: absolute;
      top: 9px;
      bottom: 9px;
      width: 50%;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.055);
    }

    .tutorial-zone.left { left: 9px; }
    .tutorial-zone.right { right: 9px; }

    .tutorial-joystick {
      position: absolute;
      left: 38px;
      top: 26px;
      width: 54px;
      height: 54px;
      border: 2px solid rgba(147, 197, 253, 0.74);
      border-radius: 50%;
      box-shadow: 0 0 22px rgba(96, 165, 250, 0.36);
    }

    .tutorial-joystick::after {
      content: '';
      position: absolute;
      left: 17px;
      top: 13px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(191, 219, 254, 0.72);
      box-shadow: 0 0 14px rgba(147, 197, 253, 0.58);
    }

    .tutorial-thumb {
      position: absolute;
      width: 34px;
      height: 48px;
      border-radius: 22px 22px 18px 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.78), rgba(203,213,225,0.34));
      filter: drop-shadow(0 8px 12px rgba(0, 0, 0, 0.35));
    }

    .tutorial-thumb.left {
      left: 72px;
      top: 52px;
      transform: rotate(-20deg);
    }

    .tutorial-thumb.right {
      right: 58px;
      top: 46px;
      transform: rotate(20deg);
    }

    .tutorial-arrows {
      position: absolute;
      inset: 0;
      color: rgba(147, 197, 253, 0.78);
      font-size: 1.65rem;
      line-height: 1;
      text-shadow: 0 0 12px rgba(96, 165, 250, 0.55);
    }

    .tutorial-arrows span {
      position: absolute;
    }

    .tutorial-arrows .up { left: 61px; top: 12px; }
    .tutorial-arrows .down { left: 62px; top: 74px; }
    .tutorial-arrows .left { left: 30px; top: 43px; }
    .tutorial-arrows .right { left: 92px; top: 43px; }

    .tutorial-swipe {
      position: absolute;
      left: 105px;
      top: 38px;
      width: 48px;
      height: 26px;
      border-top: 2px solid rgba(147, 197, 253, 0.86);
      border-radius: 50%;
      transform: rotate(-8deg);
    }

    .tutorial-swipe::before,
    .tutorial-swipe::after {
      content: '';
      position: absolute;
      top: -6px;
      width: 10px;
      height: 10px;
      border-top: 2px solid rgba(147, 197, 253, 0.86);
      border-right: 2px solid rgba(147, 197, 253, 0.86);
    }

    .tutorial-swipe::before {
      left: 0;
      transform: rotate(-140deg);
    }

    .tutorial-swipe::after {
      right: 0;
      transform: rotate(40deg);
    }

    .opening-notes {
      position: absolute;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(760px, 88vw);
      color: rgba(226, 232, 240, 0.82);
      font-size: 0.92rem;
      line-height: 1.7;
      letter-spacing: 0.02em;
      pointer-events: none;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .opening-notes p {
      margin: 2px 0;
      font-size: inherit;
      color: inherit;
    }

    .highlight {
      color: #60a5fa;
      font-weight: bold;
      padding: 0 4px;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 5;
      display: none;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
    }

    #coordinate-hud {
      position: absolute;
      top: 10px;
      left: 10px;
      background-color: rgba(255, 255, 255, 0.72);
      color: rgba(0, 0, 0, 0.72);
      padding: 6px 8px;
      border-radius: 6px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 11px;
      font-weight: 700;
      line-height: 1.35;
      pointer-events: auto;
      z-index: 20;
      display: none;
      cursor: copy;
      user-select: none;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.18);
      border: 1px solid rgba(0, 0, 0, 0.18);
    }

    #coordinate-copy-toast {
      position: absolute;
      top: 10px;
      left: 185px;
      background: rgba(15, 23, 42, 0.82);
      color: #fff;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      pointer-events: none;
      z-index: 21;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    #coordinate-copy-toast.visible {
      opacity: 1;
      transform: translateY(0);
    }

    #joystick-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      z-index: 15;
      display: none;
    }

    #mobile-exit {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border-radius: 50%;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      z-index: 20;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
    }

    @media (max-width: 768px) {
      #ui-layer h1 {
        font-size: 2rem;
      }
      #ui-layer p {
        font-size: 0.9rem;
      }
      #ui-layer {
        padding-top: 5vh;
        padding-bottom: max(104px, calc(14px + env(safe-area-inset-bottom)));
      }
      .opening-tutorial {
        width: min(620px, 92vw);
        margin-top: 16px;
        gap: 12px;
      }
      .tutorial-card {
        min-height: 142px;
      }
      .tutorial-device {
        top: 12px;
        transform: translateX(-50%) scale(0.76);
      }
      .tutorial-label {
        bottom: 12px;
        font-size: 0.78rem;
      }

      .opening-notes {
        width: min(620px, 92vw);
        font-size: 0.78rem;
        line-height: 1.55;
      }
    }

    @media (max-width: 560px) {
      #ui-layer {
        padding-top: 4vh;
        padding-bottom: max(92px, calc(10px + env(safe-area-inset-bottom)));
      }
      .opening-tutorial {
        grid-template-columns: 1fr;
        width: min(320px, 90vw);
        margin-top: 12px;
        gap: 8px;
      }
      .tutorial-card {
        min-height: 112px;
      }
      .tutorial-device {
        top: -2px;
        transform: translateX(-50%) scale(0.58);
      }
      .tutorial-thumb.left {
        top: 36px;
      }
      .tutorial-thumb.right {
        top: 32px;
      }
      .tutorial-label {
        bottom: 8px;
      }

      .opening-notes {
        bottom: max(10px, env(safe-area-inset-bottom));
        font-size: 0.72rem;
      }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>

<body>
  <div id="crosshair"></div>
  <div id="coordinate-hud" title="クリックまたはCキーで現在地の座標をコピー"></div>
  <div id="coordinate-copy-toast" role="status" aria-live="polite"></div>

  <div id="joystick-zone"></div>
  <div id="mobile-exit">?</div>

  <div id="ui-layer">
    <h1>リスキリングセンター3</h1>
    <p id="start-text">タップ（クリック）してゲーム開始</p>
    <div class="opening-tutorial" aria-hidden="true">
      <div class="tutorial-card">
        <div class="tutorial-device">
          <div class="tutorial-zone left"></div>
          <div class="tutorial-joystick"></div>
          <div class="tutorial-arrows">
            <span class="up">↑</span>
            <span class="down">↓</span>
            <span class="left">←</span>
            <span class="right">→</span>
          </div>
        </div>
        <div class="tutorial-thumb left"></div>
        <div class="tutorial-label">左手親指でスティック操作</div>
      </div>
      <div class="tutorial-card">
        <div class="tutorial-device">
          <div class="tutorial-zone right"></div>
          <div class="tutorial-swipe"></div>
        </div>
        <div class="tutorial-thumb right"></div>
        <div class="tutorial-label">右手親指で視点調整</div>
      </div>
    </div>
    <div class="opening-notes" aria-label="補足案内">
      <p>※ ゲーム中にフリーズする場合はリロードしてください</p>
      <p>※ PCの場合はマウス操作可</p>
    </div>
  </div>

  <script>
    // ==========================================
        // デバイス判定 & 開発・デバッグ用設定
        // ==========================================
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const SHOW_COORDINATES = true;
        const SHOW_COORDINATE_GUIDES = true;
        const COORDINATE_GUIDE_STEP = 5;
        const COORDINATE_GUIDE_MIN_X = -40;
        const COORDINATE_GUIDE_MAX_X = 25;
        const COORDINATE_GUIDE_MIN_Z = -20;
        const COORDINATE_GUIDE_MAX_Z = 30;
        
        let isPlaying = false;
        let copyToastTimer = null;

        const hudElement = document.getElementById('coordinate-hud');
        const copyToastElement = document.getElementById('coordinate-copy-toast');
        if (SHOW_COORDINATES) {
            hudElement.style.display = 'block';
        }

        if (isTouchDevice) {
            document.getElementById('start-text').innerHTML = "タップ（クリック）してゲーム開始<br><span style='font-size:0.8rem; color:#aaa;'>(横画面推奨)</span>";
        }

        // ==========================================
        // 1. シーン・カメラ・レンダラーの初期化
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf4f6f9);
        // 日光表現の白みが強くなりすぎないよう、フォグは控えめにする
        scene.fog = new THREE.FogExp2(0xf4f6f9, 0.0035);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 1.6, 0); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding; 
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        // 全体の露出を少し下げ、室内が白飛びしにくいバランスにする
        renderer.toneMappingExposure = 0.86;
        document.body.appendChild(renderer.domElement);

        // ==========================================
        // 2. 照明の設定 
        // ==========================================
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0xaaaaaa, 0.72);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.55);
        dirLight.position.set(-20, 25, -10); 
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 4096; 
        dirLight.shadow.mapSize.height = 4096;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.camera.left = -40;
        dirLight.shadow.camera.right = 40;
        dirLight.shadow.camera.top = 40;
        dirLight.shadow.camera.bottom = -40;
        dirLight.shadow.bias = -0.0005; 
        scene.add(dirLight);

        // ==========================================
        // 3. 空間のベース構築
        // ==========================================
        // X方向は左右を7ポイントずつ縮小し、Z方向はマイナス側だけ10ポイント拡張する。
        const roomWidth = 36;
        const roomDepth = 14;
        const roomBackExtension = 10;
        const roomFrontZ = roomDepth / 2;
        const roomBackZ = -roomDepth / 2 - roomBackExtension;
        const roomFullDepth = roomFrontZ - roomBackZ;
        const roomCenterZ = (roomFrontZ + roomBackZ) / 2;
        const ceilingLowerAmount = 0.5;
        const roomHeight = 5 - ceilingLowerAmount;
        const wallFixtureHeightBoost = 0.6;

        function createCoordinateLabelSprite(text, color = '#0f172a') {
            const canvas = document.createElement('canvas');
            canvas.width = 256;
            canvas.height = 96;
            const ctx = canvas.getContext('2d');
            ctx.font = '700 28px Courier New, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.76)';
            ctx.strokeStyle = 'rgba(15, 23, 42, 0.18)';
            ctx.lineWidth = 3;
            ctx.beginPath();
            if (ctx.roundRect) {
                ctx.roundRect(20, 22, 216, 52, 12);
            } else {
                ctx.rect(20, 22, 216, 52);
            }
            ctx.fill();
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.fillText(text, canvas.width / 2, canvas.height / 2 + 1);

            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            texture.magFilter = THREE.LinearFilter;
            const material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: false,
                depthWrite: false
            });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(3.2, 1.2, 1);
            sprite.renderOrder = 999;
            return sprite;
        }

        function createCoordinateGuideLine(points, color, opacity, lineWidth = 1) {
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            const material = new THREE.LineBasicMaterial({
                color,
                transparent: true,
                opacity,
                depthTest: false,
                depthWrite: false,
                linewidth: lineWidth
            });
            const line = new THREE.Line(geometry, material);
            line.renderOrder = 998;
            return line;
        }

        function createCoordinateGuides() {
            const group = new THREE.Group();
            group.name = 'debug-coordinate-guides';
            const y = 0.035;
            const minX = COORDINATE_GUIDE_MIN_X;
            const maxX = COORDINATE_GUIDE_MAX_X;
            const minZ = COORDINATE_GUIDE_MIN_Z;
            const maxZ = COORDINATE_GUIDE_MAX_Z;
            const step = COORDINATE_GUIDE_STEP;

            for (let x = minX; x <= maxX; x += step) {
                const isAxis = x === 0;
                const line = createCoordinateGuideLine(
                    [new THREE.Vector3(x, y, minZ), new THREE.Vector3(x, y, maxZ)],
                    isAxis ? 0xef4444 : 0x64748b,
                    isAxis ? 0.78 : 0.32,
                    isAxis ? 2 : 1
                );
                group.add(line);

                const label = createCoordinateLabelSprite(`X ${x}`, isAxis ? '#dc2626' : '#334155');
                label.position.set(x, y + 0.58, minZ + 1.2);
                group.add(label);
            }

            for (let z = minZ; z <= maxZ; z += step) {
                const isAxis = z === 0;
                const line = createCoordinateGuideLine(
                    [new THREE.Vector3(minX, y, z), new THREE.Vector3(maxX, y, z)],
                    isAxis ? 0x2563eb : 0x64748b,
                    isAxis ? 0.78 : 0.32,
                    isAxis ? 2 : 1
                );
                group.add(line);

                const label = createCoordinateLabelSprite(`Z ${z}`, isAxis ? '#1d4ed8' : '#334155');
                label.position.set(minX + 1.6, y + 0.58, z);
                group.add(label);
            }

            const originLabel = createCoordinateLabelSprite('X0 / Z0', '#111827');
            originLabel.position.set(0, y + 0.82, 0);
            originLabel.scale.set(3.9, 1.45, 1);
            group.add(originLabel);
            return group;
        }

        if (SHOW_COORDINATE_GUIDES) {
            scene.add(createCoordinateGuides());
        }

        function createCarpetTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#5a6370';
            ctx.fillRect(0, 0, size, size);
            const imgData = ctx.getImageData(0, 0, size, size);
            const data = imgData.data;
            const tileSize = 64; 
            for (let i = 0; i < data.length; i += 4) {
                const x = (i / 4) % size;
                const y = Math.floor((i / 4) / size);
                const noise = (Math.random() - 0.5) * 20;
                const isAltTile = (Math.floor(x / tileSize) % 2 === 0) ^ (Math.floor(y / tileSize) % 2 === 0);
                const weave = isAltTile ? Math.sin(x * 0.8) * 6 : Math.sin(y * 0.8) * 6;
                const borderX = x % tileSize;
                const borderY = y % tileSize;
                let borderDarken = 0;
                if (borderX < 2 || borderY < 2) borderDarken = -12;
                const finalAdjust = noise + weave + borderDarken;
                data[i] = Math.max(0, Math.min(255, data[i] + finalAdjust));    
                data[i+1] = Math.max(0, Math.min(255, data[i+1] + finalAdjust)); 
                data[i+2] = Math.max(0, Math.min(255, data[i+2] + finalAdjust)); 
            }
            ctx.putImageData(imgData, 0, 0);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(roomWidth / 4, roomDepth / 4); 
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createWoodTexture() {
            const size = 1024;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#d4b595'; 
            ctx.fillRect(0, 0, size, size);
            
            ctx.fillStyle = 'rgba(100, 70, 40, 0.06)';
            for(let i = 0; i < 3000; i++) {
                let x = Math.random() * size;
                let y = Math.random() * size;
                let w = Math.random() * 40 + 10;
                let h = Math.random() * 3 + 1;
                ctx.fillRect(x, y, w, h);
            }
            
            ctx.strokeStyle = 'rgba(90, 60, 30, 0.4)';
            ctx.lineWidth = 2;
            const plankHeight = 64; 
            for(let y = 0; y <= size; y += plankHeight) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(size, y);
                ctx.stroke();
                
                let offsetX = (y / plankHeight) % 2 === 0 ? 0 : size / 2;
                ctx.beginPath();
                ctx.moveTo(offsetX, y);
                ctx.lineTo(offsetX, y + plankHeight);
                ctx.stroke();
                
                if(offsetX === 0) {
                    ctx.beginPath();
                    ctx.moveTo(size / 2, y);
                    ctx.lineTo(size / 2, y + plankHeight);
                    ctx.stroke();
                }
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createBlackMarbleTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, size, size);

            for (let i = 0; i < 120; i++) {
                const startX = Math.random() * size;
                const startY = Math.random() * size;
                ctx.beginPath();
                ctx.moveTo(startX, startY);
                for (let j = 0; j < 5; j++) {
                    ctx.lineTo(
                        startX + (Math.random() - 0.5) * 260,
                        startY + j * 34 + (Math.random() - 0.5) * 70
                    );
                }
                const alpha = Math.random() * 0.22 + 0.08;
                ctx.strokeStyle = `rgba(210, 210, 205, ${alpha})`;
                ctx.lineWidth = Math.random() * 2.1 + 0.35;
                ctx.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createMountainMuralTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#e8edf0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            function drawLayer(points, color) {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                points.forEach(([x, y], index) => {
                    if (index === 0) {
                        ctx.lineTo(x * canvas.width, y * canvas.height);
                    } else {
                        ctx.lineTo(x * canvas.width, y * canvas.height);
                    }
                });
                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();
            }

            drawLayer([
                [0.00, 0.18], [0.09, 0.23], [0.18, 0.31], [0.25, 0.33],
                [0.34, 0.45], [0.45, 0.49], [0.55, 0.53], [0.64, 0.54],
                [0.75, 0.61], [0.88, 0.61], [1.00, 0.66]
            ], '#dce8e3');

            drawLayer([
                [0.00, 0.32], [0.07, 0.36], [0.15, 0.43], [0.27, 0.45],
                [0.38, 0.49], [0.50, 0.51], [0.60, 0.58], [0.72, 0.59],
                [0.85, 0.65], [1.00, 0.66]
            ], '#cfe4d1');

            drawLayer([
                [0.00, 0.60], [0.08, 0.57], [0.18, 0.61], [0.28, 0.58],
                [0.40, 0.62], [0.51, 0.63], [0.63, 0.59], [0.74, 0.62],
                [0.86, 0.60], [1.00, 0.64]
            ], '#efe4d1');

            drawLayer([
                [0.00, 0.78], [0.11, 0.76], [0.23, 0.79], [0.35, 0.75],
                [0.49, 0.77], [0.60, 0.72], [0.73, 0.75], [0.86, 0.73],
                [1.00, 0.77]
            ], '#b8d8df');

            ctx.fillStyle = '#23564f';
            for (const tree of [
                [0.56, 0.78, 0.14], [0.60, 0.80, 0.20], [0.65, 0.77, 0.16],
                [0.71, 0.76, 0.24], [0.77, 0.78, 0.18], [0.83, 0.75, 0.22]
            ]) {
                const [x, baseY, h] = tree;
                const cx = x * canvas.width;
                const base = baseY * canvas.height;
                const height = h * canvas.height;
                const width = height * 0.34;
                ctx.beginPath();
                ctx.moveTo(cx, base - height);
                ctx.lineTo(cx - width, base);
                ctx.lineTo(cx + width, base);
                ctx.closePath();
                ctx.fill();
                ctx.fillRect(cx - width * 0.08, base - height * 0.1, width * 0.16, height * 0.2);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createCityWindowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            // 17階の窓越しに見える都内の眺望。地上階の道路ではなく、
            // 遠景の空と中高層ビル群が見える高さにして開放感を出す。
            const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, '#cfe3f5');
            sky.addColorStop(0.45, '#dcecf7');
            sky.addColorStop(0.72, '#eef4f8');
            sky.addColorStop(1, '#cbd7df');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.72)';
            for (const cloud of [
                [210, 170, 155, 34], [520, 120, 210, 42], [1120, 190, 250, 48], [1600, 135, 190, 38]
            ]) {
                const [x, y, w, h] = cloud;
                ctx.beginPath();
                ctx.ellipse(x, y, w, h, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            function drawBuilding({ x, y, w, h, body, side, frame, glass, floors, cols, inset = 26 }) {
                const facade = ctx.createLinearGradient(x, y, x + w, y + h);
                facade.addColorStop(0, side);
                facade.addColorStop(0.42, body);
                facade.addColorStop(1, '#708294');
                ctx.fillStyle = facade;
                ctx.fillRect(x, y, w, h);

                ctx.fillStyle = 'rgba(32, 44, 56, 0.18)';
                ctx.fillRect(x, y, Math.max(12, w * 0.045), h);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.10)';
                ctx.fillRect(x + w - Math.max(10, w * 0.035), y, Math.max(10, w * 0.035), h);

                ctx.strokeStyle = 'rgba(44, 54, 64, 0.52)';
                ctx.lineWidth = 8;
                ctx.strokeRect(x, y, w, h);

                const topBandHeight = 34;
                ctx.fillStyle = 'rgba(43, 53, 63, 0.42)';
                ctx.fillRect(x, y, w, topBandHeight);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
                ctx.fillRect(x + 10, y + 7, w - 20, 4);

                const gapX = 28;
                const gapY = 30;
                const bayW = (w - inset * 2 - gapX * (cols - 1)) / cols;
                const bayH = (h - 92 - gapY * (floors - 1)) / floors;

                for (let row = 0; row < floors; row++) {
                    for (let col = 0; col < cols; col++) {
                        const wx = x + inset + col * (bayW + gapX);
                        const wy = y + 58 + row * (bayH + gapY);
                        const windowGrad = ctx.createLinearGradient(wx, wy, wx + bayW, wy + bayH);
                        windowGrad.addColorStop(0, '#647f92');
                        windowGrad.addColorStop(0.48, glass);
                        windowGrad.addColorStop(1, '#314656');
                        ctx.fillStyle = frame;
                        ctx.fillRect(wx - 7, wy - 7, bayW + 14, bayH + 14);
                        ctx.fillStyle = windowGrad;
                        ctx.fillRect(wx, wy, bayW, bayH);

                        ctx.strokeStyle = 'rgba(232, 241, 247, 0.35)';
                        ctx.lineWidth = 4;
                        ctx.beginPath();
                        ctx.moveTo(wx + bayW * 0.52, wy + 8);
                        ctx.lineTo(wx + bayW * 0.52, wy + bayH - 8);
                        ctx.stroke();

                        ctx.strokeStyle = 'rgba(255, 255, 255, 0.30)';
                        ctx.lineWidth = 3;
                        ctx.beginPath();
                        ctx.moveTo(wx + bayW * 0.12, wy + bayH * 0.22);
                        ctx.lineTo(wx + bayW * 0.58, wy + bayH * 0.08);
                        ctx.stroke();
                    }
                }

                for (let row = 1; row < floors; row++) {
                    const slabY = y + 40 + row * ((h - 70) / floors);
                    ctx.fillStyle = 'rgba(28, 39, 49, 0.24)';
                    ctx.fillRect(x, slabY, w, 7);
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.10)';
                    ctx.fillRect(x + 8, slabY + 7, w - 16, 3);
                }
            }

            function drawDistantTower(x, y, w, h, color, windowColor) {
                const towerGrad = ctx.createLinearGradient(x, y, x + w, y + h);
                towerGrad.addColorStop(0, color);
                towerGrad.addColorStop(1, '#8da0ac');
                ctx.fillStyle = towerGrad;
                ctx.fillRect(x, y, w, h);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.16)';
                ctx.fillRect(x + w * 0.08, y, w * 0.08, h);
                ctx.fillStyle = windowColor;
                const rows = Math.max(4, Math.floor(h / 62));
                for (let row = 0; row < rows; row++) {
                    const wy = y + 24 + row * 48;
                    if (wy > y + h - 28) break;
                    for (let wx = x + 20; wx < x + w - 28; wx += 36) {
                        ctx.fillRect(wx, wy, 16, 13);
                    }
                }
            }

            for (let i = 0; i < 18; i++) {
                const x = i * 126 - 60;
                const h = 210 + ((i * 73) % 190);
                drawDistantTower(x, canvas.height - h + 30, 96 + (i % 3) * 22, h, i % 2 ? '#9aa9b2' : '#aab4ba', 'rgba(232, 242, 248, 0.28)');
            }

            drawBuilding({
                x: -80, y: 165, w: 470, h: 900, body: '#8ea0aa', side: '#748793',
                frame: '#d0d8dd', glass: '#8eaec0', floors: 4, cols: 2, inset: 42
            });
            drawBuilding({
                x: 335, y: 70, w: 560, h: 990, body: '#8799a4', side: '#6d7e8c',
                frame: '#cbd3d9', glass: '#7898ad', floors: 5, cols: 2, inset: 48
            });
            drawBuilding({
                x: 860, y: 125, w: 430, h: 940, body: '#9aa097', side: '#7d867e',
                frame: '#d8d2c8', glass: '#7f9aaa', floors: 4, cols: 2, inset: 38
            });
            drawBuilding({
                x: 1240, y: 35, w: 570, h: 1035, body: '#7f929e', side: '#637884',
                frame: '#c6d0d6', glass: '#88a8b8', floors: 5, cols: 2, inset: 50
            });
            drawBuilding({
                x: 1760, y: 155, w: 370, h: 910, body: '#96908b', side: '#7a7774',
                frame: '#d2cbc3', glass: '#7892a2', floors: 4, cols: 1, inset: 44
            });

            // 窓ガラスそのものの薄い反射。外景を隠さない程度に控えめに光らせる。
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.26)';
            ctx.lineWidth = 14;
            for (let x = -120; x < canvas.width; x += 420) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x + 310, canvas.height);
                ctx.stroke();
            }
            ctx.strokeStyle = 'rgba(76, 103, 122, 0.18)';
            ctx.lineWidth = 10;
            for (let x = 290; x < canvas.width; x += 520) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        const floorWoodTex = createWoodTexture();
        floorWoodTex.repeat.set(roomWidth / 2, roomFullDepth / 2);
        const wallWoodTex = createWoodTexture();

        const floorGeo = new THREE.PlaneGeometry(roomWidth, roomFullDepth);

        function createWall(w, h, d, x, y, z, color = 0xd0d8e8) {

        const backWallZ = roomBackZ;

        const glassGeo = new THREE.BoxGeometry(roomWidth, windowHeight, 0.05);
        const glassMat = new THREE.MeshStandardMaterial({

        });

        const frameMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });

        // 上側の黒い縁は天井に埋まらないよう、縁の上端だけを天井高に揃える

        // ガラス面側の柱・縦桟は除去し、全面をそのままガラス張りにする。

        // 会議室を除去し、x=-25側は木目調の壁でふさぐ。

        const breakWidth = 10;

        [

        createWall(breakWidth, roomHeight, 0.2, breakX, roomHeight/2, 0);

        const breakBackGlass = new THREE.Mesh(new THREE.BoxGeometry(breakWidth, roomHeight, 0.05), breakGlassMat);

        const alcoveCeilingTex = createWoodTexture();

        const alcoveCeiling = new THREE.Mesh(new THREE.PlaneGeometry(breakWidth, breakDepth), new THREE.MeshStandardMaterial({ map: alcoveCeilingTex, roughness: 0.55, emissive: 0x080604 }));
        alcoveCeiling.rotation.x = Math.PI / 2;
        alcoveCeiling.position.set(breakX, roomHeight - 0.05, breakZ);
        alcoveCeiling.receiveShadow = true;
        scene.add(alcoveCeiling);
        
        const woodTex = createWoodTexture();
        woodTex.repeat.set(breakWidth / 2, breakDepth / 2);
        const woodFloor = new THREE.Mesh(new THREE.PlaneGeometry(breakWidth, breakDepth), new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.5 }));

        // ==========================================

        // ドアを背にして左側（-X方向）へ、ドア1枚分離した位置に少し狭めたくぼみを追加
        const leftNicheWidthReduction = 0.4;

        function createInsetGlassPanelX(surfaceX, startZ, endZ) {

            ctx.fillRect(78, 72, 46, canvas.height - 144);

        function createEntranceFloorTexture() {

            ctx.fillStyle = '#cfc8ad';
            ctx.fillRect(0, 0, size, size);
            const colors = ['rgba(70, 112, 63, 0.78)', 'rgba(93, 135, 77, 0.62)', 'rgba(226, 213, 183, 0.72)', 'rgba(176, 169, 141, 0.44)'];
            for (let i = 0; i < 2600; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const radiusX = Math.random() * 5 + 1.5;
                const radiusY = Math.random() * 2.5 + 0.8;
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(Math.random() * Math.PI);
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                ctx.beginPath();
                ctx.ellipse(0, 0, radiusX, radiusY, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            ctx.strokeStyle = 'rgba(95, 105, 85, 0.18)';
            ctx.lineWidth = 2;
            for (let i = 0; i <= size; i += 64) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, size);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(size, i);
                ctx.stroke();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(entranceWidth / 2.2, entranceDepth / 2.2);

        const lightMaxZ = roomDepth / 2 - lightMarginZ;

        // ==========================================
        // 室内側ガラス沿いの鉢植え
        // ==========================================
        function createGlassSidePottedPlant({ x, z, height, style, rotationY = 0 }) {
            const plantGroup = new THREE.Group();
            plantGroup.position.set(x, 0, z);
            plantGroup.rotation.y = rotationY;

            const potHeight = entranceInsetGlass.bottomY;
            const potTopRadius = 0.27;
            const potBottomRadius = 0.21;
            const potMat = new THREE.MeshStandardMaterial({ color: 0x8a5a38, roughness: 0.78, metalness: 0.02 });
            const rimMat = new THREE.MeshStandardMaterial({ color: 0x6f4026, roughness: 0.72 });
            const soilMat = new THREE.MeshStandardMaterial({ color: 0x2f2118, roughness: 1.0 });
            const leafMats = [0x1f5d2a, 0x2f7a35, 0x4f9b42, 0x6fbf58].map((color) =>
                new THREE.MeshStandardMaterial({ color, roughness: 0.82, side: THREE.DoubleSide })
            );
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x526b2f, roughness: 0.88 });

            const pot = new THREE.Mesh(new THREE.CylinderGeometry(potTopRadius, potBottomRadius, potHeight, 24), potMat);
            pot.position.y = potHeight / 2;
            pot.castShadow = true;
            pot.receiveShadow = true;
            plantGroup.add(pot);

            const rim = new THREE.Mesh(new THREE.CylinderGeometry(potTopRadius * 1.08, potTopRadius * 1.02, 0.08, 24), rimMat);
            rim.position.y = potHeight - 0.02;
            rim.castShadow = true;
            plantGroup.add(rim);

            const soil = new THREE.Mesh(new THREE.CylinderGeometry(potTopRadius * 0.92, potTopRadius * 0.88, 0.025, 24), soilMat);
            soil.position.y = potHeight + 0.03;
            plantGroup.add(soil);

            function addLeaf(y, length, width, angle, tilt, matIndex, bend = 0) {
                const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 8), leafMats[matIndex % leafMats.length]);
                leaf.scale.set(width, 0.035, length);
                leaf.position.set(Math.sin(angle) * bend, y, Math.cos(angle) * bend);
                leaf.rotation.set(tilt, angle, 0);
                leaf.castShadow = true;
                plantGroup.add(leaf);
            }

            if (style === 'fan') {
                const trunkHeight = height - potHeight - 0.08;
                const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.055, trunkHeight, 10), stemMat);
                stem.position.y = potHeight + trunkHeight / 2;
                stem.castShadow = true;
                plantGroup.add(stem);

                for (let i = 0; i < 18; i++) {
                    const angle = (Math.PI * 2 * i) / 18;
                    const y = Math.min(height - 0.04, potHeight + trunkHeight * (0.7 + (i % 4) * 0.1));
                    addLeaf(y, 0.48 + (i % 3) * 0.08, 0.12, angle, -0.55 - (i % 2) * 0.18, i, 0.12);
                }
            } else if (style === 'broad') {
                for (let i = 0; i < 15; i++) {
                    const angle = (Math.PI * 2 * i) / 15;
                    const stemHeight = height - potHeight - 0.05 - (i % 5) * 0.035;
                    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.026, stemHeight, 8), stemMat);
                    stem.position.set(Math.sin(angle) * 0.08, potHeight + stemHeight / 2, Math.cos(angle) * 0.08);
                    stem.rotation.z = Math.sin(angle) * 0.18;
                    stem.rotation.x = Math.cos(angle) * 0.18;
                    plantGroup.add(stem);
                    addLeaf(potHeight + stemHeight, 0.34 + (i % 4) * 0.05, 0.18 + (i % 3) * 0.03, angle, -0.82, i, 0.2);
                }
            } else if (style === 'lush') {
                for (let i = 0; i < 46; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const layer = Math.random();
                    const y = potHeight + 0.18 + layer * (height - potHeight - 0.12);
                    const radius = 0.08 + layer * 0.24 + Math.random() * 0.12;
                    addLeaf(y, 0.32 + Math.random() * 0.22, 0.13 + Math.random() * 0.1, angle, -0.45 - Math.random() * 0.75, i, radius);
                }
                for (let i = 0; i < 16; i++) {
                    const angle = (Math.PI * 2 * i) / 16;
                    const vine = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.018, 0.46 + Math.random() * 0.25, 7), stemMat);
                    vine.position.set(Math.sin(angle) * 0.23, potHeight + 0.52 + Math.random() * 0.18, Math.cos(angle) * 0.23);
                    vine.rotation.z = Math.sin(angle) * 0.45;
                    vine.rotation.x = Math.cos(angle) * 0.45;
                    plantGroup.add(vine);
                }
            }

            scene.add(plantGroup);
        }

        // ==========================================
        // 4. 柱と植物の装飾生成
        // ==========================================
        function addProceduralFoliage(pillarGroup) {
            const foliageGroup = new THREE.Group();
            const leafColors = [0x2e5a1c, 0x3a7023, 0x478c2b, 0x5cb338, 0x76c449, 0x8edb5a];
            const flowerColors = [0xffffff, 0xfffdf0, 0xffeb3b]; 
            const leafGeo = new THREE.IcosahedronGeometry(0.14, 0);
            const flowerGeo = new THREE.IcosahedronGeometry(0.06, 0);
            const pillarHalfSize = 0.75; 
            const topY = roomHeight; 

            for (let i = 0; i < 150; i++) {
                const mat = new THREE.MeshStandardMaterial({ color: leafColors[Math.floor(Math.random() * leafColors.length)], roughness: 0.8, flatShading: true });
                const leaf = new THREE.Mesh(leafGeo, mat);
                const angle = Math.random() * Math.PI * 2;
                const radius = pillarHalfSize + (Math.random() * 0.1 - 0.05); 
                
                let px = Math.cos(angle) * radius;
                let pz = Math.sin(angle) * radius;
                if (Math.abs(px) > Math.abs(pz)) {
                    px = Math.sign(px) * pillarHalfSize;
                    pz = pz / Math.abs(Math.cos(angle)) * pillarHalfSize;
                } else {
                    pz = Math.sign(pz) * pillarHalfSize;
                    px = px / Math.abs(Math.sin(angle)) * pillarHalfSize;
                }
                
                leaf.position.set(px + (Math.random()*0.2 - 0.1), topY - 0.1 - (Math.random()*0.3), pz + (Math.random()*0.2 - 0.1));
                const scale = 0.8 + Math.random() * 1.5;
                leaf.scale.set(scale, scale, scale);
                leaf.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                leaf.castShadow = true;
                foliageGroup.add(leaf);
            }

            for (let v = 0; v < 40; v++) {
                const vineLength = Math.floor(Math.random() * 6) + 2; 
                const isXEdge = Math.random() > 0.5;
                const signX = Math.random() > 0.5 ? 1 : -1;
                const signZ = Math.random() > 0.5 ? 1 : -1;
                let basePathX, basePathZ;
                
                if(isXEdge) {
                    basePathX = signX * (pillarHalfSize + 0.02); 
                    basePathZ = (Math.random() - 0.5) * (pillarHalfSize * 2 - 0.2);
                } else {
                    basePathX = (Math.random() - 0.5) * (pillarHalfSize * 2 - 0.2);
                    basePathZ = signZ * (pillarHalfSize + 0.02);
                }

                for (let l = 0; l < vineLength; l++) {
                    const mat = new THREE.MeshStandardMaterial({ color: leafColors[Math.floor(Math.random() * leafColors.length)], roughness: 0.9, flatShading: true });
                    const leaf = new THREE.Mesh(leafGeo, mat);
                    const dropY = topY - 0.2 - (l * 0.18) - (Math.random() * 0.1);
                    leaf.position.set(basePathX + (Math.random()*0.08 - 0.04), dropY, basePathZ + (Math.random()*0.08 - 0.04));
                    
                    const scale = 1.2 - (l * 0.15) + (Math.random() * 0.3);
                    if (scale > 0.2) {
                        leaf.scale.set(scale, scale, scale);
                        leaf.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                        leaf.castShadow = true;
                        foliageGroup.add(leaf);

                        if (Math.random() > 0.85) {
                            const fMat = new THREE.MeshStandardMaterial({ color: flowerColors[Math.floor(Math.random() * flowerColors.length)], roughness: 0.4, flatShading: true });
                            const flower = new THREE.Mesh(flowerGeo, fMat);
                            flower.position.copy(leaf.position);
                            flower.position.x += (Math.random() * 0.1 - 0.05);
                            flower.position.y -= (Math.random() * 0.05);
                            flower.position.z += (Math.random() * 0.1 - 0.05);
                            foliageGroup.add(flower);
                        }
                    }
                }
            }
            pillarGroup.add(foliageGroup);
        }

        function createPillar(x, z) {
            const pillarGroup = new THREE.Group();

        function createDeskChairModel(color) {
            const chairGroup = new THREE.Group();

            const whiteMat = new THREE.MeshStandardMaterial({ color: 0xf8f9fa, roughness: 0.5 });

                const leg = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.03, baseRadius), blackMat);
                leg.position.set(Math.sin(rad) * baseRadius/2, 0.04, Math.cos(rad) * baseRadius/2);
                leg.rotation.y = rad;
                leg.castShadow = true;
                chairGroup.add(leg);

            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.22), metalMat);
            pole.position.y = 0.16;
            chairGroup.add(pole);
            
            const seatShell = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.20, 0.04, 24), whiteMat);
            seatShell.position.y = 0.30;
            seatShell.scale.set(1.05, 1, 0.95);
            seatShell.castShadow = true;
            chairGroup.add(seatShell);
            
            const seat = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.24, 0.05, 24), cushionMat);
            seat.position.y = 0.34;
            seat.scale.set(1.05, 1, 0.95);
            seat.castShadow = true;
            chairGroup.add(seat);
            
            const backShell = new THREE.Mesh(new THREE.CylinderGeometry(0.24, 0.08, 0.03, 32), whiteMat);
            backShell.rotation.x = Math.PI / 2;
            backShell.position.set(0, 0.58, -0.23);
            backShell.scale.set(1.1, 1.4, 1);
            chairGroup.add(backShell);
            
            const back = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.09, 0.03, 32), cushionMat);

            const handleMesh = new THREE.Mesh(new THREE.TorusGeometry(0.05, 0.012, 8, 16, Math.PI), blackMat);

            chairGroup.add(handleMesh);
            
            return chairGroup;
        }

        const freeSeatTableHeight = 0.72;

        function createFreeSeatTable() {
            const group = new THREE.Group();
            const tableWidth = 1.35;
            const tableDepth = 1.35;
            const tableHeight = freeSeatTableHeight;
            const topThickness = 0.06;
            const topMat = new THREE.MeshStandardMaterial({ color: 0x8a8173, roughness: 0.62 });
            const legMat = new THREE.MeshStandardMaterial({ color: 0x6f685e, roughness: 0.72, metalness: 0.05 });
            const rollerMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.48, metalness: 0.25 });

            const top = new THREE.Mesh(new THREE.BoxGeometry(tableWidth, topThickness, tableDepth), topMat);
            top.position.y = tableHeight;
            setMeshShadow(top, true);
            group.add(top);

            const legGeo = new THREE.BoxGeometry(0.07, tableHeight - 0.08, 0.07);
            const rollerGeo = new THREE.CylinderGeometry(0.075, 0.075, 0.045, 18);

        function createRaisedLatticePlatform() {
            const group = new THREE.Group();
            const platformMinX = 9.0;
            const platformMaxX = 14.0;
            const platformMinZ = -10.0;
            const platformMaxZ = 0.0;
            const platformWidth = platformMaxX - platformMinX;
            const platformHeight = 0.45;
            const platformCenterX = (platformMinX + platformMaxX) / 2;
            const platformCenterZ = (platformMinZ + platformMaxZ) / 2;
            const stepCount = 3;
            const stepDepth = 0.55;
            const stepHeight = platformHeight / stepCount;
            const deckStartZ = platformMaxZ - stepDepth * stepCount;

            const deckTex = createWoodTexture();
            deckTex.repeat.set(platformWidth / 1.2, (deckStartZ - platformMinZ) / 1.2);
            const deckMat = new THREE.MeshStandardMaterial({ map: deckTex, roughness: 0.58, metalness: 0.02 });
            const riserMat = new THREE.MeshStandardMaterial({ color: 0x4a2d1a, roughness: 0.72 });
            const latticeMat = new THREE.MeshStandardMaterial({ color: 0x050505, roughness: 0.42, metalness: 0.35 });

            const deckDepth = deckStartZ - platformMinZ;
            const deck = new THREE.Mesh(new THREE.BoxGeometry(platformWidth, platformHeight, deckDepth), deckMat);
            deck.position.set(platformCenterX, platformHeight / 2, platformMinZ + deckDepth / 2);
            setMeshShadow(deck, true);
            group.add(deck);

            for (let i = 0; i < stepCount; i++) {
                const currentHeight = stepHeight * (i + 1);
                const stepZ = platformMaxZ - stepDepth * (i + 0.5);
                const step = new THREE.Mesh(new THREE.BoxGeometry(platformWidth, currentHeight, stepDepth), i === stepCount - 1 ? deckMat : riserMat);
                step.position.set(platformCenterX, currentHeight / 2, stepZ);
                setMeshShadow(step, true);
                group.add(step);
            }

            const postSize = 0.08;
            const fenceHeight = 1.15;
            const fenceBaseY = platformHeight;
            const postGeo = new THREE.BoxGeometry(postSize, fenceHeight, postSize);
            const railXGeo = new THREE.BoxGeometry(platformWidth + postSize, 0.045, 0.045);
            const railZGeo = new THREE.BoxGeometry(0.045, 0.045, platformMaxZ - platformMinZ + postSize);
            const railYs = [fenceBaseY + 0.28, fenceBaseY + 0.62, fenceBaseY + 0.96];

            function addPost(x, z) {
                const post = new THREE.Mesh(postGeo, latticeMat);
                post.position.set(x, fenceBaseY + fenceHeight / 2, z);
                setMeshShadow(post);
                group.add(post);
            }

            for (let x = platformMinX; x <= platformMaxX + 0.001; x += 1.0) {
                addPost(x, platformMinZ);
                addPost(x, platformMaxZ);
            }
            for (let z = platformMinZ + 1.0; z < platformMaxZ - 0.001; z += 1.0) {
                addPost(platformMinX, z);
                addPost(platformMaxX, z);
            }

            railYs.forEach((y) => {
                [platformMinZ, platformMaxZ].forEach((z) => {
                    const rail = new THREE.Mesh(railXGeo, latticeMat);
                    rail.position.set(platformCenterX, y, z);
                    setMeshShadow(rail);
                    group.add(rail);
                });
                [platformMinX, platformMaxX].forEach((x) => {
                    const rail = new THREE.Mesh(railZGeo, latticeMat);
                    rail.position.set(x, y, platformCenterZ);
                    setMeshShadow(rail);
                    group.add(rail);
                });
            });

            scene.add(group);
        }

        function createLockerBank(startX, endX, zPos) {
            const lockerGroup = new THREE.Group();
            const depth = 1.0;
            const height = 2.0 + wallFixtureHeightBoost;
            const rows = 4;
            const doorHeight = height / rows;
            const colWidth = doorHeight;
            const originalColWidth = 0.4;
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe5e7eb, roughness: 0.7 });
            const handleMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 }); 
            const labelMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 }); 
            // x=3付近からアルコーブ右側までを一続きで空け、端に1列だけ残らないようにする
            const leftAlcoveLockerRemovalStart = alcoveStart - originalColWidth * 5;
            const rightAlcoveLockerRemovalEnd = alcoveEnd + originalColWidth * 3.2;
            const lockerHalfWidth = colWidth / 2;
            // x=-12付近側からロッカー1列分を削る
            const trimmedStartX = startX + colWidth;
            for(let x = trimmedStartX; x <= endX; x += colWidth) {
                const overlapsAlcoveClearance =
                    x + lockerHalfWidth > leftAlcoveLockerRemovalStart &&
                    x - lockerHalfWidth < rightAlcoveLockerRemovalEnd;
                if (overlapsAlcoveClearance) continue;
                const bodyGeo = new THREE.BoxGeometry(colWidth, height, depth);
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.set(x, height / 2, zPos - depth / 2);
                body.castShadow = true;
                body.receiveShadow = true;
                lockerGroup.add(body);
                for(let r = 0; r < rows; r++) {
                    const doorY = (r * doorHeight) + (doorHeight / 2);
                    const handleGeo = new THREE.BoxGeometry(colWidth * 0.3, 0.03, 0.02);
                    const handle = new THREE.Mesh(handleGeo, handleMat);
                    handle.position.set(x + colWidth * 0.2, doorY + (doorHeight * 0.3), zPos - depth);
                    lockerGroup.add(handle);
                    const labelGeo = new THREE.PlaneGeometry(colWidth * 0.12, doorHeight * 0.12);
                    const label = new THREE.Mesh(labelGeo, labelMat);
                    label.position.set(x - colWidth * 0.2, doorY + (doorHeight * 0.1), zPos - depth - 0.005);
                    label.rotation.y = Math.PI; 
                    lockerGroup.add(label);
                    if (r > 0) {
                        const lineGeo = new THREE.BoxGeometry(colWidth, 0.005, 0.01);
                        const lineMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
                        const line = new THREE.Mesh(lineGeo, lineMat);
                        line.position.set(x, r * doorHeight, zPos - depth);
                        lockerGroup.add(line);
                    }
                }
            }
            scene.add(lockerGroup);
        }

        // ==========================================
        // 9. 人物配置（3Dポリゴン）
        // ==========================================
        const PERSON_SCALE = 0.7;
        const skinPalette = [0xf0c7a6, 0xd9a67c, 0xc98f65, 0x8d5b3f, 0xf5d7bd];
        const shirtPalette = [0x2f80ed, 0xf2c94c, 0x56ccf2, 0xbb6bd9, 0xeb5757, 0x27ae60, 0x4f4f4f, 0x2d9cdb];
        const pantsPalette = [0x1f2937, 0x374151, 0x2b4c7e, 0x4b5563, 0x5a4635];
        const hairPalette = [0x1f120b, 0x3a2416, 0x5c4033, 0x111827, 0xc89f62];

        function makePersonMaterial(color, roughness = 0.72) {
            return new THREE.MeshStandardMaterial({ color, roughness, flatShading: true });
        }

        function createLowPolyPerson({ pose = 'standing', variant = 0 } = {}) {
            const person = new THREE.Group();
            person.scale.setScalar(PERSON_SCALE);

            const skinMat = makePersonMaterial(skinPalette[variant % skinPalette.length], 0.68);
            const shirtMat = makePersonMaterial(shirtPalette[variant % shirtPalette.length], 0.78);
            const pantsMat = makePersonMaterial(pantsPalette[variant % pantsPalette.length], 0.82);
            const hairMat = makePersonMaterial(hairPalette[variant % hairPalette.length], 0.86);
            const shoeMat = makePersonMaterial(0x202020, 0.7);

            const isSeated = pose === 'seated';
            const isLeaning = pose === 'leaning';
            const isWalking = pose === 'walking';
            const hipY = isSeated ? 0.74 : 0.98;
            const torsoY = isSeated ? 1.10 : 1.42;
            const headY = isSeated ? 1.54 : 1.88;

            const hip = new THREE.Mesh(new THREE.BoxGeometry(0.38, 0.18, 0.34), pantsMat);
            hip.position.y = hipY;
            hip.castShadow = true;
            person.add(hip);

            const torso = new THREE.Mesh(new THREE.CylinderGeometry(0.26, 0.32, 0.72, 6), shirtMat);
            torso.position.y = torsoY;
            torso.rotation.z = isLeaning ? 0.13 : 0;
            torso.castShadow = true;
            person.add(torso);

            const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.075, 0.08, 8), skinMat);
            neck.position.y = headY - 0.27;
            person.add(neck);

            const head = new THREE.Mesh(new THREE.DodecahedronGeometry(0.23, 0), skinMat);
            head.position.y = headY;
            head.castShadow = true;
            person.add(head);

            const hair = new THREE.Mesh(new THREE.SphereGeometry(0.245, 8, 5, 0, Math.PI * 2, 0, Math.PI * 0.55), hairMat);
            hair.position.set(0, headY + 0.07, -0.015);
            hair.castShadow = true;
            person.add(hair);

            const shoulderY = torsoY + 0.2;
            const armGeo = new THREE.CylinderGeometry(0.055, 0.055, 0.58, 6);
            [-1, 1].forEach((side) => {
                const upperArm = new THREE.Mesh(armGeo, skinMat);
                upperArm.position.set(side * 0.33, shoulderY - 0.11, isSeated ? 0.08 : 0.02);
                upperArm.rotation.z = side * (isSeated ? 0.25 : 0.15);
                upperArm.rotation.x = isSeated ? -0.92 : (isWalking ? side * 0.34 : -0.08);
                upperArm.castShadow = true;
                person.add(upperArm);

                const hand = new THREE.Mesh(new THREE.DodecahedronGeometry(0.07, 0), skinMat);
                hand.position.set(side * 0.38, isSeated ? 1.02 : 1.12, isSeated ? 0.32 : side * (isWalking ? 0.12 : 0.03));
                hand.castShadow = true;
                person.add(hand);
            });

            const legGeo = new THREE.CylinderGeometry(0.075, 0.085, isSeated ? 0.54 : 0.86, 6);
            [-1, 1].forEach((side) => {
                const leg = new THREE.Mesh(legGeo, pantsMat);
                leg.position.set(side * 0.12, isSeated ? 0.46 : 0.52, isSeated ? 0.22 : 0);
                leg.rotation.x = isSeated ? Math.PI / 2.7 : (isWalking ? side * 0.18 : 0);
                leg.castShadow = true;
                person.add(leg);

                const shoe = new THREE.Mesh(new THREE.BoxGeometry(0.13, 0.055, 0.24), shoeMat);
                shoe.position.set(side * 0.12, 0.055, isSeated ? 0.47 : (isWalking ? side * 0.12 : 0.03));
                shoe.rotation.y = isWalking ? side * 0.08 : 0;
                shoe.castShadow = true;
                person.add(shoe);
            });

            return person;
        }

        const peoplePlacements = [];

        // ==========================================
        // 10. コントローラー (PC & モバイル対応)
        // ==========================================
        const uiLayer = document.getElementById('ui-layer');
        const crosshair = document.getElementById('crosshair');
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        
        let joyMoveX = 0;
        let joyMoveZ = 0;
        let lookTouchId = null;
        let lastTouchX = 0;
        let lastTouchY = 0;
        let isMouseLooking = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        function rotateView(deltaX, deltaY, sensitivity) {
            euler.setFromQuaternion(camera.quaternion);
            euler.y -= deltaX * sensitivity;
            euler.x -= deltaY * sensitivity;
            euler.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, euler.x));
            camera.quaternion.setFromEuler(euler);
        }

        function startGame() {
            if (isPlaying) return;

            if (isTouchDevice) {
                isPlaying = true;
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 300);
                document.getElementById('joystick-zone').style.display = 'block';
                document.getElementById('mobile-exit').style.display = 'flex';

                if (!window.joystickManager) {
                    window.joystickManager = nipplejs.create({
                        zone: document.getElementById('joystick-zone'),
                        mode: 'dynamic',
                        color: 'white',
                        catchDistance: 150
                    });

                    window.joystickManager.on('move', (evt, data) => {
                        joyMoveX = data.vector.x;
                        joyMoveZ = data.vector.y;
                    });

                    window.joystickManager.on('end', () => {
                        joyMoveX = 0;
                        joyMoveZ = 0;
                    });
                }
            } else {
                isPlaying = true;
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 300);
                crosshair.style.display = 'block';
                const lockRequest = document.body.requestPointerLock && document.body.requestPointerLock();
                if (lockRequest && typeof lockRequest.catch === 'function') {
                    lockRequest.catch(() => {});
                }
            }
        }

        uiLayer.addEventListener('click', startGame);
        uiLayer.addEventListener('touchend', (e) => {
            e.preventDefault();
            startGame();
        }, { passive: false });

        document.addEventListener('pointerlockchange', () => {
            isPlaying = document.pointerLockElement === document.body;
            if (isPlaying) {
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 300);
                crosshair.style.display = 'block';
            } else {
                uiLayer.style.display = 'flex';

        const mobileExit = document.getElementById('mobile-exit');

        function exitMobileGame() {

            uiLayer.style.display = 'flex';
            setTimeout(() => uiLayer.style.opacity = '1', 10);

        mobileExit.addEventListener('touchend', (e) => {
