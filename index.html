<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>東西線ラッシュ・ボーディング</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      background: #101827;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic", sans-serif;
    }

    canvas, #move-zone, #look-zone, #start-layer, #hud, #mobile-exit {
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    #start-layer {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: grid;
      place-items: center;
      padding: 24px;
      color: #f8fafc;
      text-align: center;
      cursor: pointer;
      background:
        radial-gradient(circle at 50% 30%, rgba(56, 189, 248, 0.24), transparent 34%),
        linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(2, 6, 23, 0.96));
      backdrop-filter: blur(6px);
      box-sizing: border-box;
    }

    .start-card {
      width: min(760px, 92vw);
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 28px;
      padding: clamp(22px, 5vw, 42px);
      background: rgba(15, 23, 42, 0.62);
      box-shadow: 0 30px 90px rgba(0, 0, 0, 0.46), inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2rem, 6vw, 4.1rem);
      letter-spacing: 0.08em;
      line-height: 1.04;
    }

    .subtitle {
      margin: 0 0 22px;
      color: #bae6fd;
      font-size: clamp(1rem, 2.8vw, 1.35rem);
      font-weight: 700;
    }

    .mission {
      display: grid;
      gap: 10px;
      margin: 20px auto;
      max-width: 640px;
      color: #dbeafe;
      line-height: 1.7;
    }

    .controls {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-top: 22px;
    }

    .control-card {
      border-radius: 18px;
      padding: 14px 12px;
      color: #e2e8f0;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 0.94rem;
    }

    .start-button {
      display: inline-block;
      margin-top: 24px;
      padding: 13px 28px;
      border-radius: 999px;
      color: #082f49;
      background: linear-gradient(135deg, #7dd3fc, #fef08a);
      font-weight: 900;
      letter-spacing: 0.08em;
      box-shadow: 0 12px 34px rgba(125, 211, 252, 0.28);
    }

    #hud {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 8;
      width: min(420px, calc(100vw - 32px));
      pointer-events: none;
      color: #f8fafc;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.72);
    }

    #status {
      display: inline-block;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(2, 6, 23, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.16);
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    #message {
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(15, 23, 42, 0.66);
      border: 1px solid rgba(255, 255, 255, 0.14);
      line-height: 1.55;
    }

    #meter {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 8;
      width: min(520px, calc(100vw - 34px));
      transform: translateX(-50%);
      color: #e0f2fe;
      pointer-events: none;
      text-align: center;
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.72);
    }

    #bar-shell {
      height: 14px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.18);
      box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.28);
    }

    #bar-fill {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #38bdf8, #facc15, #fb7185);
      transition: width 0.18s ease;
    }

    #move-zone, #look-zone {
      position: fixed;
      top: 0;
      bottom: 0;
      z-index: 7;
      display: none;
    }

    #move-zone { left: 0; width: 50%; }
    #look-zone { right: 0; width: 50%; }

    #mobile-exit {
      position: fixed;
      right: 18px;
      top: 18px;
      z-index: 11;
      display: none;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      color: white;
      background: rgba(2, 6, 23, 0.56);
      border: 1px solid rgba(255, 255, 255, 0.25);
      font-weight: 900;
      cursor: pointer;
    }

    .hidden { opacity: 0; pointer-events: none; }

    @media (max-width: 620px) {
      .controls { grid-template-columns: 1fr; }
      .mission { font-size: 0.92rem; }
      #hud { font-size: 0.9rem; }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>
<body>
  <div id="hud">
    <div id="status">発車待ち</div>
    <div id="message">東西線のホーム。あなたは行列の最後尾です。まもなく電車が入ってきます。</div>
  </div>
  <div id="meter">
    <div id="bar-shell"><div id="bar-fill"></div></div>
    <div id="meter-label">乗車率 0%</div>
  </div>
  <div id="move-zone"></div>
  <div id="look-zone"></div>
  <div id="mobile-exit">×</div>
  <div id="start-layer">
    <div class="start-card">
      <h1>東西線<br>ラッシュ・ボーディング</h1>
      <p class="subtitle">最後尾から、すでに満員の車両へ乗り込め。</p>
      <div class="mission">
        <div>ゲーム開始時、あなたは東西線ホームの行列に並んでいます。</div>
        <div>約5秒後、ホームに電車が入線。車内は最初からとんでもなく窮屈です。</div>
        <div>列が動き出したら、自分自身のアバターを押し出すように操作して乗車してください。</div>
      </div>
      <div class="controls">
        <div class="control-card">PC: WASD / 矢印キーで移動、マウスドラッグで視点</div>
        <div class="control-card">スマホ: 左半分スティックで移動、右半分スワイプで視点</div>
      </div>
      <div class="start-button">クリック / タップで開始</div>
    </div>
  </div>

  <script>
    const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xbdd8ef);
    scene.fog = new THREE.Fog(0xbdd8ef, 28, 86);

    const camera = new THREE.PerspectiveCamera(68, window.innerWidth / window.innerHeight, 0.1, 220);
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const clock = new THREE.Clock();
    const keys = {};
    const moveVector = new THREE.Vector2();
    const lookDelta = new THREE.Vector2();
    let yaw = 0;
    let pitch = -0.12;
    let started = false;
    let trainArrived = false;
    let doorsOpen = false;
    let boarded = false;
    let elapsed = 0;
    let trainX = -35;
    let crowdPushTimer = 0;

    const statusEl = document.getElementById('status');
    const messageEl = document.getElementById('message');
    const barFill = document.getElementById('bar-fill');
    const meterLabel = document.getElementById('meter-label');
    const startLayer = document.getElementById('start-layer');
    const moveZone = document.getElementById('move-zone');
    const lookZone = document.getElementById('look-zone');
    const mobileExit = document.getElementById('mobile-exit');

    const materials = {
      platform: new THREE.MeshStandardMaterial({ color: 0x8f99a8, roughness: 0.9 }),
      tactile: new THREE.MeshStandardMaterial({ color: 0xf4c542, roughness: 0.8 }),
      wall: new THREE.MeshStandardMaterial({ color: 0xe6edf3, roughness: 0.72 }),
      rail: new THREE.MeshStandardMaterial({ color: 0x202833, roughness: 0.52, metalness: 0.35 }),
      tozaiBlue: new THREE.MeshStandardMaterial({ color: 0x1e9bd7, roughness: 0.38, metalness: 0.25 }),
      trainBody: new THREE.MeshStandardMaterial({ color: 0xdfe6ea, roughness: 0.45, metalness: 0.24 }),
      window: new THREE.MeshStandardMaterial({ color: 0x1c2d3b, roughness: 0.2, metalness: 0.1, transparent: true, opacity: 0.82 }),
      glass: new THREE.MeshStandardMaterial({ color: 0x9bd8ff, transparent: true, opacity: 0.24, roughness: 0.16 }),
      black: new THREE.MeshStandardMaterial({ color: 0x111827, roughness: 0.8 }),
      skin: new THREE.MeshStandardMaterial({ color: 0xf0b58d, roughness: 0.74 }),
      playerJacket: new THREE.MeshStandardMaterial({ color: 0x2563eb, roughness: 0.68 }),
      goal: new THREE.MeshStandardMaterial({ color: 0x22c55e, transparent: true, opacity: 0.34, roughness: 0.35 })
    };

    function addBox(name, size, position, material, cast = true, receive = true) {
      const mesh = new THREE.Mesh(new THREE.BoxGeometry(size.x, size.y, size.z), material);
      mesh.name = name;
      mesh.position.copy(position);
      mesh.castShadow = cast;
      mesh.receiveShadow = receive;
      scene.add(mesh);
      return mesh;
    }

    function addCylinder(name, radiusTop, radiusBottom, height, position, material, segments = 24) {
      const mesh = new THREE.Mesh(new THREE.CylinderGeometry(radiusTop, radiusBottom, height, segments), material);
      mesh.name = name;
      mesh.position.copy(position);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      scene.add(mesh);
      return mesh;
    }

    function createTextSprite(text, opts = {}) {
      const canvas = document.createElement('canvas');
      canvas.width = opts.width || 1024;
      canvas.height = opts.height || 256;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = opts.bg || 'rgba(255,255,255,0.92)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = opts.color || '#0f172a';
      ctx.font = `900 ${opts.fontSize || 72}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);
      const texture = new THREE.CanvasTexture(canvas);
      const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(opts.w || 6, opts.h || 1.4), material);
      return mesh;
    }

    const hemi = new THREE.HemisphereLight(0xffffff, 0x4b5563, 0.72);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xffffff, 1.25);
    sun.position.set(-16, 20, 10);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.left = -32;
    sun.shadow.camera.right = 32;
    sun.shadow.camera.top = 32;
    sun.shadow.camera.bottom = -32;
    scene.add(sun);

    // Platform and station
    addBox('platform', new THREE.Vector3(42, 0.35, 10), new THREE.Vector3(0, -0.18, 1.2), materials.platform, false, true);
    addBox('trackBed', new THREE.Vector3(42, 0.42, 5.2), new THREE.Vector3(0, -0.38, -5.2), materials.black, false, true);
    addBox('edgeWarning', new THREE.Vector3(42, 0.04, 0.22), new THREE.Vector3(0, 0.02, -2.05), materials.tactile, false, true);
    for (let x = -19; x <= 19; x += 2.1) {
      addBox('tactileBlock', new THREE.Vector3(1.25, 0.045, 0.55), new THREE.Vector3(x, 0.05, -1.52), materials.tactile, false, true);
      addBox('rail', new THREE.Vector3(0.16, 0.16, 42), new THREE.Vector3(x * 0.05, -0.08, -4.4), materials.rail, true, true).rotation.y = Math.PI / 2;
    }
    addBox('backWall', new THREE.Vector3(42, 4.2, 0.35), new THREE.Vector3(0, 2.0, 6.2), materials.wall, false, true);
    addBox('ceiling', new THREE.Vector3(42, 0.26, 12), new THREE.Vector3(0, 4.25, 0.5), materials.wall, false, true);
    for (let x = -18; x <= 18; x += 6) {
      addBox('pillar', new THREE.Vector3(0.55, 4.2, 0.55), new THREE.Vector3(x, 2.0, 3.8), new THREE.MeshStandardMaterial({ color: 0xd1d9e4, roughness: 0.8 }), true, true);
      addBox('lightPanel', new THREE.Vector3(3.8, 0.06, 0.55), new THREE.Vector3(x, 4.08, 0.6), new THREE.MeshBasicMaterial({ color: 0xfff7d6 }), false, false);
    }
    const stationSign = createTextSprite('東西線  T  ラッシュホーム', { w: 8.6, h: 1.1, bg: '#0ea5e9', color: '#ffffff', fontSize: 68 });
    stationSign.position.set(-9.5, 2.85, 6.0);
    scene.add(stationSign);

    // Train group enters from left and stops at platform edge.
    const train = new THREE.Group();
    scene.add(train);
    const trainBody = addBox('trainBody', new THREE.Vector3(25.5, 3.15, 3.05), new THREE.Vector3(0, 1.38, -3.85), materials.trainBody, true, true);
    const blueStripe = addBox('tozaiStripe', new THREE.Vector3(25.7, 0.32, 3.12), new THREE.Vector3(0, 1.74, -3.84), materials.tozaiBlue, false, false);
    const doorLeft = addBox('leftDoor', new THREE.Vector3(1.28, 2.35, 0.08), new THREE.Vector3(-0.72, 1.25, -2.28), materials.window, true, true);
    const doorRight = addBox('rightDoor', new THREE.Vector3(1.28, 2.35, 0.08), new THREE.Vector3(0.72, 1.25, -2.28), materials.window, true, true);
    const goalZone = addBox('boardingGoal', new THREE.Vector3(2.2, 1.8, 1.25), new THREE.Vector3(0, 0.95, -3.2), materials.goal, false, false);
    goalZone.visible = false;
    train.add(trainBody, blueStripe, doorLeft, doorRight, goalZone);
    for (let x = -11; x <= 11; x += 3.6) {
      const win = addBox('trainWindow', new THREE.Vector3(1.8, 0.86, 0.09), new THREE.Vector3(x, 1.98, -2.25), materials.window, true, true);
      train.add(win);
    }
    const tozaiMark = createTextSprite('東西線', { w: 2.2, h: 0.64, bg: '#ffffff', color: '#0ea5e9', fontSize: 86 });
    tozaiMark.position.set(-8.2, 0.78, -2.22);
    train.add(tozaiMark);
    train.position.x = trainX;

    function createPerson(opts = {}) {
      const g = new THREE.Group();
      const jacket = new THREE.MeshStandardMaterial({ color: opts.color || 0x334155, roughness: 0.78 });
      const pants = new THREE.MeshStandardMaterial({ color: opts.pants || 0x111827, roughness: 0.84 });
      const body = new THREE.Mesh(new THREE.BoxGeometry(0.46, 0.9, 0.26), jacket);
      body.position.y = 1.0;
      const head = new THREE.Mesh(new THREE.SphereGeometry(0.2, 18, 14), materials.skin);
      head.position.y = 1.58;
      const hair = new THREE.Mesh(new THREE.SphereGeometry(0.205, 18, 8), materials.black);
      hair.scale.y = 0.58;
      hair.position.y = 1.72;
      const legL = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.72, 0.16), pants);
      legL.position.set(-0.13, 0.35, 0);
      const legR = legL.clone();
      legR.position.x = 0.13;
      const armL = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.74, 0.14), jacket);
      armL.position.set(-0.34, 0.94, 0);
      const armR = armL.clone();
      armR.position.x = 0.34;
      [body, head, hair, legL, legR, armL, armR].forEach((m) => { m.castShadow = true; m.receiveShadow = true; g.add(m); });
      g.userData = { legL, legR, armL, armR, baseZ: 0, queueIndex: opts.queueIndex || 0, speed: 0.75 + Math.random() * 0.3 };
      return g;
    }

    const player = createPerson({ color: 0x2563eb, pants: 0x172554 });
    player.name = 'playerAvatar';
    player.position.set(0, 0, 4.95);
    player.rotation.y = Math.PI;
    scene.add(player);

    const npcColors = [0x475569, 0x7c2d12, 0x14532d, 0x581c87, 0x3f3f46, 0x0f766e, 0x92400e, 0x334155];
    const queue = [];
    const packed = [];
    for (let i = 0; i < 13; i++) {
      const p = createPerson({ color: npcColors[i % npcColors.length], queueIndex: i });
      p.position.set((i % 2 ? 0.32 : -0.32), 0, 4.25 - i * 0.47);
      p.rotation.y = Math.PI;
      scene.add(p);
      queue.push(p);
    }
    for (let i = 0; i < 42; i++) {
      const p = createPerson({ color: npcColors[(i + 2) % npcColors.length] });
      p.scale.setScalar(0.94 + Math.random() * 0.12);
      p.position.set(-5.5 + Math.random() * 11, 0, -3.52 + Math.random() * 1.42);
      p.rotation.y = Math.PI + (Math.random() - 0.5) * 0.5;
      train.add(p);
      packed.push(p);
    }

    // Door crowd at the opening, making the train look packed before boarding.
    for (let i = 0; i < 12; i++) {
      const p = createPerson({ color: npcColors[(i + 5) % npcColors.length] });
      p.scale.setScalar(0.92);
      p.position.set(-1.15 + (i % 4) * 0.75, 0, -2.45 - Math.floor(i / 4) * 0.35);
      p.rotation.y = Math.PI + (Math.random() - 0.5) * 0.35;
      train.add(p);
      packed.push(p);
    }

    function createArrowMarker() {
      const g = new THREE.Group();
      const mat = new THREE.MeshBasicMaterial({ color: 0x22c55e, transparent: true, opacity: 0.76 });
      const cone = new THREE.Mesh(new THREE.ConeGeometry(0.28, 0.55, 4), mat);
      cone.rotation.y = Math.PI / 4;
      cone.position.y = 2.6;
      const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.55, 12), mat);
      stem.position.y = 2.95;
      g.add(cone, stem);
      return g;
    }
    const arrow = createArrowMarker();
    arrow.position.set(0, 0, -2.35);
    arrow.visible = false;
    scene.add(arrow);

    function updateHud() {
      if (boarded) {
        statusEl.textContent = '乗車完了';
        messageEl.textContent = '押し込まれるように車内へ到達。ドア付近は身動きが取れないほどの密度です。';
        barFill.style.width = '100%';
        meterLabel.textContent = '乗車率 200%  これ以上は無理';
        return;
      }
      if (!trainArrived) {
        const waitLeft = Math.max(0, 5 - elapsed);
        statusEl.textContent = '行列待機中';
        messageEl.textContent = `あなたは最後尾です。${waitLeft.toFixed(1)}秒後に東西線が入線します。列の前方は黄色い線の内側で待っています。`;
        barFill.style.width = `${Math.min(38, elapsed / 5 * 38)}%`;
        meterLabel.textContent = `入線まで ${waitLeft.toFixed(1)} 秒`;
      } else if (!doorsOpen) {
        statusEl.textContent = '電車入線中';
        messageEl.textContent = '電車がホームに滑り込んできました。窓の向こうはすでに満員、ドア前にも人の壁が見えます。';
        barFill.style.width = '55%';
        meterLabel.textContent = '車内混雑率 180%';
      } else {
        statusEl.textContent = '乗車開始';
        messageEl.textContent = 'ドアが開き、列がじわじわ動きます。最後尾のあなたも前へ。緑の矢印を目指して車内へ押し進んでください。';
        const progress = THREE.MathUtils.clamp((4.95 - player.position.z) / 7.7, 0, 1);
        barFill.style.width = `${62 + progress * 34}%`;
        meterLabel.textContent = `乗車圧 ${Math.round(160 + progress * 40)}%`;
      }
    }

    function clampPlayerToWorld() {
      const minZ = doorsOpen ? -3.9 : 1.15;
      player.position.x = THREE.MathUtils.clamp(player.position.x, -1.4, 1.4);
      player.position.z = THREE.MathUtils.clamp(player.position.z, minZ, 5.25);
      if (player.position.z < -1.95) {
        player.position.x = THREE.MathUtils.clamp(player.position.x, -1.05, 1.05);
      }
    }

    function animatePerson(person, t, intensity = 1) {
      const phase = t * 7 + person.userData.queueIndex;
      const swing = Math.sin(phase) * 0.23 * intensity;
      person.userData.legL.rotation.x = swing;
      person.userData.legR.rotation.x = -swing;
      person.userData.armL.rotation.x = -swing * 0.8;
      person.userData.armR.rotation.x = swing * 0.8;
      person.position.y = Math.abs(Math.sin(phase * 0.5)) * 0.025 * intensity;
    }

    function updateTrain(dt) {
      if (elapsed >= 5 && !trainArrived) {
        trainX = THREE.MathUtils.damp(trainX, 0, 1.75, dt);
        train.position.x = trainX;
        if (Math.abs(trainX) < 0.18) {
          trainArrived = true;
          train.position.x = 0;
        }
      }
      if (trainArrived && !doorsOpen && elapsed > 7.2) {
        doorsOpen = true;
        goalZone.visible = true;
        arrow.visible = true;
      }
      if (doorsOpen) {
        doorLeft.position.x = THREE.MathUtils.damp(doorLeft.position.x, -1.52, 3.5, dt);
        doorRight.position.x = THREE.MathUtils.damp(doorRight.position.x, 1.52, 3.5, dt);
      }
    }

    function updateQueue(dt) {
      const targetZ = doorsOpen ? -2.2 : 4.25;
      queue.forEach((p, i) => {
        const desiredZ = doorsOpen ? targetZ + i * 0.46 : 4.25 - i * 0.47;
        p.position.z = THREE.MathUtils.damp(p.position.z, desiredZ, doorsOpen ? 0.68 : 0.2, dt);
        p.position.x = THREE.MathUtils.damp(p.position.x, (i % 2 ? 0.32 : -0.32), 1.6, dt);
        animatePerson(p, elapsed, doorsOpen ? 0.55 : 0.12);
      });
      if (doorsOpen) {
        crowdPushTimer += dt;
        if (crowdPushTimer > 0.45) {
          crowdPushTimer = 0;
          player.position.z -= 0.025 + Math.random() * 0.035;
          player.position.x += (Math.random() - 0.5) * 0.045;
        }
      }
      packed.forEach((p, i) => {
        p.position.x += Math.sin(elapsed * 2.2 + i) * dt * 0.018;
        p.position.z += Math.cos(elapsed * 2.6 + i * 0.7) * dt * 0.012;
        animatePerson(p, elapsed + i, 0.18);
      });
    }

    function updatePlayer(dt) {
      const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw));
      const right = new THREE.Vector3(Math.cos(yaw), 0, -Math.sin(yaw));
      let inputX = 0;
      let inputY = 0;
      if (keys.KeyW || keys.ArrowUp) inputY += 1;
      if (keys.KeyS || keys.ArrowDown) inputY -= 1;
      if (keys.KeyD || keys.ArrowRight) inputX += 1;
      if (keys.KeyA || keys.ArrowLeft) inputX -= 1;
      inputX += moveVector.x;
      inputY += moveVector.y;
      const input = new THREE.Vector2(inputX, inputY);
      if (input.lengthSq() > 1) input.normalize();

      const speedPenalty = doorsOpen && player.position.z < -1.4 ? 0.48 : 1;
      const speed = doorsOpen ? 1.42 * speedPenalty : 0.42;
      const move = new THREE.Vector3();
      move.addScaledVector(forward, -input.y);
      move.addScaledVector(right, input.x);
      if (move.lengthSq() > 0.0001) {
        move.normalize().multiplyScalar(speed * dt);
        player.position.add(move);
        player.rotation.y = Math.atan2(move.x, move.z);
        animatePerson(player, elapsed, 1.2);
      } else {
        animatePerson(player, elapsed, 0.2);
      }

      // Stay as the last person before boarding starts.
      if (!doorsOpen) {
        player.position.z = THREE.MathUtils.damp(player.position.z, 4.95, 2.6, dt);
      }
      clampPlayerToWorld();

      if (doorsOpen && player.position.z < -3.1 && Math.abs(player.position.x) < 1.06) {
        boarded = true;
      }
    }

    function updateCamera(dt) {
      yaw -= lookDelta.x * 0.0045;
      pitch -= lookDelta.y * 0.0035;
      pitch = THREE.MathUtils.clamp(pitch, -0.48, 0.35);
      lookDelta.multiplyScalar(0.58);

      const distance = 4.35;
      const height = 2.35;
      const camOffset = new THREE.Vector3(
        Math.sin(yaw) * distance,
        height + Math.sin(pitch) * 1.2,
        Math.cos(yaw) * distance
      );
      const desired = player.position.clone().add(camOffset);
      desired.z = Math.min(desired.z, 6.1);
      camera.position.lerp(desired, 1 - Math.pow(0.001, dt));
      const target = player.position.clone().add(new THREE.Vector3(0, 1.18, -0.5));
      camera.lookAt(target);
    }

    function animate() {
      requestAnimationFrame(animate);
      const dt = Math.min(clock.getDelta(), 0.05);
      if (started && !boarded) elapsed += dt;
      if (started) {
        updateTrain(dt);
        updateQueue(dt);
        updatePlayer(dt);
        updateCamera(dt);
        updateHud();
        arrow.rotation.y += dt * 2.2;
        arrow.position.y = Math.sin(elapsed * 3) * 0.08;
      } else {
        camera.position.set(0, 2.7, 8.2);
        camera.lookAt(0, 1.1, 0.8);
      }
      renderer.render(scene, camera);
    }

    function beginGame() {
      if (started) return;
      started = true;
      startLayer.classList.add('hidden');
      if (isTouchDevice) {
        moveZone.style.display = 'block';
        lookZone.style.display = 'block';
        mobileExit.style.display = 'grid';
      }
      updateHud();
    }

    startLayer.addEventListener('click', beginGame);
    startLayer.addEventListener('touchstart', (e) => { e.preventDefault(); beginGame(); }, { passive: false });
    mobileExit.addEventListener('click', () => location.reload());

    window.addEventListener('keydown', (e) => { keys[e.code] = true; });
    window.addEventListener('keyup', (e) => { keys[e.code] = false; });

    let dragging = false;
    let lastMouse = new THREE.Vector2();
    renderer.domElement.addEventListener('mousedown', (e) => {
      if (!started || isTouchDevice) return;
      dragging = true;
      lastMouse.set(e.clientX, e.clientY);
    });
    window.addEventListener('mousemove', (e) => {
      if (!dragging) return;
      lookDelta.x += e.clientX - lastMouse.x;
      lookDelta.y += e.clientY - lastMouse.y;
      lastMouse.set(e.clientX, e.clientY);
    });
    window.addEventListener('mouseup', () => { dragging = false; });

    if (isTouchDevice && window.nipplejs) {
      const joystick = nipplejs.create({
        zone: moveZone,
        mode: 'static',
        position: { left: '26%', bottom: '24%' },
        color: 'white',
        size: 118,
        restOpacity: 0.42
      });
      joystick.on('move', (_evt, data) => {
        const angle = data.angle ? data.angle.radian : 0;
        const force = Math.min(data.force || 0, 1);
        moveVector.set(Math.cos(angle) * force, Math.sin(angle) * force);
      });
      joystick.on('end', () => moveVector.set(0, 0));

      let activeLookId = null;
      let lastTouch = null;
      lookZone.addEventListener('touchstart', (e) => {
        const t = e.changedTouches[0];
        activeLookId = t.identifier;
        lastTouch = { x: t.clientX, y: t.clientY };
        e.preventDefault();
      }, { passive: false });
      lookZone.addEventListener('touchmove', (e) => {
        if (activeLookId === null || !lastTouch) return;
        for (const t of e.changedTouches) {
          if (t.identifier === activeLookId) {
            lookDelta.x += t.clientX - lastTouch.x;
            lookDelta.y += t.clientY - lastTouch.y;
            lastTouch = { x: t.clientX, y: t.clientY };
            break;
          }
        }
        e.preventDefault();
      }, { passive: false });
      lookZone.addEventListener('touchend', () => { activeLookId = null; lastTouch = null; }, { passive: false });
      lookZone.addEventListener('touchcancel', () => { activeLookId = null; lastTouch = null; }, { passive: false });
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });

    updateHud();
    animate();
  </script>
</body>
</html>
