<!DOCTYPE html>
<html lang="ja">
  
  <!-- PR preview test -->

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>リスキリングセンター3</title>
  <style>
    /* ==========================================
           UI & Base Styles
           ========================================== */
    body {
      margin: 0;
      overflow: hidden;
      background-color: #eef1f5;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
    }

    #ui-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: rgba(15, 20, 25, 0.85);
      color: #ffffff;
      cursor: pointer;
      z-index: 10;
      backdrop-filter: blur(4px);
      transition: opacity 0.3s ease;
      text-align: center;
    }

    #ui-layer h1 {
      margin: 0 0 10px 0;
      font-size: 3rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
    }

    #ui-layer p {
      margin: 5px 0;
      color: #cbd5e1;
      font-size: 1.1rem;
    }

    .highlight {
      color: #60a5fa;
      font-weight: bold;
      padding: 0 4px;
    }

    #crosshair {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 6px;
      height: 6px;
      background-color: rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 5;
      display: none;
      box-shadow: 0 0 6px rgba(0, 0, 0, 0.6);
    }

    #coordinate-hud {
      position: absolute;
      top: 15px;
      left: 15px;
      background-color: rgba(0, 0, 0, 0.7);
      color: #00ffcc;
      padding: 10px 15px;
      border-radius: 6px;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      font-weight: bold;
      pointer-events: none;
      z-index: 20;
      display: none;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      border: 1px solid #00ffcc;
    }

    #joystick-zone {
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 100%;
      z-index: 15;
      display: none;
    }

    #mobile-exit {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 44px;
      height: 44px;
      background: rgba(0, 0, 0, 0.5);
      color: white;
      border-radius: 50%;
      display: none;
      justify-content: center;
      align-items: center;
      font-size: 20px;
      font-weight: bold;
      z-index: 20;
      border: 2px solid rgba(255, 255, 255, 0.3);
      cursor: pointer;
    }

    @media (max-width: 768px) {
      #ui-layer h1 {
        font-size: 2rem;
      }
      #ui-layer p {
        font-size: 0.9rem;
      }
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.10.1/nipplejs.min.js"></script>
</head>

<body>
  <div id="crosshair"></div>
  <div id="coordinate-hud"></div>

  <div id="joystick-zone"></div>
  <div id="mobile-exit">?</div>

  <div id="ui-layer">
    <h1>リスキリングセンター3</h1>
    <p id="start-text">画面をクリックして空間に没入する</p>
    <p id="controls-text"
      style="margin-top: 40px; font-size: 1rem; background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 8px;">
      <span class="highlight">W A S D</span> : 移動 &nbsp;|&nbsp;
      <span class="highlight">Mouse</span> : 視点移動 &nbsp;|&nbsp;
      <span class="highlight">ESC</span> : ロック解除
    </p>
  </div>

  <script>
    // ==========================================
        // デバイス判定 & 開発・デバッグ用設定
        // ==========================================
        const isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
        const SHOW_COORDINATES = true; 
        
        let isPlaying = false; 

        const hudElement = document.getElementById('coordinate-hud');
        if (SHOW_COORDINATES) {
            hudElement.style.display = 'block';
        }

        if (isTouchDevice) {
            document.getElementById('start-text').innerHTML = "タップして空間に没入する<br><span style='font-size:0.8rem; color:#aaa;'>(横画面推奨)</span>";
            document.getElementById('controls-text').innerHTML = "<span class='highlight'>左画面ドラッグ</span> : 移動 &nbsp;|&nbsp; <span class='highlight'>右画面スワイプ</span> : 視点移動";
        }

        // ==========================================
        // 1. シーン・カメラ・レンダラーの初期化
        // ==========================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xf4f6f9);
        // 日光表現の白みが強くなりすぎないよう、フォグは控えめにする
        scene.fog = new THREE.FogExp2(0xf4f6f9, 0.0035);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 1.6, 0); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.outputEncoding = THREE.sRGBEncoding; 
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        // 全体の露出を少し下げ、室内が白飛びしにくいバランスにする
        renderer.toneMappingExposure = 0.86;
        document.body.appendChild(renderer.domElement);

        // ==========================================
        // 2. 照明の設定 
        // ==========================================
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0xaaaaaa, 0.72);
        scene.add(hemiLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.55);
        dirLight.position.set(-20, 25, -10); 
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 4096; 
        dirLight.shadow.mapSize.height = 4096;
        dirLight.shadow.camera.near = 0.5;
        dirLight.shadow.camera.far = 100;
        dirLight.shadow.camera.left = -40;
        dirLight.shadow.camera.right = 40;
        dirLight.shadow.camera.top = 40;
        dirLight.shadow.camera.bottom = -40;
        dirLight.shadow.bias = -0.0005; 
        scene.add(dirLight);

        // ==========================================
        // 3. 空間のベース構築
        // ==========================================
        const roomWidth = 50; 
        const roomDepth = 14; 
        const ceilingLowerAmount = 0.5;
        const roomHeight = 5 - ceilingLowerAmount;
        const wallFixtureHeightBoost = 0.6;
        const baseMeetingDoorHeight = 2.35;

        function createCarpetTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#5a6370';
            ctx.fillRect(0, 0, size, size);
            const imgData = ctx.getImageData(0, 0, size, size);
            const data = imgData.data;
            const tileSize = 64; 
            for (let i = 0; i < data.length; i += 4) {
                const x = (i / 4) % size;
                const y = Math.floor((i / 4) / size);
                const noise = (Math.random() - 0.5) * 20;
                const isAltTile = (Math.floor(x / tileSize) % 2 === 0) ^ (Math.floor(y / tileSize) % 2 === 0);
                const weave = isAltTile ? Math.sin(x * 0.8) * 6 : Math.sin(y * 0.8) * 6;
                const borderX = x % tileSize;
                const borderY = y % tileSize;
                let borderDarken = 0;
                if (borderX < 2 || borderY < 2) borderDarken = -12;
                const finalAdjust = noise + weave + borderDarken;
                data[i] = Math.max(0, Math.min(255, data[i] + finalAdjust));    
                data[i+1] = Math.max(0, Math.min(255, data[i+1] + finalAdjust)); 
                data[i+2] = Math.max(0, Math.min(255, data[i+2] + finalAdjust)); 
            }
            ctx.putImageData(imgData, 0, 0);
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(roomWidth / 4, roomDepth / 4); 
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createWoodTexture() {
            const size = 1024;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = '#d4b595'; 
            ctx.fillRect(0, 0, size, size);
            
            ctx.fillStyle = 'rgba(100, 70, 40, 0.06)';
            for(let i = 0; i < 3000; i++) {
                let x = Math.random() * size;
                let y = Math.random() * size;
                let w = Math.random() * 40 + 10;
                let h = Math.random() * 3 + 1;
                ctx.fillRect(x, y, w, h);
            }
            
            ctx.strokeStyle = 'rgba(90, 60, 30, 0.4)';
            ctx.lineWidth = 2;
            const plankHeight = 64; 
            for(let y = 0; y <= size; y += plankHeight) {
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(size, y);
                ctx.stroke();
                
                let offsetX = (y / plankHeight) % 2 === 0 ? 0 : size / 2;
                ctx.beginPath();
                ctx.moveTo(offsetX, y);
                ctx.lineTo(offsetX, y + plankHeight);
                ctx.stroke();
                
                if(offsetX === 0) {
                    ctx.beginPath();
                    ctx.moveTo(size / 2, y);
                    ctx.lineTo(size / 2, y + plankHeight);
                    ctx.stroke();
                }
            }
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createMountainMuralTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#e8edf0';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            function drawLayer(points, color) {
                ctx.beginPath();
                ctx.moveTo(0, canvas.height);
                points.forEach(([x, y], index) => {
                    if (index === 0) {
                        ctx.lineTo(x * canvas.width, y * canvas.height);
                    } else {
                        ctx.lineTo(x * canvas.width, y * canvas.height);
                    }
                });
                ctx.lineTo(canvas.width, canvas.height);
                ctx.closePath();
                ctx.fillStyle = color;
                ctx.fill();
            }

            drawLayer([
                [0.00, 0.18], [0.09, 0.23], [0.18, 0.31], [0.25, 0.33],
                [0.34, 0.45], [0.45, 0.49], [0.55, 0.53], [0.64, 0.54],
                [0.75, 0.61], [0.88, 0.61], [1.00, 0.66]
            ], '#dce8e3');

            drawLayer([
                [0.00, 0.32], [0.07, 0.36], [0.15, 0.43], [0.27, 0.45],
                [0.38, 0.49], [0.50, 0.51], [0.60, 0.58], [0.72, 0.59],
                [0.85, 0.65], [1.00, 0.66]
            ], '#cfe4d1');

            drawLayer([
                [0.00, 0.60], [0.08, 0.57], [0.18, 0.61], [0.28, 0.58],
                [0.40, 0.62], [0.51, 0.63], [0.63, 0.59], [0.74, 0.62],
                [0.86, 0.60], [1.00, 0.64]
            ], '#efe4d1');

            drawLayer([
                [0.00, 0.78], [0.11, 0.76], [0.23, 0.79], [0.35, 0.75],
                [0.49, 0.77], [0.60, 0.72], [0.73, 0.75], [0.86, 0.73],
                [1.00, 0.77]
            ], '#b8d8df');

            ctx.fillStyle = '#23564f';
            for (const tree of [
                [0.56, 0.78, 0.14], [0.60, 0.80, 0.20], [0.65, 0.77, 0.16],
                [0.71, 0.76, 0.24], [0.77, 0.78, 0.18], [0.83, 0.75, 0.22]
            ]) {
                const [x, baseY, h] = tree;
                const cx = x * canvas.width;
                const base = baseY * canvas.height;
                const height = h * canvas.height;
                const width = height * 0.34;
                ctx.beginPath();
                ctx.moveTo(cx, base - height);
                ctx.lineTo(cx - width, base);
                ctx.lineTo(cx + width, base);
                ctx.closePath();
                ctx.fill();
                ctx.fillRect(cx - width * 0.08, base - height * 0.1, width * 0.16, height * 0.2);
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createCityWindowTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 1024;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');

            const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
            sky.addColorStop(0, '#f7fbff');
            sky.addColorStop(1, '#dcecf7');
            ctx.fillStyle = sky;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const buildings = [
                [40, 170, 210, 760], [255, 90, 170, 840], [455, 130, 210, 790],
                [700, 60, 180, 860], [875, 190, 120, 740]
            ];
            buildings.forEach(([x, y, w, h], index) => {
                ctx.fillStyle = index % 2 === 0 ? 'rgba(135, 170, 200, 0.72)' : 'rgba(115, 155, 190, 0.64)';
                ctx.fillRect(x, y, w, h);
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.86)';
                ctx.lineWidth = 5;
                for (let gx = x + 24; gx < x + w; gx += 42) {
                    ctx.beginPath();
                    ctx.moveTo(gx, y);
                    ctx.lineTo(gx, y + h);
                    ctx.stroke();
                }
                for (let gy = y + 34; gy < y + h; gy += 58) {
                    ctx.beginPath();
                    ctx.moveTo(x, gy);
                    ctx.lineTo(x + w, gy);
                    ctx.stroke();
                }
            });

            ctx.strokeStyle = 'rgba(70, 105, 135, 0.26)';
            ctx.lineWidth = 6;
            for (let x = 170; x < canvas.width; x += 260) {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
                ctx.stroke();
            }

            ctx.fillStyle = 'rgba(255, 255, 255, 0.12)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        const carpetTex = createCarpetTexture();
        const floorGeo = new THREE.PlaneGeometry(roomWidth, roomDepth);
        const floorMat = new THREE.MeshStandardMaterial({ map: carpetTex, roughness: 1.0, metalness: 0.0 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        function createWall(w, h, d, x, y, z, color = 0xd0d8e8) {
            const geo = new THREE.BoxGeometry(w, h, d);
            const mat = new THREE.MeshStandardMaterial({ color: color, roughness: 1.0 });
            const wall = new THREE.Mesh(geo, mat);
            wall.position.set(x, y, z);
            wall.receiveShadow = true;
            wall.castShadow = true;
            scene.add(wall);
        }

        function createXWallSegment(centerX, startZ, endZ, color = 0xd0d8e8, height = roomHeight) {
            const depth = endZ - startZ;
            if (depth <= 0.01) return;
            createWall(0.2, height, depth, centerX, height / 2, startZ + depth / 2, color);
        }

        const backWallZ = -roomDepth / 2;
        const originalWindowBottomHeight = 3.6 - ceilingLowerAmount;
        const originalWindowTopHeight = 4.6 - ceilingLowerAmount;
        const originalWindowHeight = originalWindowTopHeight - originalWindowBottomHeight;
        // モスグリーン面のハイサイド窓は高さを保ったまま上端を天井高に揃える
        const windowTopHeight = roomHeight;
        const windowBottomHeight = windowTopHeight - originalWindowHeight;
        const windowHeight = windowTopHeight - windowBottomHeight;
        
        createWall(roomWidth, windowBottomHeight, 0.2, 0, windowBottomHeight / 2, backWallZ, 0x98ab83);
        const wallAboveWindowHeight = roomHeight - windowTopHeight;
        if (wallAboveWindowHeight > 0.01) {
            createWall(roomWidth, wallAboveWindowHeight, 0.2, 0, windowTopHeight + wallAboveWindowHeight / 2, backWallZ, 0x98ab83);
        }
        
        const glassGeo = new THREE.BoxGeometry(roomWidth, windowHeight, 0.05);
        const glassMat = new THREE.MeshStandardMaterial({ 
            color: 0xffffff, transparent: true, opacity: 0.8,
            emissive: 0xffffff, emissiveIntensity: 0.7, roughness: 0.1, metalness: 0.2
        });
        const glass = new THREE.Mesh(glassGeo, glassMat);
        glass.position.set(0, windowBottomHeight + windowHeight / 2, backWallZ);
        scene.add(glass);

        const frameMat = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.8 });
        const windowFrameThickness = 0.05;
        const topFrame = new THREE.Mesh(new THREE.BoxGeometry(roomWidth, windowFrameThickness, 0.24), frameMat);
        // 上側の黒い縁は天井に埋まらないよう、縁の上端だけを天井高に揃える
        topFrame.position.set(0, windowTopHeight - windowFrameThickness / 2, backWallZ);
        scene.add(topFrame);
        const bottomFrame = new THREE.Mesh(new THREE.BoxGeometry(roomWidth, windowFrameThickness, 0.24), frameMat);
        bottomFrame.position.set(0, windowBottomHeight, backWallZ);
        scene.add(bottomFrame);
        
        for(let x = -roomWidth/2; x <= roomWidth/2; x += 3.333) {
            const vFrame = new THREE.Mesh(new THREE.BoxGeometry(0.05, windowHeight, 0.24), frameMat);
            vFrame.position.set(x, windowBottomHeight + windowHeight / 2, backWallZ);
            scene.add(vFrame);
        }

        createWall(0.2, roomHeight, roomDepth, roomWidth / 2, roomHeight/2, 0);  
        
        // x=-25側の壁は、追加会議室ドア用に z=2 付近だけ開口を残して分割
        const sideWallDoorZ = 2.0;
        const sideWallDoorWidth = 1.4;
        const sideWallDoorHeight = baseMeetingDoorHeight + wallFixtureHeightBoost;
        const sideWallDoorStart = sideWallDoorZ - sideWallDoorWidth / 2;
        const sideWallDoorEnd = sideWallDoorZ + sideWallDoorWidth / 2;
        [[0, sideWallDoorStart], [sideWallDoorEnd, roomDepth / 2]].forEach(([startZ, endZ]) => {
            const segmentDepth = endZ - startZ;
            if (segmentDepth > 0.01) {
                createWall(0.2, roomHeight, segmentDepth, -roomWidth / 2, roomHeight / 2, startZ + segmentDepth / 2);
            }
        });
        const sideWallDoorHeaderHeight = roomHeight - sideWallDoorHeight;
        createWall(0.2, sideWallDoorHeaderHeight, sideWallDoorWidth, -roomWidth / 2, sideWallDoorHeight + sideWallDoorHeaderHeight / 2, sideWallDoorZ);

        const breakWidth = 10; 
        const breakDepth = roomDepth / 2; 
        const breakX = -roomWidth / 2 - breakWidth / 2; 
        const breakZ = -roomDepth / 4; 
        
        const cityView = new THREE.Mesh(
            new THREE.PlaneGeometry(breakDepth, roomHeight),
            new THREE.MeshBasicMaterial({ map: createCityWindowTexture() })
        );
        cityView.rotation.y = Math.PI / 2;
        cityView.position.set(-roomWidth / 2 - breakWidth - 0.08, roomHeight / 2, breakZ);
        scene.add(cityView);

        const breakGlassMat = new THREE.MeshStandardMaterial({
            color: 0xffffff, transparent: true, opacity: 0.22,
            roughness: 0.04, metalness: 0.12, emissive: 0xffffff, emissiveIntensity: 0.12
        });
        const breakGlass = new THREE.Mesh(new THREE.PlaneGeometry(breakDepth, roomHeight), breakGlassMat);
        breakGlass.rotation.y = Math.PI / 2;
        breakGlass.position.set(-roomWidth / 2 - breakWidth + 0.01, roomHeight / 2, breakZ);
        scene.add(breakGlass);

        const windowFrameMat = new THREE.MeshStandardMaterial({ color: 0xf8fafc, roughness: 0.35 });
        for (let z = -roomDepth / 2; z <= 0.01; z += breakDepth / 3) {
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.12, roomHeight, 0.06), windowFrameMat);
            frame.position.set(-roomWidth / 2 - breakWidth + 0.02, roomHeight / 2, z);
            scene.add(frame);
        }
        for (let y = 0; y <= roomHeight + 0.01; y += roomHeight / 2) {
            const frame = new THREE.Mesh(new THREE.BoxGeometry(0.12, 0.08, breakDepth), windowFrameMat);
            frame.position.set(-roomWidth / 2 - breakWidth + 0.02, y, breakZ);
            scene.add(frame);
        }
        createWall(breakWidth, roomHeight, 0.2, breakX, roomHeight/2, 0);
        createWall(breakWidth, roomHeight, 0.2, breakX, roomHeight/2, -roomDepth/2, 0x98ab83); 

        const mountainMural = new THREE.Mesh(
            new THREE.PlaneGeometry(breakWidth, roomHeight),
            new THREE.MeshStandardMaterial({ map: createMountainMuralTexture(), roughness: 1.0, side: THREE.DoubleSide })
        );
        mountainMural.position.set(breakX, roomHeight / 2, -0.105);
        mountainMural.receiveShadow = true;
        scene.add(mountainMural);
        
        const alcoveCeiling = new THREE.Mesh(new THREE.PlaneGeometry(breakWidth, breakDepth), new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.8, emissive: 0x111111 }));
        alcoveCeiling.rotation.x = Math.PI / 2;
        alcoveCeiling.position.set(breakX, roomHeight - 0.05, breakZ);
        alcoveCeiling.receiveShadow = true;
        scene.add(alcoveCeiling);
        
        const woodTex = createWoodTexture();
        woodTex.repeat.set(breakWidth / 2, breakDepth / 2);
        const woodFloor = new THREE.Mesh(new THREE.PlaneGeometry(breakWidth, breakDepth), new THREE.MeshStandardMaterial({ map: woodTex, roughness: 0.5 }));
        woodFloor.rotation.x = -Math.PI / 2;
        woodFloor.position.set(breakX, 0.005, breakZ);
        woodFloor.receiveShadow = true;
        scene.add(woodFloor);

        const alcoveLight1 = new THREE.PointLight(0xffeedd, 0.5, 12);
        alcoveLight1.position.set(-27, roomHeight - 1, -3.5);
        scene.add(alcoveLight1);
        const alcoveLight2 = new THREE.PointLight(0xffeedd, 0.5, 12);
        alcoveLight2.position.set(-33, roomHeight - 1, -3.5);
        scene.add(alcoveLight2);


        // ==========================================
        // 【廊下へ続くアルコーブ & ガラス張りの出入口の構築】
        // ==========================================
        const alcoveCenterX = 4.8; 
        const alcoveWidth = 2.8;   
        const alcoveStart = alcoveCenterX - alcoveWidth / 2; 
        const alcoveEnd = alcoveCenterX + alcoveWidth / 2;   
        const alcoveHeight = 2.8 + wallFixtureHeightBoost;
        const alcoveDepth = 2.0;

        // --- ガラス張りの出入口 ---
        // ロッカー列を少し削り、出入口を中央側へ寄せる
        const newDoorX = -11.8;
        const newDoorWidth = 1.4;
        const newDoorHeight = 2.4 + wallFixtureHeightBoost;
        const newDoorStart = newDoorX - newDoorWidth / 2;
        const newDoorEnd = newDoorX + newDoorWidth / 2;

        function createHorizontalWallSegmentsExcluding(startX, endX, z, exclusions, height = corridorHeight, color = corridorWallColor) {
            let cursor = startX;
            exclusions
                .map(([excludeStart, excludeEnd]) => [Math.max(startX, excludeStart), Math.min(endX, excludeEnd)])
                .filter(([excludeStart, excludeEnd]) => excludeEnd > excludeStart)
                .sort((a, b) => a[0] - b[0])
                .forEach(([excludeStart, excludeEnd]) => {
                    const segmentWidth = excludeStart - cursor;
                    if (segmentWidth > 0.01) {
                        createWall(segmentWidth, height, 0.2, cursor + segmentWidth / 2, height / 2, z, color);
                    }
                    cursor = Math.max(cursor, excludeEnd);
                });
            const finalWidth = endX - cursor;
            if (finalWidth > 0.01) {
                createWall(finalWidth, height, 0.2, cursor + finalWidth / 2, height / 2, z, color);
            }

        function createEntranceFloorTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#cfc8ad';
            ctx.fillRect(0, 0, size, size);
            const colors = ['rgba(70, 112, 63, 0.78)', 'rgba(93, 135, 77, 0.62)', 'rgba(226, 213, 183, 0.72)', 'rgba(176, 169, 141, 0.44)'];
            for (let i = 0; i < 2600; i++) {
                const x = Math.random() * size;
                const y = Math.random() * size;
                const radiusX = Math.random() * 5 + 1.5;
                const radiusY = Math.random() * 2.5 + 0.8;
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(Math.random() * Math.PI);
                ctx.fillStyle = colors[Math.floor(Math.random() * colors.length)];
                ctx.beginPath();
                ctx.ellipse(0, 0, radiusX, radiusY, 0, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
            ctx.strokeStyle = 'rgba(95, 105, 85, 0.18)';
            ctx.lineWidth = 2;
            for (let i = 0; i <= size; i += 64) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, size);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(size, i);
                ctx.stroke();
            }
            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(entranceWidth / 2.2, entranceDepth / 2.2);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            return texture;
        }

        function createGlassSidePottedPlant({ x, z, height, style, rotationY = 0 }) {
            const plantGroup = new THREE.Group();
            plantGroup.position.set(x, 0, z);
            plantGroup.rotation.y = rotationY;

            const potHeight = entranceInsetGlass.bottomY;
            const potTopRadius = 0.27;
            const potBottomRadius = 0.21;
            const potMat = new THREE.MeshStandardMaterial({ color: 0x8a5a38, roughness: 0.78, metalness: 0.02 });
            const rimMat = new THREE.MeshStandardMaterial({ color: 0x6f4026, roughness: 0.72 });
            const soilMat = new THREE.MeshStandardMaterial({ color: 0x2f2118, roughness: 1.0 });
            const leafMats = [0x1f5d2a, 0x2f7a35, 0x4f9b42, 0x6fbf58].map((color) =>
                new THREE.MeshStandardMaterial({ color, roughness: 0.82, side: THREE.DoubleSide })
            );
            const stemMat = new THREE.MeshStandardMaterial({ color: 0x526b2f, roughness: 0.88 });

            const pot = new THREE.Mesh(new THREE.CylinderGeometry(potTopRadius, potBottomRadius, potHeight, 24), potMat);
            pot.position.y = potHeight / 2;
            pot.castShadow = true;
            pot.receiveShadow = true;
            plantGroup.add(pot);

            const rim = new THREE.Mesh(new THREE.CylinderGeometry(potTopRadius * 1.08, potTopRadius * 1.02, 0.08, 24), rimMat);
            rim.position.y = potHeight - 0.02;
            rim.castShadow = true;
            plantGroup.add(rim);

            const soil = new THREE.Mesh(new THREE.CylinderGeometry(potTopRadius * 0.92, potTopRadius * 0.88, 0.025, 24), soilMat);
            soil.position.y = potHeight + 0.03;
            plantGroup.add(soil);

            function addLeaf(y, length, width, angle, tilt, matIndex, bend = 0) {
                const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 8), leafMats[matIndex % leafMats.length]);
                leaf.scale.set(width, 0.035, length);
                leaf.position.set(Math.sin(angle) * bend, y, Math.cos(angle) * bend);
                leaf.rotation.set(tilt, angle, 0);
                leaf.castShadow = true;
                plantGroup.add(leaf);
            }

            if (style === 'fan') {
                const trunkHeight = height - potHeight - 0.08;
                const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.035, 0.055, trunkHeight, 10), stemMat);
                stem.position.y = potHeight + trunkHeight / 2;
                stem.castShadow = true;
                plantGroup.add(stem);

                for (let i = 0; i < 18; i++) {
                    const angle = (Math.PI * 2 * i) / 18;
                    const y = Math.min(height - 0.04, potHeight + trunkHeight * (0.7 + (i % 4) * 0.1));
                    addLeaf(y, 0.48 + (i % 3) * 0.08, 0.12, angle, -0.55 - (i % 2) * 0.18, i, 0.12);
                }
            } else if (style === 'broad') {
                for (let i = 0; i < 15; i++) {
                    const angle = (Math.PI * 2 * i) / 15;
                    const stemHeight = height - potHeight - 0.05 - (i % 5) * 0.035;
                    const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.018, 0.026, stemHeight, 8), stemMat);
                    stem.position.set(Math.sin(angle) * 0.08, potHeight + stemHeight / 2, Math.cos(angle) * 0.08);
                    stem.rotation.z = Math.sin(angle) * 0.18;
                    stem.rotation.x = Math.cos(angle) * 0.18;
                    plantGroup.add(stem);
                    addLeaf(potHeight + stemHeight, 0.34 + (i % 4) * 0.05, 0.18 + (i % 3) * 0.03, angle, -0.82, i, 0.2);
                }
            } else if (style === 'lush') {
                for (let i = 0; i < 46; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const layer = Math.random();
                    const y = potHeight + 0.18 + layer * (height - potHeight - 0.12);
                    const radius = 0.08 + layer * 0.24 + Math.random() * 0.12;
                    addLeaf(y, 0.32 + Math.random() * 0.22, 0.13 + Math.random() * 0.1, angle, -0.45 - Math.random() * 0.75, i, radius);
                }
                for (let i = 0; i < 16; i++) {
                    const angle = (Math.PI * 2 * i) / 16;
                    const vine = new THREE.Mesh(new THREE.CylinderGeometry(0.012, 0.018, 0.46 + Math.random() * 0.25, 7), stemMat);
                    vine.position.set(Math.sin(angle) * 0.23, potHeight + 0.52 + Math.random() * 0.18, Math.cos(angle) * 0.23);
                    vine.rotation.z = Math.sin(angle) * 0.45;
                    vine.rotation.x = Math.cos(angle) * 0.45;
                    plantGroup.add(vine);
                }
            }

            scene.add(plantGroup);
        }

        function addProceduralFoliage(pillarGroup) {
            const foliageGroup = new THREE.Group();
            const leafColors = [0x2e5a1c, 0x3a7023, 0x478c2b, 0x5cb338, 0x76c449, 0x8edb5a];
            const flowerColors = [0xffffff, 0xfffdf0, 0xffeb3b]; 
            const leafGeo = new THREE.IcosahedronGeometry(0.14, 0);
            const flowerGeo = new THREE.IcosahedronGeometry(0.06, 0);
            const pillarHalfSize = 0.75; 
            const topY = roomHeight; 

            for (let i = 0; i < 150; i++) {
                const mat = new THREE.MeshStandardMaterial({ color: leafColors[Math.floor(Math.random() * leafColors.length)], roughness: 0.8, flatShading: true });
                const leaf = new THREE.Mesh(leafGeo, mat);
                const angle = Math.random() * Math.PI * 2;
                const radius = pillarHalfSize + (Math.random() * 0.1 - 0.05); 
                
                let px = Math.cos(angle) * radius;
                let pz = Math.sin(angle) * radius;
                if (Math.abs(px) > Math.abs(pz)) {
                    px = Math.sign(px) * pillarHalfSize;
                    pz = pz / Math.abs(Math.cos(angle)) * pillarHalfSize;
                } else {
                    pz = Math.sign(pz) * pillarHalfSize;
                    px = px / Math.abs(Math.sin(angle)) * pillarHalfSize;
                }
                
                leaf.position.set(px + (Math.random()*0.2 - 0.1), topY - 0.1 - (Math.random()*0.3), pz + (Math.random()*0.2 - 0.1));
                const scale = 0.8 + Math.random() * 1.5;
                leaf.scale.set(scale, scale, scale);
                leaf.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                leaf.castShadow = true;
                foliageGroup.add(leaf);
            }

            for (let v = 0; v < 40; v++) {
                const vineLength = Math.floor(Math.random() * 6) + 2; 
                const isXEdge = Math.random() > 0.5;
                const signX = Math.random() > 0.5 ? 1 : -1;
                const signZ = Math.random() > 0.5 ? 1 : -1;
                let basePathX, basePathZ;
                
                if(isXEdge) {
                    basePathX = signX * (pillarHalfSize + 0.02); 
                    basePathZ = (Math.random() - 0.5) * (pillarHalfSize * 2 - 0.2);
                } else {
                    basePathX = (Math.random() - 0.5) * (pillarHalfSize * 2 - 0.2);
                    basePathZ = signZ * (pillarHalfSize + 0.02);
                }

                for (let l = 0; l < vineLength; l++) {
                    const mat = new THREE.MeshStandardMaterial({ color: leafColors[Math.floor(Math.random() * leafColors.length)], roughness: 0.9, flatShading: true });
                    const leaf = new THREE.Mesh(leafGeo, mat);
                    const dropY = topY - 0.2 - (l * 0.18) - (Math.random() * 0.1);
                    leaf.position.set(basePathX + (Math.random()*0.08 - 0.04), dropY, basePathZ + (Math.random()*0.08 - 0.04));
                    
                    const scale = 1.2 - (l * 0.15) + (Math.random() * 0.3);
                    if (scale > 0.2) {
                        leaf.scale.set(scale, scale, scale);
                        leaf.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                        leaf.castShadow = true;
                        foliageGroup.add(leaf);

                        if (Math.random() > 0.85) {
                            const fMat = new THREE.MeshStandardMaterial({ color: flowerColors[Math.floor(Math.random() * flowerColors.length)], roughness: 0.4, flatShading: true });
                            const flower = new THREE.Mesh(flowerGeo, fMat);
                            flower.position.copy(leaf.position);
                            flower.position.x += (Math.random() * 0.1 - 0.05);
                            flower.position.y -= (Math.random() * 0.05);
                            flower.position.z += (Math.random() * 0.1 - 0.05);
                            foliageGroup.add(flower);
                        }
                    }
                }
            }
            pillarGroup.add(foliageGroup);
        }

        function createFreeSeatSet(x, z, rotationY = 0) {

            const blue = 0xaed3e8;

        function createDeskRow(desk_x, centerZ, units) {
            const rowGroup = new THREE.Group();
            const unitLength = 1.4; 
            const totalLength = units * unitLength;
            const deskDepth = 1.4;  
            const topGeo = new THREE.BoxGeometry(deskDepth, 0.04, totalLength);
            const topMat = new THREE.MeshStandardMaterial({ color: 0xdeb887, roughness: 0.4 });
            const top = new THREE.Mesh(topGeo, topMat);
            top.position.y = 0.72;
            top.castShadow = true;
            top.receiveShadow = true;
            rowGroup.add(top);
            
            const legGeo = new THREE.BoxGeometry(deskDepth - 0.05, 0.72, 0.05);
            const legMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, metalness: 0.1 });
            for (let i = 0; i <= units; i++) {
                const leg = new THREE.Mesh(legGeo, legMat);
                leg.position.set(0, 0.36, (i * unitLength) - (totalLength / 2));
                leg.castShadow = true;
                rowGroup.add(leg);
            }
            for (let i = 0; i < units; i++) {
                const zOffset = (i * unitLength) - (totalLength / 2) + (unitLength / 2);
                const monitor = createMonitorModel();
                monitor.position.set(0, 0.72, zOffset);
                rowGroup.add(monitor);
                
                const chairR = createDeskChairModel(getNextChairColor());
                chairR.position.set(0.8, 0, zOffset);
                chairR.rotation.y = -Math.PI / 2;
                rowGroup.add(chairR);
                
                const laptopR = createLaptopModel();
                laptopR.position.set(0.35, 0.73, zOffset);
                rowGroup.add(laptopR);
                
                const chairL = createDeskChairModel(getNextChairColor());
                chairL.position.set(-0.8, 0, zOffset);
                chairL.rotation.y = Math.PI / 2;
                rowGroup.add(chairL);
                
                const laptopL = createLaptopModel();
                laptopL.position.set(-0.35, 0.73, zOffset);
                rowGroup.add(laptopL);

            rowGroup.position.set(desk_x, 0, centerZ);

       // 7. ロッカーの配置
        // ==========================================
        function createLockerBank(startX, endX, zPos) {
            const lockerGroup = new THREE.Group();
            const depth = 1.0;
            const height = 2.0 + wallFixtureHeightBoost;
            const rows = 4;
            const doorHeight = height / rows;
            const colWidth = doorHeight;
            const originalColWidth = 0.4;
            const bodyMat = new THREE.MeshStandardMaterial({ color: 0xe5e7eb, roughness: 0.7 });
            const handleMat = new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.8 }); 
            const labelMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.9 }); 
            // x=3付近からアルコーブ右側までを一続きで空け、端に1列だけ残らないようにする
            const leftAlcoveLockerRemovalStart = alcoveStart - originalColWidth * 5;
            const rightAlcoveLockerRemovalEnd = alcoveEnd + originalColWidth * 3.2;
            const lockerHalfWidth = colWidth / 2;
            // x=-12付近側からロッカー1列分を削る
            const trimmedStartX = startX + colWidth;
            for(let x = trimmedStartX; x <= endX; x += colWidth) {
                const overlapsAlcoveClearance =
                    x + lockerHalfWidth > leftAlcoveLockerRemovalStart &&
                    x - lockerHalfWidth < rightAlcoveLockerRemovalEnd;
                if (overlapsAlcoveClearance) continue;
                const bodyGeo = new THREE.BoxGeometry(colWidth, height, depth);
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.set(x, height / 2, zPos - depth / 2);
                body.castShadow = true;
                body.receiveShadow = true;
                lockerGroup.add(body);
                for(let r = 0; r < rows; r++) {
                    const doorY = (r * doorHeight) + (doorHeight / 2);
                    const handleGeo = new THREE.BoxGeometry(colWidth * 0.3, 0.03, 0.02);
                    const handle = new THREE.Mesh(handleGeo, handleMat);
                    handle.position.set(x + colWidth * 0.2, doorY + (doorHeight * 0.3), zPos - depth);
                    lockerGroup.add(handle);
                    const labelGeo = new THREE.PlaneGeometry(colWidth * 0.12, doorHeight * 0.12);
                    const label = new THREE.Mesh(labelGeo, labelMat);
                    label.position.set(x - colWidth * 0.2, doorY + (doorHeight * 0.1), zPos - depth - 0.005);
                    label.rotation.y = Math.PI; 
                    lockerGroup.add(label);
                    if (r > 0) {
                        const lineGeo = new THREE.BoxGeometry(colWidth, 0.005, 0.01);
                        const lineMat = new THREE.MeshStandardMaterial({ color: 0xcccccc });
                        const line = new THREE.Mesh(lineGeo, lineMat);
                        line.position.set(x, r * doorHeight, zPos - depth);
                        lockerGroup.add(line);
                    }
                }
            }
            scene.add(lockerGroup);
        }
        createLockerBank(lockerBankStartX, lockerBankEndX, roomDepth / 2 - 0.1);

        // ==========================================
        // 9. コントローラー (PC & モバイル対応)
        // ==========================================
        const uiLayer = document.getElementById('ui-layer');
        const crosshair = document.getElementById('crosshair');
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        
        let joyMoveX = 0;
        let joyMoveZ = 0;
        let lookTouchId = null;
        let lastTouchX = 0;
        let lastTouchY = 0;
        let isMouseLooking = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        function rotateView(deltaX, deltaY, sensitivity) {
            euler.setFromQuaternion(camera.quaternion);
            euler.y -= deltaX * sensitivity;
            euler.x -= deltaY * sensitivity;
            euler.x = Math.max(-Math.PI / 2.2, Math.min(Math.PI / 2.2, euler.x));
            camera.quaternion.setFromEuler(euler);
        }

        uiLayer.addEventListener('click', () => {
            if (isTouchDevice) {
                isPlaying = true;
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 300);
                document.getElementById('joystick-zone').style.display = 'block';
                document.getElementById('mobile-exit').style.display = 'flex';
                
                if (!window.joystickManager) {
                    window.joystickManager = nipplejs.create({
                        zone: document.getElementById('joystick-zone'),
                        mode: 'dynamic',
                        color: 'white',
                        catchDistance: 150
                    });

                    window.joystickManager.on('move', (evt, data) => {
                        joyMoveX = data.vector.x;
                        joyMoveZ = data.vector.y;
                    });

                    window.joystickManager.on('end', () => {
                        joyMoveX = 0;
                        joyMoveZ = 0;
                    });
                }
            } else {
                isPlaying = true;
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 300);
                crosshair.style.display = 'block';
                const lockRequest = document.body.requestPointerLock && document.body.requestPointerLock();
                if (lockRequest && typeof lockRequest.catch === 'function') {
                    lockRequest.catch(() => {});
                }
            }
        });

        document.addEventListener('pointerlockchange', () => {
            isPlaying = document.pointerLockElement === document.body;
            if (isPlaying) {
                uiLayer.style.opacity = '0';
                setTimeout(() => uiLayer.style.display = 'none', 300);
                crosshair.style.display = 'block';
            } else {
                uiLayer.style.display = 'flex';
                setTimeout(() => uiLayer.style.opacity = '1', 10);
                crosshair.style.display = 'none';
            }
        });

        document.getElementById('mobile-exit').addEventListener('click', () => {
            isPlaying = false;
            uiLayer.style.display = 'flex';
            setTimeout(() => uiLayer.style.opacity = '1', 10);
            document.getElementById('joystick-zone').style.display = 'none';
            document.getElementById('mobile-exit').style.display = 'none';
        });

        document.addEventListener('pointerdown', (event) => {
            if (!isPlaying || event.pointerType !== 'mouse' || document.pointerLockElement === document.body) return;
            if (event.clientX > window.innerWidth / 2) {
                isMouseLooking = true;
                lastMouseX = event.clientX;
                lastMouseY = event.clientY;
            }
        });

        document.addEventListener('pointermove', (event) => {
            if (!isPlaying || event.pointerType !== 'mouse') return;
            if (document.pointerLockElement === document.body) {
                rotateView(event.movementX, event.movementY, 0.002);
                return;
            }
            if (!isMouseLooking) return;

            const deltaX = event.clientX - lastMouseX;
            const deltaY = event.clientY - lastMouseY;
            rotateView(deltaX, deltaY, 0.004);

            lastMouseX = event.clientX;
            lastMouseY = event.clientY;
        });

        document.addEventListener('pointerup', (event) => {
            if (event.pointerType !== 'mouse') return;
            isMouseLooking = false;
        });

        document.addEventListener('touchstart', (e) => {
            if (!isPlaying || !isTouchDevice) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.clientX > window.innerWidth / 2) {
                    lookTouchId = t.identifier;
                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                    break;
                }
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            if (!isPlaying || !isTouchDevice) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.identifier === lookTouchId) {
                    let deltaX = t.clientX - lastTouchX;
                    let deltaY = t.clientY - lastTouchY;
                    rotateView(deltaX, deltaY, 0.004);

                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                }
            }
        }, { passive: false });

        document.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === lookTouchId) {
                    lookTouchId = null;
                }
            }
        });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = true;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = true;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = true;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = true;
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = false;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = false;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = false;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = false;
        });

        // ==========================================
        // 10. アニメーションループ & 衝突判定
        // ==========================================
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const moveVector = new THREE.Vector3();
        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1); 
            
            if (isPlaying) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                if (isTouchDevice) {
                    direction.x = joyMoveX;
                    direction.z = joyMoveZ;
                } else {
                    direction.z = Number(keys.w) - Number(keys.s);
                    direction.x = Number(keys.d) - Number(keys.a);
                    direction.normalize(); 
                }

                const speed = 45.0; 
                if (!isTouchDevice) {
                    if (keys.w || keys.s) velocity.z -= direction.z * speed * delta;
                    if (keys.a || keys.d) velocity.x -= direction.x * speed * delta;
                } else {
                    if (Math.abs(direction.z) > 0.05) velocity.z -= direction.z * speed * delta;
                    if (Math.abs(direction.x) > 0.05) velocity.x -= direction.x * speed * delta;
                }

                const previousPosition = camera.position.clone();

                moveVector.setFromMatrixColumn(camera.matrix, 0); 
                camera.position.addScaledVector(moveVector, -velocity.x * delta);
                
                moveVector.crossVectors(camera.up, moveVector); 
                camera.position.addScaledVector(moveVector, -velocity.z * delta);
                
                camera.position.y = 1.6;
                
                // --- 衝突判定 ---
                const wallOffset = 1.5; 
                let boundXMin = -roomWidth / 2 + wallOffset; 
                const boundXMax = roomWidth / 2 - 2.0;
                const boundZMin = -roomDepth / 2 + 1.8; 
                
                if (camera.position.x < -23.5) {
                    if (camera.position.z > -0.5) camera.position.z = -0.5;
                    if (camera.position.z < -6.5) camera.position.z = -6.5;
                    
                    boundXMin = -34.0;
                }

                if(camera.position.x < boundXMin) camera.position.x = boundXMin;
                if(camera.position.x > boundXMax) camera.position.x = boundXMax; 
                if(camera.position.z < boundZMin) camera.position.z = boundZMin; 
                
                const zLockerBound = roomDepth / 2 - 2.0; 
                const zAlcoveBound = roomDepth / 2 + alcoveDepth - 1.0; 
                const zLeftNicheBound = roomDepth / 2 + leftNicheDepth - 0.4;
                const zNewHallBound = entranceEndZ - ENTRANCE_LAYOUT.walkBackInset;
                const alcoveAllowedLeft = alcoveStart + 0.6; 
                const alcoveAllowedRight = alcoveEnd - 0.6;  
                const leftNicheAllowedLeft = leftNicheStart + 0.4;
                const leftNicheAllowedRight = leftNicheEnd - 0.4;
                const newHallAllowedLeft = newDoorStart + 0.25;
                const newHallAllowedRight = newDoorEnd - 0.25;
                const entranceWalkLeft = entranceLeftX + ENTRANCE_LAYOUT.walkLeftInset;
                const entranceWalkRight = entranceRightX - ENTRANCE_LAYOUT.walkRightInset;
                const corridorWalkLeft = corridorLeftX + 0.35;
                const corridorWalkRight = corridorRightX - 0.35;
                const corridorWalkStartZ = roomDepth / 2 + 0.45;
                const corridorWalkEndZ = corridorEndZ - 0.45;
                const crossWalkLeft = entranceWalkRight;
                const crossWalkRight = crossCorridorMaxX - 0.45;
                const crossWalkStartZ = corridorTurnStartZ + 0.25;
                const crossWalkEndZ = corridorEndZ - 0.45;
                const elevatorHallWalkLeft = elevatorHallMinX + 0.45;
                const elevatorHallWalkRight = elevatorHallMaxX - 0.45;
                const elevatorHallWalkStartZ = elevatorHallBackZ + 0.55;
                const elevatorHallWalkEndZ = elevatorHallEndZ - 0.45;
                const inAlcoveMouth = camera.position.x > alcoveAllowedLeft && camera.position.x < alcoveAllowedRight;
                const inLeftNicheMouth = camera.position.x > leftNicheAllowedLeft && camera.position.x < leftNicheAllowedRight;
                const inNewHallMouth = camera.position.x > newHallAllowedLeft && camera.position.x < newHallAllowedRight;
                const inCrossCorridor = camera.position.z > crossWalkStartZ - 0.15
                    && camera.position.z < crossWalkEndZ + 0.15
                    && camera.position.x > crossWalkLeft - 0.35
                    && camera.position.x < crossWalkRight + 0.35;
                const inCorridor1 = camera.position.x > corridorWalkLeft - 0.2
                    && camera.position.x < corridorWalkRight + 0.2
                    && camera.position.z > corridorWalkStartZ
                    && camera.position.z < corridorWalkEndZ + 0.2;
                const inEntranceArea = camera.position.z > entranceStartZ + 0.35
                    && camera.position.z < crossWalkEndZ + 0.1
                    && camera.position.x > entranceWalkLeft - 0.4
                    && camera.position.x < entranceWalkRight + 0.55;
                const inElevatorHall = camera.position.z > elevatorHallWalkStartZ - 0.2
                    && camera.position.z < elevatorHallWalkEndZ + 0.2
                    && camera.position.x > elevatorHallWalkLeft - 0.35
                    && camera.position.x < elevatorHallWalkRight + 0.35;

                if (inElevatorHall) {
                    if (camera.position.x < elevatorHallWalkLeft) camera.position.x = elevatorHallWalkLeft;
                    if (camera.position.x > elevatorHallWalkRight) camera.position.x = elevatorHallWalkRight;
                    if (camera.position.z < elevatorHallWalkStartZ) camera.position.z = elevatorHallWalkStartZ;
                    if (camera.position.z > elevatorHallWalkEndZ) camera.position.z = elevatorHallWalkEndZ;
                } else if (inCrossCorridor) {
                    if (camera.position.x < crossWalkLeft) camera.position.x = crossWalkLeft;
                    if (camera.position.x > crossWalkRight) camera.position.x = crossWalkRight;
                    if (camera.position.z < crossWalkStartZ) camera.position.z = crossWalkStartZ;
                    if (camera.position.z > crossWalkEndZ) camera.position.z = crossWalkEndZ;
                } else if (inCorridor1) {
                    if (camera.position.x < corridorWalkLeft) camera.position.x = corridorWalkLeft;
                    if (camera.position.x > corridorWalkRight) camera.position.x = corridorWalkRight;
                    if (camera.position.z > corridorWalkEndZ) camera.position.z = corridorWalkEndZ;
                } else if (inEntranceArea) {
                    if (camera.position.x < entranceWalkLeft) camera.position.x = entranceWalkLeft;
                    if (camera.position.x > entranceWalkRight) camera.position.x = entranceWalkRight;
                    if (camera.position.z > crossWalkEndZ) camera.position.z = crossWalkEndZ;
                } else if (inAlcoveMouth) {
                    if (camera.position.z > zAlcoveBound) camera.position.z = zAlcoveBound;
                } else if (inLeftNicheMouth) {
                    if (camera.position.z > zLeftNicheBound) camera.position.z = zLeftNicheBound;
                } else if (inNewHallMouth) {
                    if (camera.position.z > zNewHallBound) camera.position.z = zNewHallBound;
                } else if (camera.position.z > zLockerBound) {
                    // 廊下・玄関などメインルーム外で壁の外側へ押し出されると、
                    // 以前は zLockerBound へ直接戻していたため、メインルームへ瞬間移動したように見えていた。
                    // すでにメインルーム外にいる場合は直前の有効位置へ戻し、壁に押し当て続けても場所が飛ばないようにする。
                    if (previousPosition.z > zLockerBound) {
                        camera.position.x = previousPosition.x;
                        camera.position.z = previousPosition.z;
                        velocity.x = 0;
                        velocity.z = 0;
                    } else {
                        camera.position.z = zLockerBound;
                    }
                }
            }

            if (SHOW_COORDINATES && hudElement) {
                hudElement.innerHTML = `X: ${camera.position.x.toFixed(2)}<br>Y: ${camera.position.y.toFixed(2)}<br>Z: ${camera.position.z.toFixed(2)}`;
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
  </script>
</body>

</html>
