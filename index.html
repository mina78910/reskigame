        function formatCurrentCoordinates() {
            return `X: ${camera.position.x.toFixed(2)}, Y: ${camera.position.y.toFixed(2)}, Z: ${camera.position.z.toFixed(2)}`;
        }

        function showCopyToast(message) {
            if (!copyToastElement) return;
            copyToastElement.textContent = message;
            copyToastElement.classList.add('visible');
            if (copyToastTimer) clearTimeout(copyToastTimer);
            copyToastTimer = setTimeout(() => {
                copyToastElement.classList.remove('visible');
            }, 1400);
        }

        function copyCurrentCoordinates() {
            const text = formatCurrentCoordinates();
            const fallbackCopy = () => {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.setAttribute('readonly', '');
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();
                const copied = document.execCommand('copy');
                document.body.removeChild(textarea);
                return copied;
            };

            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text)
                    .then(() => showCopyToast(`座標をコピー: ${text}`))
                    .catch(() => {
                        showCopyToast(fallbackCopy() ? `座標をコピー: ${text}` : '座標コピーに失敗しました');
                    });
                return;
            }

            showCopyToast(fallbackCopy() ? `座標をコピー: ${text}` : '座標コピーに失敗しました');
        }

        if (hudElement) {
            hudElement.addEventListener('click', copyCurrentCoordinates);
            hudElement.addEventListener('touchend', (e) => {
                e.preventDefault();
                copyCurrentCoordinates();
            }, { passive: false });
        }

        document.addEventListener('pointerdown', (event) => {
            if (!isPlaying || event.pointerType !== 'mouse' || document.pointerLockElement === document.body) return;
            if (event.clientX > window.innerWidth / 2) {
                isMouseLooking = true;
                lastMouseX = event.clientX;
                lastMouseY = event.clientY;
            }
        });

        document.addEventListener('pointermove', (event) => {
            if (!isPlaying || event.pointerType !== 'mouse') return;
            if (document.pointerLockElement === document.body) {
                rotateView(event.movementX, event.movementY, 0.002);
                return;
            }
            if (!isMouseLooking) return;

            const deltaX = event.clientX - lastMouseX;
            const deltaY = event.clientY - lastMouseY;
            rotateView(deltaX, deltaY, 0.004);

            lastMouseX = event.clientX;
            lastMouseY = event.clientY;
        });

        document.addEventListener('pointerup', (event) => {
            if (event.pointerType !== 'mouse') return;
            isMouseLooking = false;
        });

        function preventBrowserTouchZoom(e) {
            if (!isTouchDevice) return;
            // iOS Safari can ignore the viewport's user-scalable setting and still
            // enter page zoom/smart-zoom if game gestures are not cancelled.
            // The app implements all touch interactions itself, so while playing we
            // always cancel the browser's default touch handling.
            if (isPlaying) e.preventDefault();
        }

        ['gesturestart', 'gesturechange', 'gestureend'].forEach((eventName) => {
            document.addEventListener(eventName, (e) => e.preventDefault(), { passive: false });
        });

        document.addEventListener('dblclick', (e) => {
            if (isTouchDevice) e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchstart', (e) => {
            preventBrowserTouchZoom(e);
            if (!isPlaying || !isTouchDevice) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.clientX > window.innerWidth / 2) {
                    lookTouchId = t.identifier;
                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                    break;
                }
            }
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            preventBrowserTouchZoom(e);
            if (!isPlaying || !isTouchDevice) return;
            for (let i = 0; i < e.changedTouches.length; i++) {
                let t = e.changedTouches[i];
                if (t.identifier === lookTouchId) {
                    let deltaX = t.clientX - lastTouchX;
                    let deltaY = t.clientY - lastTouchY;
                    rotateView(deltaX, deltaY, 0.004);

                    lastTouchX = t.clientX;
                    lastTouchY = t.clientY;
                }
            }
        }, { passive: false });

        function clearEndedLookTouch(e) {
            preventBrowserTouchZoom(e);
            for (let i = 0; i < e.changedTouches.length; i++) {
                if (e.changedTouches[i].identifier === lookTouchId) {
                    lookTouchId = null;
                }
            }
        }

        document.addEventListener('touchend', clearEndedLookTouch, { passive: false });
        document.addEventListener('touchcancel', clearEndedLookTouch, { passive: false });

        const keys = { w: false, a: false, s: false, d: false };
        document.addEventListener('keydown', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = true;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = true;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = true;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = true;
            if(e.code === 'KeyC' && !e.repeat) copyCurrentCoordinates();
        });
        document.addEventListener('keyup', (e) => {
            if(e.code === 'KeyW' || e.code === 'ArrowUp') keys.w = false;
            if(e.code === 'KeyA' || e.code === 'ArrowLeft') keys.a = false;
            if(e.code === 'KeyS' || e.code === 'ArrowDown') keys.s = false;
            if(e.code === 'KeyD' || e.code === 'ArrowRight') keys.d = false;
        });

        // ==========================================
        // 11. アニメーションループ & 衝突判定
        // ==========================================
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();
        const moveVector = new THREE.Vector3();
        let prevTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1); 
            
            if (isPlaying) {
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                if (isTouchDevice) {
                    direction.x = joyMoveX;
                    direction.z = joyMoveZ;
                } else {
                    direction.z = Number(keys.w) - Number(keys.s);
                    direction.x = Number(keys.d) - Number(keys.a);
                    direction.normalize(); 
                }

                const speed = 45.0; 
                if (!isTouchDevice) {
                    if (keys.w || keys.s) velocity.z -= direction.z * speed * delta;
                    if (keys.a || keys.d) velocity.x -= direction.x * speed * delta;
                } else {
                    if (Math.abs(direction.z) > 0.05) velocity.z -= direction.z * speed * delta;
                    if (Math.abs(direction.x) > 0.05) velocity.x -= direction.x * speed * delta;
                }

                const previousPosition = camera.position.clone();

                moveVector.setFromMatrixColumn(camera.matrix, 0); 
                camera.position.addScaledVector(moveVector, -velocity.x * delta);
                
                moveVector.crossVectors(camera.up, moveVector); 
                camera.position.addScaledVector(moveVector, -velocity.z * delta);
                
                camera.position.y = 1.6;
                
                // --- 衝突判定 ---
                const wallOffset = 1.5; 
                let boundXMin = -roomWidth / 2 + wallOffset; 
                const boundXMax = roomWidth / 2 - 2.0;
                const boundZMin = roomBackZ + 1.8;
                
                if (camera.position.x < -23.5) {
                    if (camera.position.z > -0.5) camera.position.z = -0.5;
                    if (camera.position.z < -6.5) camera.position.z = -6.5;
                    boundXMin = -34.0;
                }

                if(camera.position.x < boundXMin) camera.position.x = boundXMin;
                if(camera.position.x > boundXMax) camera.position.x = boundXMax; 
                if(camera.position.z < boundZMin) camera.position.z = boundZMin; 
                
                const zFrontRoomBound = roomDepth / 2 - 0.35;
                const zAlcoveBound = roomDepth / 2 + alcoveDepth - 1.0; 
                const zLeftNicheBound = roomDepth / 2 + leftNicheDepth - 0.4;
                const zNewHallBound = entranceEndZ - ENTRANCE_LAYOUT.walkBackInset;
                const alcoveAllowedLeft = alcoveStart + 0.6; 
                const alcoveAllowedRight = alcoveEnd - 0.6;  
                const leftNicheAllowedLeft = leftNicheStart + 0.4;
                const leftNicheAllowedRight = leftNicheEnd - 0.4;
                const newHallAllowedLeft = newDoorStart + 0.25;
                const newHallAllowedRight = newDoorEnd - 0.25;
                const entranceWalkLeft = entranceLeftX + ENTRANCE_LAYOUT.walkLeftInset;
                const entranceWalkRight = entranceRightX - ENTRANCE_LAYOUT.walkRightInset;
                const corridorWalkLeft = corridorLeftX + 0.35;
                const corridorWalkRight = corridorRightX - 0.35;
                const corridorWalkStartZ = roomDepth / 2 + 0.45;
                const corridorWalkEndZ = corridorEndZ - 0.45;
                const crossWalkLeft = entranceWalkRight;
                const crossWalkRight = crossCorridorMaxX - 0.45;
                const crossWalkStartZ = corridorTurnStartZ + 0.25;
                const crossWalkEndZ = corridorEndZ - 0.45;
                // エレベーターホール左壁付近は見た目より早く X=-7.65 で止まっていたため、
                // 他の狭い廊下より少しだけ壁際まで寄れる余白にする。
                const elevatorWallPadding = 0.18;
                const elevatorWalkLeft = elevatorHallLeftX + elevatorWallPadding;
                const elevatorWalkRight = elevatorHallRightX - elevatorWallPadding;
                const elevatorWalkBackZ = elevatorHallBackZ + 0.45;
                // エレベーターホール正面の横廊下は Z=14.25 付近まで歩ける見た目なので、
                // ホール判定に入ったままでも Z=13.25 で押し返さず、横廊下側へ少し進める余白を残す。
                const elevatorDoorwayFrontZ = crossWalkEndZ - 0.3;
                const clamp = (value, min, max) => Math.max(min, Math.min(max, value));
                // 判定境界に少し余裕を持たせる。X=-7.91 / Z=14.55 付近は横廊下の突き当たりと
                // エレベーターホール入口の角が重なるため、厳密な不等号だと数cmの差でどの通路にも属さず、
                // 直前座標へ戻され続けてフリーズしたように見えることがあった。
                const routeEpsilon = 0.12;
                const doorwayOverlap = 0.55;
                // アルコーブ判定は X 範囲だけだと奥の廊下（同じ X=約4.8）でも成立し、
                // Z=15 付近からアルコーブ上限まで押し戻されてワープに見えるため、手前側だけに限定する。
                const inAlcoveMouth = camera.position.x >= alcoveAllowedLeft - routeEpsilon
                    && camera.position.x <= alcoveAllowedRight + routeEpsilon
                    && camera.position.z <= zAlcoveBound + 0.25;
                const inLeftNicheMouth = camera.position.x >= leftNicheAllowedLeft - routeEpsilon
                    && camera.position.x <= leftNicheAllowedRight + routeEpsilon
                    && camera.position.z <= zLeftNicheBound + 0.25;
                const inNewHallMouth = camera.position.x >= newHallAllowedLeft - routeEpsilon
                    && camera.position.x <= newHallAllowedRight + routeEpsilon
                    && camera.position.z <= zNewHallBound + 0.25;
                const inCrossCorridor = camera.position.z >= crossWalkStartZ - 0.15 - routeEpsilon
                    && camera.position.z <= crossWalkEndZ + 0.15 + routeEpsilon
                    && camera.position.x >= crossWalkLeft - 0.35 - routeEpsilon
                    && camera.position.x <= crossWalkRight + 0.35 + routeEpsilon;
                const inCorridor1 = camera.position.x >= corridorWalkLeft - 0.2 - routeEpsilon
                    && camera.position.x <= corridorWalkRight + 0.2 + routeEpsilon
                    && camera.position.z >= corridorWalkStartZ - routeEpsilon;
                const inEntranceArea = camera.position.z >= entranceStartZ + 0.35 - routeEpsilon
                    && camera.position.z <= crossWalkEndZ + 0.1 + routeEpsilon
                    && camera.position.x >= entranceWalkLeft - 0.4 - routeEpsilon
                    && camera.position.x <= entranceWalkRight + 0.55 + routeEpsilon;
                const inElevatorHall = camera.position.z >= elevatorWalkBackZ - 0.2 - routeEpsilon
                    && camera.position.z <= elevatorDoorwayFrontZ + routeEpsilon
                    && camera.position.x >= elevatorWalkLeft - doorwayOverlap
                    && camera.position.x <= elevatorWalkRight + 0.25 + routeEpsilon;
                const inEntranceCrossTransition = inEntranceArea && camera.position.x < crossWalkLeft;
                // エレベーターホール入口は横廊下と判定が重なる。X=-7.82 / Z=13.50 付近で
                // 左へ抜けたいときはホール左端へ戻すのではなく、横廊下として扱って -X 方向へ進めるようにする。
                const leavingElevatorHallToCrossCorridor = inCrossCorridor
                    && camera.position.z >= crossWalkStartZ
                    && camera.position.x < elevatorWalkLeft;

                if (leavingElevatorHallToCrossCorridor) {
                    camera.position.x = clamp(camera.position.x, crossWalkLeft, crossWalkRight);
                    camera.position.z = clamp(camera.position.z, crossWalkStartZ, crossWalkEndZ);
                } else if (inElevatorHall) {
                    camera.position.x = clamp(camera.position.x, elevatorWalkLeft, elevatorWalkRight);
                    camera.position.z = clamp(camera.position.z, elevatorWalkBackZ, elevatorDoorwayFrontZ);
                } else if (inEntranceCrossTransition) {
                    camera.position.x = clamp(camera.position.x, entranceWalkLeft, entranceWalkRight);
                    if (camera.position.z > crossWalkEndZ) camera.position.z = crossWalkEndZ;
                } else if (inCrossCorridor) {
                    camera.position.x = clamp(camera.position.x, crossWalkLeft, crossWalkRight);
                    camera.position.z = clamp(camera.position.z, crossWalkStartZ, crossWalkEndZ);
                } else if (inCorridor1) {
                    camera.position.x = clamp(camera.position.x, corridorWalkLeft, corridorWalkRight);
                    if (camera.position.z > corridorWalkEndZ) camera.position.z = corridorWalkEndZ;
                } else if (inEntranceArea) {
                    camera.position.x = clamp(camera.position.x, entranceWalkLeft, entranceWalkRight);
                    if (camera.position.z > crossWalkEndZ) camera.position.z = crossWalkEndZ;
                } else if (inAlcoveMouth) {
                    if (camera.position.z > zAlcoveBound) camera.position.z = zAlcoveBound;
                } else if (inLeftNicheMouth) {
                    if (camera.position.z > zLeftNicheBound) camera.position.z = zLeftNicheBound;
                } else if (inNewHallMouth) {
                    if (camera.position.z > zNewHallBound) camera.position.z = zNewHallBound;
                } else if (camera.position.z > zFrontRoomBound) {
                    // 廊下・玄関などメインルーム外で壁の外側へ押し出されると、
                    // 前面境界へ直接戻すと、メインルームへ瞬間移動したように見えることがある。
                    // すでにメインルーム外にいる場合は直前の有効位置へ戻し、壁に押し当て続けても場所が飛ばないようにする。
                    if (previousPosition.z > zFrontRoomBound) {
                        // ドア枠の角を斜めに抜けるとき、X が先に通路判定から外れても
                        // Z が室内側へ戻る動きなら残す。両軸を直前位置へ戻すと、
                        // X=-12.36 / Z=5.60 付近で -X + -Z 入力時に壁へ吸い付いたように止まる。
                        const returningToMainRoom = camera.position.z < previousPosition.z;
                        camera.position.x = previousPosition.x;
                        if (returningToMainRoom) {
                            camera.position.z = Math.max(camera.position.z, zFrontRoomBound);
                            velocity.x = 0;
                        } else {
                            camera.position.z = previousPosition.z;
                            velocity.x = 0;
                            velocity.z = 0;
                        }
                    } else {
                        camera.position.z = zFrontRoomBound;
                    }
                }
            }

            if (SHOW_COORDINATES && hudElement) {
                hudElement.innerHTML = `POS&nbsp; X:${camera.position.x.toFixed(2)} &nbsp; Z:${camera.position.z.toFixed(2)}<br>Y:${camera.position.y.toFixed(2)} / 5ptメモリ表示中<br><span>クリック or Cキーで座標コピー</span>`;
            }

            prevTime = time;
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
  </script>
</body>

</html>
